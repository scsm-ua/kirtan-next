\"div\",\"\u003ci class=\\\"SongHeader__term\\\"\u003eśrī\u003c/i\u003e — adorable; \u003ci class=\\\"SongHeader__term\\\"\u003enāma\u003c/i\u003e — el nombre.\",{\"className\":\"SongHeader__wbw\",\"dangerouslySetInnerHTML\":{\"__html\":\"\u003ci class=\\\"SongHeader__term\\\"\u003eśrī\u003c/i\u003e — adorable; \u003ci class=\\\"SongHeader__term\\\"\u003enāma\u003c/i\u003e — el nombre.\"}}]],[],[[\"$\",\"div\",\"Śrīla Bhakti Vinod Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Bhakti Vinod Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L44\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":133,\"first_line\":\"gāy gorā madhur svare\"},\"title\":[\"Śrī Nāma\"],\"word_by_word\":[\"**śrī** — adorable; **nāma** — el nombre.\"],\"author\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"gāy gorā madhur svare\",\"hare kṛṣṇa hare kṛṣṇa, kṛṣṇa kṛṣṇa hare hare\",\"hare rāma hare rāma, rāma rāma hare hare\"],\"word_by_word\":[\"**gay** — canta; **gorā** — el Señor Gaurasundara; **madhur svare** — con una voz muy dulce; **hare kṛṣṇa hare kṛṣṇa, kṛṣṇa kṛṣṇa hare hare hare rāma hare rāma, rāma rāma hare hare.**.\"],\"translation\":[\"El Señor Gaurasundar canta con voz muy dulce: “Hare Kṛṣṇa, Hare Kṛṣṇa, Kṛṣṇa Kṛṣṇa, Hare Hare; Hare Rāma, Hare Rāma, Rāma Rāma, Hare Hare”.\"]},{\"number\":\"2\",\"text\":[\"gṛhe thāko, vane thāko, sadā ‘hari’ bole’ ḍāko,\",\"sukhe duḥkhe bhulo nāko, vadane harinām koro re\"],\"word_by_word\":[\"**gṛhe thāko** — al vivir en casa; **vane thāko** — o vivir en el bosque; **sadā** — siempre; **‘hari’** — el santo nombre de Hari; **bole’ ḍāko** — gritar mientras se canta; **sukhe duḥkhe** — en felicidad o angustia; **bhulo nā’ko** — no olvides; **vadane** — con tus labios; **hari-nām** — los santos nombres; **koro re** — ¡oh, por favor canta!\"],\"translation\":[\"Ya sea que vivas en casa o en el bosque, canta siempre el Santo Nombre del Señor. Ya sea que estés feliz o triste, no lo olvides, canta el Santo Nombre y llena tus labios con Harinām.\"]},{\"number\":\"3\",\"text\":[\"māyā-jāle baddha ho’ye, ācho miche kāja lo’ye,\",\"ekhona o chetana peye, rādhā-mādhava-nām bolo re\"],\"word_by_word\":[\"**māyā-jāle** — en la red de *māyā*; **baddha ho’ye** — estás atado; **ācho** — tuyo es; **miche kāja** — trabajo infructuoso; **lo’ye** — aceptando; **ekhona** — ahora; **chetana pe’ye** — obtener plena conciencia; **‘rādhā-mādhava’ nām** — los nombres de Śrī Śrī Rādhā y Mādhava; **bolo re** — ¡así que canta!\"],\"translation\":[\"Atrapado en la red de Māyā, has trabajado duro como un esclavo, en vano. Ahora que obtuviste una vida humana y conciencia, canta el Nombre del Señor: “Rādhā-Mādhava”.\"]},{\"number\":\"4\",\"text\":[\"jīvana hoilo śeṣa, nā bhajile hṛṣīkeśa\",\"bhaktivinod-upadeśa, ekbār nām-rase māto re\"],\"word_by_word\":[\"**jīvana** — tu vida; **hoilo śeṣa** — puede terminar en cualquier momento; **na bhajile** — no has adorado; **hṛṣīkeśa** — el Señor de los sentidos; **bhaktivinod-upadeśa** — este consejo de Bhakti Vinod Thākur; **ekbār** — solo una vez; **nām-rase** — en el néctar del santo nombre; **māto** — embriagarse; **re** — ¡oh!\"],\"translation\":[\"Sin duda, esta vida pronto se acabará, y no has adorado a Hṛṣīkeśa, el amo de los sentidos. Bhakti Vinod te aconseja: Por lo menos una vez, prueba el* nāma-rāsa*, el néctar del Santo Nombre.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-gay-gora\"},{\"title\":{\"en\":\"Srila B.S. Goswami Maharaj\",\"ru\":\"Шрила Б.С. Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/goswami-maharaj-gay-gora-1\"},{\"title\":{\"en\":\"Srila B.S.
