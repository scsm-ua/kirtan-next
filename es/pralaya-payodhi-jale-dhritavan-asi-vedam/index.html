īla Jayadev Goswāmī\"],\"verses\":[{\"number\":\"1\",\"text\":[\"pralaya-payodhi-jale dhṛtavān asi vedaṁ\",\"    vihita-vahitra-charitram akhedam\",\"keśava dhṛta-mīna-śarīra jaya jagadīśa hare\"],\"word_by_word\":[\"**pralaya-payodhi-jale** — en las turbulentas aguas de la devastación; **dhṛtavān** — sosteniendo; **asi** — tú eres; **vedaṁ** — los *Vedas*; **vihita** — hecho; **vahitra-charitram** — actuando como un bote; **akhedam** — fácilmente; **keśava** — ¡oh Keśava, de cabello fino!; **dhṛtamīna-śarīra** — tú que has aceptado la forma de un pez gigante; **jaya** — ¡todas las glorias a Ti!; **jagat-īśa** — ¡oh Señor del universo!; **hare** — ¡oh Señor Hari!\"],\"translation\":[\"¡Oh, Keśava! ¡Oh, Señor del universo! ¡Oh, Señor Hari, quien asumiste la forma de un pez, todas las glorias a Ti! En la forma de un pez gigante, Tú actuaste sin dificultad como un barco para preservar los *Vedas*, los cuales estaban sumergidos en el turbulento océano de una devastación.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"pralaya-payodhi-jale\",\"trans\":\"en las turbulentas aguas de la devastación\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"dhṛtavān\",\"trans\":\"sosteniendo\",\"sep\":\" \"},{\"text\":\"asi\",\"trans\":\"tú eres\",\"sep\":\" \"},{\"text\":\"vedaṁ\",\"trans\":\"los *Vedas*\",\"sep\":\"\"}],[{\"text\":\"vihita\",\"trans\":\"hecho\",\"sep\":\"-\"},{\"text\":\"vahitra-charitram\",\"trans\":\"actuando como un bote\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"akhedam\",\"trans\":\"fácilmente\",\"sep\":\"\"}],[{\"text\":\"keśava\",\"trans\":\"¡oh Keśava, de cabello fino!\",\"sep\":\" \"},{\"text\":\"dhṛta-mīna\",\"trans\":\"tú que has aceptado la forma de un pez gigante\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"text\":\"śarīra\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"jaya jagadīśa\",\"trans\":\"¡oh Señor del universo!\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"hare\",\"trans\":\"¡oh Señor Hari!\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"kṣitir iha vipulatare tiṣṭhati tava pṛṣṭhe\",\"    dharaṇi-dharaṇa-kina-chakra-gariṣṭhe\",\"keśava dhṛta-kūrma-śarīra jaya jagadīśa hare\"],\"word_by_word\":[\"**kṣitiḥ** — la gran montaña Mandara; **iha** — aquí; **vipulatare** — gigantesco; **tiṣṭhati** — descansa; **tava pṛṣṭhe** — sobre Tu espalda; **dharaṇi-dhāraṇa** — sosteniendo el mundo; **kiṇa-chakra** — una gran cicatriz circular; **gariṣṭhe** — el más pesado; **keśava** — ¡oh Señor Keśava, de cabello fino!; **dhṛta-kūrma-śarīra** — que han aceptado la forma de una tortuga; **jaya** — ¡todas las glorias a Ti!; **jagat-īśa** — ¡oh Señor del universo!; **hare** — ¡oh Señor Hari!\"],\"translation\":[\"¡Oh, Keśava! ¡Oh, Señor del universo! ¡Oh, Señor Hari, quien asumiste la forma de una tortuga, todas las glorias a Ti! En esta encarnación como una tortuga divina, la enorme Montaña Mandara descansa en Tu gigante espalda como un pivote para batir el océano de leche. Al sostener la enorme montaña, una gran depresión quedó marcada como una cicatriz en Tu espalda, la cual se tornó muy gloriosa.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"kṣitir\",\"trans\":\"la gran montaña Mandara\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"iha\",\"trans\":\"aquí\",\"sep\":\" \"},{\"text\":\"vipulatare\",\"trans\":\"gigantesco\",\"sep\":\" \"},{\"text\":\"tiṣṭhati\",\"trans\":\"descansa\",\"sep\":\" \"},{\"text\":\"tava pṛṣṭhe\",\"trans\":\"sobre Tu espalda\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"dharaṇi-dharaṇa\",\"trans\":\"sosteniendo el mundo\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"kina-chakra\",\"trans\":\"una gran cicatriz circular\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"text\":\"gariṣṭhe\",\"trans\":\"el más pesado\",\"sep\":\"\"}],[{\"text\":\"keśava\",\"trans\":\"¡oh Señor Keśava, de cabello fino!\",\"sep\":\" \"},{\"text\":\"dhṛta-kūrma-śarīra\",\"trans\":\"que han aceptado la forma de una tortuga\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jaya\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\" \"},{\"text\":\"jagadīśa hare\",\"trans\":\"¡oh Señor del universo!\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"3\",\"text\":[\"vasati daśana-śikhare dharaṇī tava lagnā\",\"    śaśini kalaṅka-kaleva nimagnā\",\"keśava dhṛta-śūkara-rūpa jaya jagadīśa hare\"],\"word_by_word\":[\"**vasati** — se sienta; **daśana-śikhare** — sobre la punta de Tu colmillo; **dharaṇī** — la tierra; **tava** — Tuyo; **lagna** — se sienta fijo; **śaśini** — de la luna; **kalaṅka-kala** — un punto débil; **iva** — igual que; **nimagnā** — que se había sumergido (en el océano Garbhodaka); **keśava** — ¡oh Señor Keśava, de cabello fino!; **dhṛta-śūkara-rūpa** — que has aceptado la forma de un jabalí; **jaya** — ¡todas las glorias a Ti!; **jagat-īśa** — ¡oh Señor del universo!; **hare** — ¡oh Señor Hari!\"],\"translation\":[\"¡Oh, Keśava! ¡Oh, Señor del universo! ¡Oh, Señor Hari, quien asumiste la forma de un jabalí, todas las glorias a Ti! La Tierra, la cual había quedado sumergida en el fondo del universo, en el océano Garbhodaka, descansa segura sobre la punta de Tu colmillo como una mancha en la luna.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"vasati\",\"trans\":\"se sienta\",\"sep\":\" \"},{\"text\":\"daśana-śikhare\",\"trans\":\"sobre la punta de Tu colmillo\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"dharaṇī\",\"trans\":\"la tierra\",\"sep\":\" \"},{\"text\":\"tava\",\"trans\":\"Tuyo\",\"sep\":\" \"},{\"text\":\"lagnā\",\"trans\":\"se sienta fijo\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"śaśini\",\"trans\":\"de la luna\",\"sep\":\" \"},{\"text\":\"kalaṅka-kaleva\",\"trans\":\"un punto débil\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"nimagnā\",\"trans\":\"igual que\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"keśava\",\"trans\":\"que se había sumergido (en el océano Garbhodaka)\",\"sep\":\" \",\"e limpias los pecados del mundo, y es por Ti que la gente es aliviada del abrasante incendio de la existencia material.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"kṣatriya-rudhira-maye\",\"trans\":\"en los ríos de sangre de los cuerpos de los demoníacos *kṣatriyas* que Tú has matado\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jagad\",\"trans\":\"la tierra\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"text\":\"apagata-pāpaṁ\",\"trans\":\"los pecados son quitados\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"snapayasi\",\"trans\":\"haces que se bañen\",\"sep\":\" \"},{\"text\":\"payasi\",\"trans\":\"en el agua\",\"sep\":\" \"},{\"text\":\"śamita\",\"trans\":\"la gente se siente aliviada\",\"sep\":\"-\"},{\"text\":\"bhava-tāpam\",\"trans\":\"del fuego llameante de la existencia material\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"keśava\",\"trans\":\"¡oh Señor Keśava, de cabello fino!\",\"sep\":\" \"},{\"text\":\"dhṛta-bhṛgupati-rūpa\",\"trans\":\"que haz aceptado la forma de Paraśurāma, protector de los sabios; (\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jaya\",\"trans\":\"de los sabios\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"jagadīśa\",\"trans\":\"el protector)\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"hare\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"7\",\"text\":[\"vitarasi dikṣu raṇe dik-pati-kamanīyaṁ\",\"    daśa-mukha-mauli-baliṁ ramaṇīyam\",\"keśava dhṛta-rāma-śarīra jaya jagadīśa hare\"],\"word_by_word\":[\"**vitarasi** — distribuyes; **dikṣu** — en todas direcciones; **raṇe** — en la batalla (de Laṅkā); **dik-pati** — a las deidades que presiden las diez direcciones; **kamanīyam** — que todos deseaban; **daśa-mukha** — el demonio de diez cabezas Rāvaṇa; **mauli-balim** — como una gran ofrenda; **ramaṇīyam** — deleitable; **keśava** — ¡oh Señor Keśava, de cabello fino!; **dhṛta-rāma-śarīra** — quien ha aceptado la forma de Rāmachandra; **jaya** — ¡todas las glorias a Ti!; **jagat-īśa** — ¡oh Señor del universo!; **hare** — ¡oh Señor Hari!\"],\"translation\":[\"¡Oh, Keśava! ¡Oh, Señor del universo! ¡Oh, Señor Hari, que asumiste la forma de Rāmachandra! ¡Todas las glorias a Ti! En la batalla de Laṅkā acabaste con el demonio Rāvaṇa, quien tenía diez cabezas, las cuales distribuiste como una ofrenda agradable a las deidades regentes de las diez direcciones, encabezadas por Indra. Esta acción fue largo tiempo deseada por todos ellos, ya que fueron muy hostilizados por ese monstruo.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"vitarasi\",\"trans\":\"distribuyes\",\"sep\":\" \"},{\"text\":\"dikṣu\",\"trans\":\"en todas direcciones\",\"sep\":\" \"},{\"text\":\"raṇe\",\"trans\":\"en la batalla (de Laṅkā)\",\"sep\":\" \"},{\"text\":\"dik-pati\",\"trans\":\"a las deidades que presiden las diez direcciones\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"kamanīyaṁ\",\"trans\":\"que todos deseaban\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"daśa-mukha\",\"trans\":\"el demonio de diez cabezas Rāvaṇa\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"mauli-baliṁ\",\"trans\":\"como una gran ofrenda\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"ramaṇīyam\",\"trans\":\"deleitable\",\"sep\":\"\"}],[{\"text\":\"keśava\",\"trans\":\"¡oh Señor Keśava, de cabello fino!\",\"sep\":\" \"},{\"text\":\"dhṛta-rāma-śarīra\",\"trans\":\"quien ha aceptado la forma de Rāmachandra\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jaya\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\" \"},{\"text\":\"jagadīśa hare\",\"trans\":\"¡oh Señor del universo!\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"8\",\"text\":[\"vahasi vapuṣi viśade vasanaṁ jaladābhaṁ\",\"    hala-hati-bhīti-milita-jamunābham\",\"keśava dhṛta-haladhara-rūpa jaya jagadīśa hare\"],\"word_by_word\":[\"**vahasi** — Tú usas; **vapuṣi viśade** — en Tu brillante cuerpo blanco; **vasanam** — prendas de vestir; **jalada-ābham \",\"error\":\"multi\"},{\"text\":\"jaya\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\" \"},{\"text\":\"jagadīśa hare\",\"trans\":\"¡oh Señor del universo!\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"10\",\"text\":[\"mlecha-nivaha-nidhane kalayasi karavālaṁ\",\"    dhūmaketum iva kim api karālam\",\"keśava dhṛta-kalki-śarīra jaya jagadīśa hare\"],\"word_by_word\":[\"**mleccha-nivaha** — la multitud de malvados bárbaros (al final de Kali-yuga); **nidhane** — para aniquilar; **kalayasi** — Tú llevas; **karavālam** — una espada; **dhūmaketum iva** — apareciendo como un cometa; **kim api** — indescriptiblemente; **karālam** — aterrador; **keśava** — ¡oh Señor Keśava, de cabello fino!; **dhṛta-kalki-śarīra** — que has aceptado la forma del Señor Kalki; **jaya** — ¡todas las glorias a Ti!; **jagat-īśa** — ¡oh Señor del universo!; **hare** — ¡oh Señor Hari!\"],\"translation\":[\"¡Oh, Keśava! ¡Oh, Señor del universo! ¡Oh, Señor Hari, que asumiste la forma de Kalki, todas las glorias a Ti! Tú apareces al final de Kali-yuga como un cometa y portas una aterradora espada para acabar con los malvados bárbaros.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"mlecha-nivaha\",\"trans\":\"la multitud de malvados bárbaros (al final de Kali-yuga)\",\"sep\":\"-\",\"error\":\"mismatch\"},{\"text\":\"nidhane\",\"trans\":\"para aniquilar\",\"sep\":\" \"},{\"text\":\"kalayasi\",\"trans\":\"Tú llevas\",\"sep\":\" \"},{\"text\":\"karavālaṁ\",\"trans\":\"una espada\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"dhūmaketum iva\",\"trans\":\"apareciendo como un cometa\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"kim api\",\"trans\":\"indescriptiblemente\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"karālam\",\"trans\":\"aterrador\",\"sep\":\"\"}],[{\"text\":\"keśava\",\"trans\":\"¡oh Señor Keśava, de cabello fino!\",\"sep\":\" \"},{\"text\":\"dhṛta-kalki-śarīra\",\"trans\":\"que has aceptado la forma del Señor Kalki\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jaya\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\" \"},{\"text\":\"jagadīśa hare\",\"trans\":\"¡oh Señor del universo!\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"11\",\"text\":[\"śrī-jayadeva-kaver idam uditam udāraṁ\",\"    śṛṇu sukha-daṁ śubha-daṁ bhava-sāram\",\"keśava dhṛta-daśa-vidha-rūpa jaya jagadīśa hare\"],\"word_by_word\":[\"**śrī-jayadeva-kaveḥ** — del poeta Jayadeva; **idam** — este himno; **uditam** — que ha surgido; **udāram** — que es lo más exaltado; **śṛṇu** — por favor escucha; **sukha-dam** — un dador de felicidad; **śubha-dam** — un otorgador de auspiciosidad; **bhava-sāram** — y es lo mejor en este mundo oscuro; **keśava** — ¡oh Señor Keśava, de cabello fino!; **dhṛta** — que has aceptado; **daśa-vidha-rūpa** — estas diez formas diferentes de encarnación; **jaya** — ¡todas las glorias a Ti!; **jagat-īśa** — ¡oh Señor del universo!; **hare** — ¡oh Señor Hari!\"],\"translation\":[\"¡Oh, Keśava! ¡Oh, Señor del universo! ¡Oh, Señor Hari, que asumiste estas diez diferentes formas de Encarnaciones, todas las glorias a Ti! ¡Oh, lectores! Por favor, escuchen este himno del poeta Jayadev, el cual es muy excelente, otorga felicidad, nos agracia con lo auspicioso y es lo mejor en este oscuro mundo.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"śrī-jayadeva-kaver\",\"trans\":\"del poeta Jayadeva\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"idam\",\"trans\":\"este himno\",\"sep\":\" \"},{\"text\":\"uditam\",\"trans\":\"que ha surgido\",\"sep\":\" \"},{\"text\":\"udāraṁ\",\"trans\":\"que es lo más exaltado\",\"sep\":\"\",\"error\":\"mismatch\"}],[{\"text\":\"śṛṇu\",\"trans\":\"por favor escucha\",\"sep\":\" \"},{\"text\":\"sukha-daṁ\",\"trans\":\"un dador de felicidad\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"śubha-daṁ\",\"trans\":\"un otorgador de auspiciosidad\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"bhava-sāram\",\"trans\":\"y es lo mejor en este mundo oscuro\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"keśava\",\"trans\":\"¡oh Señor Keśava, de cabello fino!\",\"sep\":\" \"},{\"text\":\"dhṛta\",\"trans\":\"que has aceptado\",\"sep\":\"-\"},{\"text\":\"daśa-vidha-rūpa\",\"trans\":\"estas diez formas diferentes de encarnación\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jaya\",\"trans\":\"¡todas las glorias a Ti!\",\"sep\":\" \"},{\"text\":\"jagadīśa hare\",\"trans\":\"¡oh Señor del universo!\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"12\",\"text\":[\"vedān uddharate jaganti vahate bhū-golam udbibhrate\",\"daityaṁ dārayate baliṁ chalayate kṣatra-kṣayaṁ kurvate\",\"paulastyaṁ jayate halaṁ kalayate kāruṇyam ātanvate\",\"mlechān mūrchayate daśākṛti-kṛte kṛṣṇāya tubhyaṁ namaḥ\"],\"word_by_word\":[\"**vedān uddharate** — rescatar los *Vedas*; **jaganti vahate** — llevando la Montaña Mandara sobre Tu espalda; **bhū-golam udbibhrate** — levantando la tierra; **daityam dārayate** — destrozar al demonio Hiraṇyakaśipu; **balim chalayate** — engañar al rey demonio Bali; **kṣatra-kṣayam kurvate** — matar a todos los *kṣatriyas* malvados; **paulastyam jayate** — conquistar al hijo de Pulastya [el rey *rākṣasa* Rāvaṇa]; **halam kalayate** — llevando un arado; **kāruṇyam ātanvate** — mostrando compasión; **mlecchān mūrchayate** — matar a los hombres degradados de clase baja; **daśa-ākṛti kṛte** — ¡oh Tú que apareces en las formas de estas diez encarnaciones!; **kṛṣṇāya** — ¡Oh, Señor Kṛṣṇa!; **tubhyam namaḥ** — te ofrezco mis reverencias.\"],\"translation\":[\"¡Oh, Señor Kṛṣṇa, ofrezco mis reverencias a Ti, quien apareciste en las formas de estas diez encarnaciones! En la forma de Matsya, rescataste a los *Vedas*; como Kūrma, sostuviste la montaña Mandara en Tu espalda. Como Varāha, levantaste la Tierra con Tus colmillos, y en la forma de Narasiṁha, rasgaste el pecho del *daitya* Hiraṇyakaśipu. En la forma de Vāmana, engañaste al *daitya* rey Bali pidiéndole solo tres pasos de tierra, y de ese modo le quitaste todo el universo al expandir Tus pasos. Como Paraśurāma, mataste a todos los *kṣatriyas* malvados, y como Rāmachandra, conquistaste al *rākṣasa* rey Rāvaṇa. En la forma de Balarāma, portas un arado con el cual subyugas a los malvados y con el cual atrajiste a Ti el río Yamunā. Como el Señor Buddha, mostraste compasión hacia todas las entidades vivientes que sufren en este mundo, y al final de Kali-yuga apareces como Kalki para confundir a los *mlechas* [hombres degradados de baja clase].\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"vedān uddharate\",\"trans\":\"rescatar los *Vedas*\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jaganti vahate\",\"trans\":\"llevando la Montaña Mandara sobre Tu espalda\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"bhū-golam udbibhrate\",\"trans\":\"levantando la tierra\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"daityaṁ dārayate\",\"trans\":\"destrozar al demonio Hiraṇyakaśipu\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"baliṁ chalayate\",\"trans\":\"engañar al rey demonio Bali\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"kṣatra-kṣayaṁ kurvate\",\"trans\":\"matar a todos los *kṣatriyas* malvados\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"paulastyaṁ jayate\",\"trans\":\"conquistar al hijo de Pulastya [el rey *rākṣasa* Rāvaṇa]\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"halaṁ kalayate\",\"trans\":\"llevando un arado\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"kāruṇyam ātanvate\",\"trans\":\"mostrando compasión\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"mlechān mūrchayate\",\"trans\":\"matar a los hombres degradados de clase baja\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"daśākṛti-kṛte kṛṣṇāya\",\"trans\":\"¡oh Tú que apareces en las formas de estas diez encarnaciones!\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"tubhyaṁ\",\"trans\":\"¡Oh, Señor Kṛṣṇa!\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"namaḥ\",\"trans\":\"te ofrezco mis reverencias\",\"sep\":\"\",\"error\":\"mismatch\"}]]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/krsnachaitanya-das/39-sri-dasavatar-stotram-2\"}]},\"hasWbw\":true,\"hasVersesText\":true,\"hasVersesTranslations\":true,\"fullInlineWbw\":false}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L45\",null,{\"audio\":\"$3b:props:song:resources:audio\",\"language\":\"es\"}]\n3d:[\"$\",\"$L46\",null,{\"navMap\":{\"279\":{\"prev\":{\"path\":\"/es/jayare-jayare-jaya-paramahamsa-mahashiaya/\",\"title\":\"Āchārya vandana\"},\"next\":{\"path\":\"/es/namas-te-narasimhaya/\",\"title\":\"Śrī Nṛsiṁha Praṇām\"}}}}]\n47:T5eb,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/es/pralaya-payodhi-jale-dhritavan-asi-vedam\",\"url\":\"https://kirtan.site/es/pralaya-payodhi-jale-dhritavan-asi-vedam\",\"name\":\"Śrī Daśāvatār-stotram. Śrīla Jayadev Goswāmī\",\"inLanguage\":\"es\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/es/pralaya-payodhi-jale-dhritavan-asi-vedam#composition\",\"alternateName\":[\"pralaya-payodhi-jale dhṛtavān asi vedaṁ\"],\"name\":\"Śrī Daśāvatār-stotram. Śrīla Jayadev Goswāmī\",\"url\":\"https://kirtan.site/es/pralaya-payodhi-jale-dhritavan-asi-vedam\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEntityOfPage\":{\"@id\":\"https://kirtan.site/es/pralaya-payodhi-jale-dhritavan-asi-vedam\"},\"audio\":[{\"@type\":\"MusicRecording\",\"name\":\"Śrī Daśāvatār-stotram. Śrīla Jayadev Goswāmī\",\"url\":\"https://soundcloud.com/krsnachaitanya
