a\",\"sādhu-saṅga kori,    hari bhaja jodi,\",\"        tobe anta hoy kleśa\"],\"word_by_word\":[\"**e** — esta; **ghora** — horrible; **saṁsāre** — en la existencia material; **poḍiyā** — caer; **mānava** — humano; **na** — no; **pāya** — obtiene; **duḥkhera** — de la infelicidad; **śeṣa** — sin fin; **sādhu-saṅga** — asociación de santos; **kori** — hacer; **hari** — el Señor Hari; **bhaja** — adorar; **jodi** — cuando; **tobe** — entonces; **anta** — al final; **hoy** — es; **kleśa** — miseria.\"],\"translation\":[\"Para esa persona que ha caído en este mundo material de nacimiento y muerte, su infelicidad no tiene fin. Sin embargo, por asociarse con los devotos y por adorar al Señor Hari, toda su tristeza y sufrimiento se acaban.\"]},{\"number\":\"2\",\"text\":[\"viṣaya anale,        jvaliche hṛdaya,\",\"        anale boḍe anal\",\"aparādha chāḍi’        loy kṛṣṇa-nāma,\",\"        anale paḍaye jola\"],\"word_by_word\":[\"**viṣaya** — del disfrute material; **anale** — en el fuego; **jvaliche** — quema; **hrdaya** — corazón; **anale** — en el fuego; **boḍe** — incrementa; **anal** — fuego; **aparādha** — ofensa; **chāḍi’** — abandonar; **loy** — toma; **kṛṣṇa-nāma** — el nombre de Kṛṣṇa; **anale** — del fuego; **paḍaye** — cae; **jola** — agua.\"],\"translation\":[\"El corazón arde en el fuego de la gratificación de los sentidos, y ese fuego quema más y más. Evita las ofensas y canta los Santos Nombres del Señor Kṛṣṇa, pues eso derramará agua sobre el fuego.\"]},{\"number\":\"3\",\"text\":[\"nitāi chaitanya,        charaṇa-kamale\",\"        āśroya loilo jei\",\"kālidās bole        jīvane maraṇe,\",\"        āmāra āśroya sei\"],\"word_by_word\":[\"**nitāi chaitanya** — Nitāi y Chaitanya; **charaṇa-kamale** — de los pies de loto; **āśroya** — el refugio; **loilo** — acepta; **jei** — aquel; **kālidās** — Kalidās; **bole** — dice; **jīvane** — en la vida; **maraṇe** — en la muerte; **āmāra** — mío; **āśroya** — refugio; **sei** — este.\"],\"translation\":[\"Kālidās dice: “Quienquiera que se haya refugiado en los pies de loto del Señor Chaitanya y el Señor Nityānanda, es mi refugio en la vida y en la muerte”.\"]}],\"resources\":{}}}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L45\",null,{\"navMap\":{\"166\":{\"prev\":{\"path\":\"/es/manasa-deho-geho-jo-kichu-mora/\",\"title\":\"Atma Nivedana, 3\"},\"next\":{\"path\":\"/es/dushta-mana-tumi-kisera-vaishnava/\",\"title\":\"Vaiṣṇava Ke?\"}}}}]\n3f:[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@graph\\\":[{\\\"@type\\\":\\\"CollectionPage\\\",\\\"@id\\\":\\\"https://kirtan.site/es/e-ghora-samsare-podiya-manava\\\",\\\"url\\\":\\\"https://kirtan.site/es/e-ghora-samsare-podiya-manava\\\",\\\"name\\\":\\\"E ghora saṁsare. Kālidās\\\",\\\"inLanguage\\\":\\\"es\\\",\\\"isPartOf\\\":{\\\"@id\\\":\\\"https://kirtan.site/#website\\\"}},{\\\"@type\\\":\\\"MusicComposition\\\",\\\"@id\\\":\\\"https://kirtan.site/es/e-ghora-samsare-podiya-manava#composition\\\",\\\"alternateName\\\":[\\\"e ghora saṁsāre\\\"],\\\"name\\\":\\\"E ghora saṁsare. Kālidās\\\",\\\"url\\\":\\\"https://kirtan.site/es/e-ghora-samsare-podiya-manava\\\",\\\"isPartOf\\\":{\\\"@id\\\":\\\"https://kirtan.site/#website\\\"},\\\"about\\\":[{\\\"@type\\\":\\\"Thing\\\",\\\"name\\\":\\\"Bhakti Yoga\\\"},{\\\"@type\\\":\\\"Thing\\\",\\\"name\\\":\\\"Gaudiya Vaishnavism\\\"}],\\\"genre\\\":[\\\"Devotional\\\",\\\"Bhajan\\\",\\\"Kirtan\\\"],\\\"mainEntityOfPage\\\":{\\\"@id\\\":\\\"https://kirtan.site/es/e-ghora-samsare-podiya-manava\\\"}}]}\"}}]\n40:[\"$\",\"$L46\",null,{\"bookId\":\"es\",\"page\":166}]\n41:[\"$\",\"$L47\",null,{\"bookId\":\"es\",\"songId\":\"e-ghora-samsare-podiya-manava\"}]\n42:[\"$\",\"$L48\",null,{}]\n"])</script></body></html>
