\"}}]],[],[[\"$\",\"div\",\"Śrīla Premānanda Dās\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Premānanda Dās\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3b:[\"$\",\"$L41\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":393,\"first_line\":\"emona gaurāṅga bine\"},\"title\":[\"Emona Gaurāṅga bine nāhi āra\"],\"word_by_word\":[\"**emona** — tal como; **gaurāṅga** — Gaurāṅga; **bine** — sin él; **nāhi** — no hay; **āra** — más.\"],\"author\":[\"Śrīla Premānanda Dās\"],\"verses\":[{\"number\":\"1\",\"text\":[\"    emona gaurāṅga bine nāhi āra\",\"heno avatāra    hobe ki hoyeche\",\"    heno prema parachāra\"],\"word_by_word\":[\"**emona** — tal como; **gaurāṅga** — Gaurāṅga; **bine** — sin él; **nāhi** — no hay; **āra** — más; **heno** — tal cual; **avatāra** — encarnación; **hobe** — habrá; **ki** — cómo; **hoyeche** — hizo; **heno** — tal cual; **prema** — amor divino; **parachāra** — predicar.\"],\"translation\":[\"¡No hay nadie como el Señor Gaurāṅga! ¿Habrá alguna vez una encarnación tal como Él, una encarnación que predique el amor extático por Dios tal como Él lo hizo?\"]},{\"number\":\"2\",\"text\":[\"duramati ati    patita pāṣaṇdī\",\"    prāṇe nā mārilo kore\",\"harināma diye    hṛdoya śodhilo\",\"    jachi giyā ghore ghore\"],\"word_by_word\":[\"**duramati** — malvado; **ati** — muy; **patita** — caído; **pāṣaṇdī** — ateo; **prāṇe** — su vida; **nā** — no; **mārilo** — mató; **kore** — hacer; **harināma** — el nombre de Hari; **diye** — suplicó; **hṛdoya** — corazón; **śodhilo** — pidió; **jachi** — valorar; **giyā** — ir; **ghore** — casa; **ghore** — casa.\"],\"translation\":[\"Él no mató a los caídos blasfemos de corazón malvado. Más bien fue a visitarlos, de casa en casa. Les suplicó que cantaran los Santos Nombres del Señor Kṛṣṇa. Les dio los Santos Nombres y purificó sus corazones.\"]},{\"number\":\"3\",\"text\":[\"bhava biriñchira    vāñchito je prema\",\"    jagata phelilo ḍhāli\",\"kāṅgāle pāiyā    khā-ilo nāchiye\",\"    bājāiye karatāli\"],\"word_by_word\":[\"**bhava** — éxtasis; **biriñchira** — a Brahmā (o semidioses); **vāñchito** — deseo; **je prema** — del amor; **jagata** — del mundo; **phelilo** — dejó; **ḍhāli** — inclinarse; **kāṅgāle** — de mendigos; **pāiyā** — obtener; **khā-ilo** — tomaron; **nāchiye** — danzar; **bājāiye** — tocaron; **karatāli** — aplaudir.\"],\"translation\":[\"Generosamente, le dio a la gente el extraordinario regalo del amor extático por Dios, un regalo que incluso Brahmā y Śiva únicamente lo consiguen con gran dificultad. Cuando recibieron ese regalo, las pobres personas de este mundo bailaron y aplaudieron.\"]},{\"number\":\"4\",\"text\":[\"hāsiye kādiye    preme gaḍāgaḍi\",\"    pulake byāpilo aṅga\",\"chaṇḍāle brāhmaṇe    kore kolākuli\",\"    kobe bā chilo e raṅga\"],\"word_by_word\":[\"**hāsiye** — reir; **kādiye** — llorar; **preme** — de amor divino; **gaḍāgaḍi** — rodando en el suelo; **pulake** — en éxtasis; **byāpilo** — empapado; **aṅga** — cuerpo; **chaṇḍāle** — hombres bajos; **brāhmaṇe** — *brāhmaṇa*; **kore** — hizo; **kolākuli** — abrazar; **kobe** — cuando; **bā chilo** — allí ocurrió; **e raṅga** — ese pasatiempo.\"],\"translation\":[\"Ellos rieron y lloraron; embargados de éxtasis, rodaron por el suelo. Los vellos de sus cuerpos se erizaron. Los *brāhmaṇas* y los *chaṇḍālas* se abrazaron. Hubo una gran dicha.\"]},{\"number\":\"5\",\"text\":[\"ḍākiye hā̐kiye    khol karatāle\",\"    gāiye dhāiye phire\",\"dekhiyā śamana    tarāsa pāiye\",\"    kapaṭa hānilo dvāre\"],\"word_by_word\":[\"**ḍākiye** — cantar fuerte; **hā̐kiye** — tocando; **khol** — el tambor (*mṛdaṅga*); **karatāle** — címbalos; **gāiye** — cantaron; **dhāiye** — corrieron; **phire** — deambular; **dekhiyā** — viendo; **śamana** — igual; **tarāsa** — rápidamente; **pāiye** — obtener; **kapaṭa** — la puerta; **hānilo** — tocó; **dvāre** — a la puerta.\"],\"translation\":[\"Cantaron fuertemente los Santos Nombres tocando las *mṛdaṅgas* y los címbalos. Cantaron, corrieron y bailaron en un círculo. Al ver esto, la tranquila serenidad tuvo miedo, huyó y tocó las puertas de la gente.\"]}],\"resources\":{}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L42\",null,{\"navMap\":{\"393\":{\"prev\":{\"path\":\"/es/hari-he-dayala-mora-jaya-radha-natha?p=392\",\"title\":\"Dainya O Prapatti\"},\"next\":{\"path\":\"/es/kali-ghora-timire-garasala-jagajana?p=395\",\"title\":\"Kali-ghora timire\"}}}}]\n3d:[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@graph\\\":[{\\\"@type\\\":\\\"CollectionPage\\\",\\\"@id\\\":\\\"https://kirtan.site/es/emona-gauranga-bine-nahi-ara\\\",\\\"url\\\":\\\"https://kirtan.site/es/emona-gauranga-bine-nahi-ara\\\",\\\"name\\\":\\\"Emona Gaurāṅga bine nāhi āra. Śrīla Premānanda Dās\\\",\\\"inLanguage\\\":\\\"es\\\",\\\"isPartOf\\\":{\\\"@id\\\":\\\"https://kirtan.site/#website\\\"}},{\\\"@type\\\":\\\"MusicComposition\\\",\\\"@id\\\":\\\"https://kirtan.site/es/emona-gauranga-bine-nahi-ara#composition\\\",\\\"alternateName\\\":[\\\"emona gaurāṅga bine\\\"],\\\"name\\\":\\\"Emona Gaurāṅga bine nāhi āra. Śrīla Premānanda Dās\\\",\\\"url\\\":\\\"https://kirtan.site/es/emona-gauranga-bine-nahi-ara\\\",\\\"isPartOf\\\":{\\\"@id\\\":\\\"https://kirtan.site/#website\\\"},\\\"about\\\":[{\\\"@type\\\":\\\"Thing\\\",\\\"name\\\":\\\"Bhakti Yoga\\\"},{\\\"@type\\\":\\\"Thing\\\",\\\"name\\\":\\\"Gaudiya Vaishnavism\\\"}],\\\"genre\\\":[\\\"Devotional\\\",\\\"Bhajan\\\",\\\"Kirtan\\\"],\\\"mainEntityOfPage\\\":{\\\"@id\\\":\\\"https://kirtan.site/es/emona-gauranga-bine-nahi-ara\\\"}}]}\"}}]\n3e:[\"$\",\"$L43\",null,{\"bookId\":\"es\",\"page\":393}]\n3f:[\"$\",\"$L44\",null,{\"bookId\":\"es\",\"songId\":\"emona-gauranga-bine-nahi-ara\"}]\n"])</script></body></html>
