=\\\"SongHeader__term\\\"\u003edainya\u003c/i\u003e — humildad; \u003ci class=\\\"SongHeader__term\\\"\u003eprārthana\u003c/i\u003e — súplica; \u003ci class=\\\"SongHeader__term\\\"\u003egīti\u003c/i\u003e — canción.\"}}]],[],[[\"$\",\"div\",\"Śrīla Bhakti Vinod Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Bhakti Vinod Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3b:[\"$\",\"$L43\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":144,\"first_line\":\"kabe śrī chaitanya more-koribena doyā\"},\"title\":[\"Dainya Prārthanā Gīti\"],\"word_by_word\":[\"**dainya** — humildad; **prārthana** — súplica; **gīti** — canción.\"],\"author\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"kabe śrī chaitanya more-koribena doyā\",\"kabe āmi pāibo vaiṣṇava-pada-chāyā\"],\"word_by_word\":[\"**kabe** — ¿cuándo?; **śrī chaitanya** — el Señor Śrī Chaitanya; **more** — a mí; **koribena** — otorga; **doyā** — misericordia; **kabe** — ¿cuándo?; **āmi** — yo; **pāibo** — obtendré; **vaiṣṇava-pada** — los pies de los Vaiṣṇavas; **chāyā** — la sombra.\"],\"translation\":[\"¿Cuándo me concederá Su misericordia el Señor Chaitanya? ¿Cuándo me refugiaré en la sombra de los sagrados pies de los Vaiṣṇavas?\"]},{\"number\":\"2\",\"text\":[\"kabe āmi chāḍibo e viṣayābhimān\",\"kabe viṣṇu-jane āmi karibo sammān\"],\"word_by_word\":[\"**kabe** — ¿cuándo?; **āmi** — yo; **chāḍibo** — renunciaré; **e** — este; **viṣaya** — material; **ābhimān** — orgullo; **kabe** — ¿cuándo?; **viṣṇu-jane** — los devotos; **āmi** — yo; **karibo** — haré; **sammān** — honor.\"],\"translation\":[\"¿Cuándo abandonaré el ego falso de ser un disfrutador y cuándo ofreceré todo respeto a los sinceros devotos del Señor Viṣṇu?\"]},{\"number\":\"3\",\"text\":[\"galabastra kṛtāñjali vaiṣṇava-nikaṭe\",\"dante tṛṇa kari dā̐ḍāibo niṣkapaṭe\"],\"word_by_word\":[\"**gala** — en el cuello; **bastra** — tela; **kṛtāñjali** — manos juntas; **vaiṣṇava-nikaṭe** — cerca de los Vaiṣṇavas; **dante** — dientes; **tṛṇa** — brizna de hierba; **kari** — hacer; **dā̐ḍāibo** — me presentaré; **niṣkapaṭe** — snceramente.\"],\"translation\":[\"¿Cuándo me presentaré a los pies del Vaiṣṇava con la vestimenta de la rendición alrededor de mi cuello y con una paja entre mis dientes?\"]},{\"number\":\"4\",\"text\":[\"kā̐diyā kā̐diyā jānāibo duḥkhagrām\",\"saṁsāra-anala hoite māgibo viśrām\"],\"word_by_word\":[\"**kā̐diyā** — llorando; **kā̐diyā** — y llorando; **jānāibo** — sabré; **duḥkha-grām** — los muchos sufrimientos; **saṁsāra-anala** — el fuego ardiente del mundo material; **hoite** — desde; **māgibo** — seré; **viśrām** — aliviado.\"],\"translation\":[\"¿Cuándo, llorando una y otra vez, presentaré mi triste relato a los pies del Vaiṣṇava y cuándo buscaré alivio del fuego de la existencia material rogándole al Vaiṣṇava que me otorgue refugio y descanso?\"]},{\"number\":\"5\",\"text\":[\"śuniyā āmāra duḥkha vaiṣṇava ṭhākura\",\"āmā’ lāgi’ kṛṣṇe āvedibena prachura\"],\"word_by_word\":[\"**śuniyā** — escuchando; **āmāra** — mío; **duḥkha** — sufrimiento; **vaiṣṇava** — los devotos; **ṭhākura** — santos; **āmā’** — a mí; **lāgi’** — tomar; **kṛṣṇe** — a Kṛṣṇa; **āvedibena** — solicitará; **prachura** — grandemente.\"],\"translation\":[\"Cuando ese Vaiṣṇava escuche el relato de mi aflicción mundana, intercederá por mí en sus oraciones ante Kṛṣṇa.\"]},{\"number\":\"6\",\"text\":[\"vaiṣṇavera āvedane kṛṣṇa doyāmoy\",\"e heno pāmara prati haben sadoy\"],\"word_by_word\":[\"**vaiṣṇavera** — de los Vaiṣṇavas; **āvedane** — solicitud; **kṛṣṇa** — Kṛṣṇa; **doyāmoy** — misericordioso; **e** — este; **heno** — tal; **pāmara** — desdichado; **prati** — hacia; **haben** — será; **sadoy** — misericordioso.\"],\"translation\":[\"Y Kṛṣṇa, satisfecho con la oración de ese Vaiṣṇava, será bondadoso con este malvado y pecaminoso desdichado.\"]},{\"number\":\"7\",\"text\":[\"vinodera nivedan vaiṣṇava-charaṇe\",\"kṛpā kori saṅge laha ei akiñchane\"],\"word_by_word\":[\"**vinodera** — de Bhakti Vinod; **nivedan** — solicitud; **vaiṣṇava-charaṇe** — a los pies de los devotos; **kṛpā** — misericordia; **kori** — hacer; **saṅge** — en la asociación; **laha** — por favor acepta; **ei** — este; **akiñchane** — quien no tiene propiedad.\"],\"translation\":[\"Bhaktivinod Ṭhākur presenta esta oración a los pies de loto de los Vaiṣṇavas: “Concédanme su gracia y acepten esta alma inferior en su asociación”.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-kobe-sri\"},{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Навадвипский храм\",\"ua\":\"Навадвіпський храм\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-kobe-sri\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L44\",null,{\"audio\":\"$3b:props:song:resources:audio\",\"language\":\"es\"}]\n3d:[\"$\",\"$L45\",null,{\"navMap\":{\"144\":{\"prev\":{\"path\":\"/es/ke-jabi-ke-jabi-bhai-bhava-sindhu-para/\",\"title\":\"Ke jabi ke jabi\"},\"next\":{\"path\":\"/es/kabe-habe-heno-dashia-mora/\",\"title\":\"Prārthana Lalasāmayī, 9\"}}}}]\n46:T7ac,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/es/kobe-shri-chaitanya-more-koribena-daya\",\"url\":\"https://kirtan.site/es/kobe-shri-chaitanya-more-koribena-daya\",\"name\":\"Dainya Prārthanā Gīti. Śrīla Bhakti Vinod Ṭhākur\",\"inLanguage\":\"es\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/es/kobe-shri-chaitanya-more-koribena-daya#composition\",\"alternateName\":[\"kabe śrī chaitanya more-koribena doyā\"],\"name\":\"Dainya Prārthanā Gīti. Śrīla Bhakti Vin
