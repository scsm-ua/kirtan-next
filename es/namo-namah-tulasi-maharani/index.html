lazada\",\"sep\":\"\"}]]},{\"number\":\"4\",\"text\":[\"dhanya tulasī pūraṇa tapa kiye\",\"śrī-śālagrāma-mahā-pāṭarāṇī\"],\"word_by_word\":[\"**dhanya** — afortunada; **tulasī** — Tulasī; **pūraṇa** — cumpliendo; **tapa** — austeridad; **kiye** — realizar; **śrī-śālagrāma** — deidad adorable; **mahā-pāṭarāṇī** — la adorable consorte.\"],\"translation\":[\"¡Oh, afortunada Tulasī! Mediante la ejecución de tus austeridades, has llegado a ser la adorable consorte de Śrī Śālagrām.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"dhanya\",\"trans\":\"afortunada\",\"sep\":\" \"},{\"text\":\"tulasī\",\"trans\":\"Tulasī\",\"sep\":\" \"},{\"text\":\"pūraṇa\",\"trans\":\"cumpliendo\",\"sep\":\" \"},{\"text\":\"tapa\",\"trans\":\"austeridad\",\"sep\":\" \"},{\"text\":\"kiye\",\"trans\":\"realizar\",\"sep\":\"\"}],[{\"text\":\"śrī-śālagrāma\",\"trans\":\"deidad adorable\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"mahā-pāṭarāṇī\",\"trans\":\"la adorable consorte\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"5\",\"text\":[\"dhūpa, dīpa, naivedya, ārati\",\"phulanā kiye varakhā varakhāni\"],\"word_by_word\":[\"**dhūpa** — incienso; **dīpa** — lámpara; **naivedya** — alimentos; **ārati** — ceremonia; **phulanā** — de flores; **kiye** — tanto; **varakhā** — derramar; **varakhāni** — la que derrama gracia.\"],\"translation\":[\"Derramas tu misericordia sobre quienquiera que te ofrece un incienso, una lámpara, alimentos, adoración y flores.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"dhūpa\",\"trans\":\"incienso\",\"sep\":\", \"},{\"text\":\"dīpa\",\"trans\":\"lámpara\",\"sep\":\", \"},{\"text\":\"naivedya\",\"trans\":\"alimentos\",\"sep\":\", \"},{\"text\":\"ārati\",\"trans\":\"ceremonia\",\"sep\":\"\"}],[{\"text\":\"phulanā\",\"trans\":\"de flores\",\"sep\":\" \"},{\"text\":\"kiye\",\"trans\":\"tanto\",\"sep\":\" \"},{\"text\":\"varakhā\",\"trans\":\"derramar\",\"sep\":\" \"},{\"text\":\"varakhāni\",\"trans\":\"la
