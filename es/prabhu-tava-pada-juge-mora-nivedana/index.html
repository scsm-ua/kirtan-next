p\":\" \"},{\"text\":\"vā\",\"trans\":\"o\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"jagad-īśa\",\"trans\":\"¡oh, Señor del universo!\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"kāmaye\",\"trans\":\"deseo\",\"sep\":\"\"}],[{\"text\":\"mama\",\"trans\":\"mi\",\"sep\":\" \"},{\"text\":\"janmani-janmanīśvare\",\"trans\":\"nacimiento tras nacimiento\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"bhavatād\",\"trans\":\"a la Suprema Personalidad de Dios\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"bhaktir\",\"trans\":\"que haya\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"ahaitukī\",\"trans\":\"servicio devocional\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"tvayi\",\"trans\":\"sin motivación\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"1\",\"text\":[\"prabhu tava pada-juge mora nivedana\",\"nāhi māgi deho-sukha, vidyā dhana, jana\"],\"word_by_word\":[\"**prabhu** — ¡oh Señor!; **tava** — Tuyo; **pada-juge** — a los pies; **mora** — mío; **nivedana** — súplica; **nāhi** — no; **māgi** — pido; **deho** — del cuerpo; **sukha** — felicidad; **vidyā** — conocimiento; **dhana** — riqueza; **jana** — seguidores.\"],\"translation\":[\"¡Oh, Señor! Esta es mi humilde súplica a Tus pies de loto. No te pido placer sensual, erudición, riqueza o seguidores.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"prabhu\",\"trans\":\"¡oh Señor!\",\"sep\":\" \"},{\"text\":\"tava\",\"trans\":\"Tuyo\",\"sep\":\" \"},{\"text\":\"pada-juge\",\"trans\":\"a los pies\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"mora\",\"trans\":\"mío\",\"sep\":\" \"},{\"text\":\"nivedana\",\"trans\":\"súplica\",\"sep\":\"\"}],[{\"text\":\"nāhi\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"māgi\",\"trans\":\"pido\",\"sep\":\" \"},{\"text\":\"deho\",\"trans\":\"del cuerpo\",\"sep\":\"-\"},{\"text\":\"sukha\",\"trans\":\"felicidad\",\"sep\":\", \"},{\"text\":\"vidyā\",\"trans\":\"conocimiento\",\"sep\":\" \"},{\"text\":\"dhana\",\"trans\":\"riqueza\",\"sep\":\", \"},{\"text\":\"jana\",\"trans\":\"seguidores\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"nāhi māgi svarga, āro mokṣa nāhi māgi\",\"nā kori prārthanā kono vibhūtira lāgi\"],\"word_by_word\":[\"**nāhi** — no; **māgi** — pido; **svarga** — Svargaloka; **āro** — o; **mokṣa** — liberación; **nāhi** — no; **māgi** — pido; **nā** — no; **kori** — hago; **prārthanā** — pedido; **kono** — algo; **vibhūtira** — poder; **lāgi** — relacionado.\"],\"translation\":[\"No mendigo la residencia en los planetas celestiales ni deseo liberarme de esta existencia material. No oro con el fin de lograr algún poder místico.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"nāhi\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"māgi\",\"trans\":\"pido\",\"sep\":\" \"},{\"text\":\"svarga\",\"trans\":\"Svargaloka\",\"sep\":\", \"},{\"text\":\"āro\",\"trans\":\"o\",\"sep\":\" \"},{\"text\":\"mokṣa\",\"trans\":\"liberación\",\"sep\":\" \"},{\"text\":\"nāhi\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"māgi\",\"trans\":\"pido\",\"sep\":\"\"}],[{\"text\":\"nā\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"kori\",\"trans\":\"hago\",\"sep\":\" \"},{\"text\":\"prārthanā\",\"trans\":\"pedido\",\"sep\":\" \"},{\"text\":\"kono\",\"trans\":\"algo\",\"sep\":\" \"},{\"text\":\"vibhūtira\",\"trans\":\"poder\",\"sep\":\" \"},{\"text\":\"lāgi\",\"trans\":\"relacionado\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"nija-karma-guṇa-doṣe je je janma pāi\",\"janme janme jeno tava nāma-guṇa gāi\"],\"word_by_word\":[\"**nija** — propio; **karma** — actividades; **guṇa** — cualidades; **doṣe** — faltas; **je je** — lo que sea; **janma** — nacimiento; **pāi** — obtengo; **janme janme** — nacimiento tras nacimiento; **jeno** — tal como; **tava** — Tuyo; **nāma** — del nombre; **guṇa** — cualidades; **gāi** — yo canto.\"],\"translation\":[\"Mi ruego es que, cualquiera que sea el nacimiento que tenga que aceptar debido a los resultados de mi *karma* previo, yo pueda cantar nacimiento tras nacimiento las glorias de Tu Santo Nombre.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"nija\",\"trans\":\"propio\",\"sep\":\"-\"},{\"text\":\"karma\",\"trans\":\"actividades\",\"sep\":\"-\"},{\"text\":\"guṇa\",\"trans\":\"cualidades\",\"sep\":\"-\"},{\"text\":\"doṣe\",\"trans\":\"faltas\",\"sep\":\" \"},{\"text\":\"je je\",\"trans\":\"lo que sea\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"janma\",\"trans\":\"nacimiento\",\"sep\":\" \"},{\"text\":\"pāi\",\"trans\":\"obtengo\",\"sep\":\"\"}],[{\"text\":\"janme janme\",\"trans\":\"nacimiento tras nacimiento\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jeno\",\"trans\":\"tal como\",\"sep\":\" \"},{\"text\":\"tava\",\"trans\":\"Tuyo\",\"sep\":\" \"},{\"text\":\"nāma\",\"trans\":\"del nombre\",\"sep\":\"-\"},{\"text\":\"guṇa\",\"trans\":\"cualidades\",\"sep\":\" \"},{\"text\":\"gāi\",\"trans\":\"yo canto\",\"sep\":\"\"}]]},{\"number\":\"4\",\"text\":[\"ei mātra āśā mama tomāra charaṇe\",\"ahaitukī bhakti hṛde jāge anukṣaṇe\"],\"word_by_word\":[\"**ei** — esto; **mātra** — únicamente; **āśā** — deseo; **mama** — mío; **tomāra** — Tuyo; **charaṇe** — a los pies; **ahaitukī** — sin causa; **bhakti** — servicio devocional; **hṛde** — en el corazón; **jāge** — despertará; **anukṣaṇe** — a cada momento.\"],\"translation\":[\"Esta es mi única y querida esperanza, mi aspiración, mi oración a Tus pies de loto: Que en mi corazón se despierte la devoción inmotivada e ininterrumpida y que fluya hacia Ti.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"ei\",\"trans\":\"esto\",\"sep\":\" \"},{\"text\":\"mātra\",\"trans\":\"únicamente\",\"sep\":\" \"},{\"text\":\"āśā\",\"trans\":\"deseo\",\"sep\":\" \"},{\"text\":\"mama\",\"trans\":\"mío\",\"sep\":\" \"},{\"text\":\"tomāra\",\"trans\":\"Tuyo\",\"sep\":\" \"},{\"text\":\"charaṇe\",\"trans\":\"a los pies\",\"sep\":\"\"}],[{\"text\":\"ahaitukī\",\"trans\":\"sin causa\",\"sep\":\" \"},{\"text\":\"bhakti\",\"trans\":\"servicio devocional\",\"sep\":\" \"},{\"text\":\"hṛde\",\"trans\":\"en el corazón\",\"sep\":\" \"},{\"text\":\"jāge\",\"trans\":\"despertará\",\"sep\":\" \"},{\"text\":\"anukṣaṇe\",\"trans\":\"a cada momento\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"viṣoye je prīti ebe āchoye āmāra\",\"sei-mata prīti hauk charaṇe tomāra\"],\"word_by_word\":[\"**viṣoye** — de los objetos de los sentidos; **je prīti** — tal amor; **ebe** — ahora; **āchoye** — es; **āmāra** — mío; **sei-mata** — de esta manera; **prīti** — amor; **hauk** — puede ser; **charaṇe** — a los pies; **tomāra** — Tuyos.\"],\"translation\":[\"Permíteme amar Tus pies de loto tanto como ahora amo la gratificación de los sentidos; transfiere mi afecto por los objetos de los sentidos hacia Tus pies de loto.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"viṣoye\",\"trans\":\"de los objetos de los sentidos\",\"sep\":\" \"},{\"text\":\"je prīti\",\"trans\":\"tal amor\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"ebe\",\"trans\":\"ahora\",\"sep\":\" \"},{\"text\":\"āchoye\",\"trans\":\"es\",\"sep\":\" \"},{\"text\":\"āmāra\",\"trans\":\"mío\",\"sep\":\"\"}],[{\"text\":\"sei-mata\",\"trans\":\"de esta manera\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"prīti\",\"trans\":\"amor\",\"sep\":\" \"},{\"text\":\"hauk\",\"trans\":\"puede ser\",\"sep\":\" \"},{\"text\":\"charaṇe\",\"trans\":\"a los pies\",\"sep\":\" \"},{\"text\":\"tomāra\",\"trans\":\"Tuyos\",\"sep\":\"\"}]]},{\"number\":\"6\",\"text\":[\"bipade sampade tāhā thākuka samabhāve\",\"dine dine bṛddhi hauk nāmera prabhāve\"],\"word_by_word\":[\"**bipade** — en la calamidad; **sampade** — en la buena fortuna; **tāhā** — eso; **thākuka** — pueda ser; **samabhāve** — igualdad; **dine dine** — día a día; **bṛddhi** — incrementa; **hauk** — puede ser; **nāmera** — del nombre; **prabhāve** — poder.\"],\"translation\":[\"En el peligro o en el éxito, en la buena fortuna o en la calamidad, permíteme permanecer equilibrado. Y deja que mi afecto por Ti se incremente día tras día mediante la influencia del Santo Nombre.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"bipade\",\"trans\":\"en la calamidad\",\"sep\":\" \"},{\"text\":\"sampade\",\"trans\":\"en la buena fortuna\",\"sep\":\" \"},{\"text\":\"tāhā\",\"trans\":\"eso\",\"sep\":\" \"},{\"text\":\"thākuka\",\"trans\":\"pueda ser\",\"sep\":\" \"},{\"text\":\"samabhāve\",\"trans\":\"igualdad\",\"sep\":\"\"}],[{\"text\":\"dine dine\",\"trans\":\"día a día\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"bṛddhi\",\"trans\":\"incrementa\",\"sep\":\" \"},{\"text\":\"hauk\",\"trans\":\"puede ser\",\"sep\":\" \"},{\"text\":\"nāmera\",\"trans\":\"del nombre\",\"sep\":\" \"},{\"text\":\"prabhāve\",\"trans\":\"poder\",\"sep\":\"\"}]]},{\"number\":\"7\",\"text\":[\"paśu-pakṣī hoye thāki svarge bā niroye\",\"tava bhakti rahu bhaktivinoda-hṛdoye\"],\"word_by_word\":[\"**paśu** — bestias; **pakṣī** — aves; **hoye** — puede ser; **thāki** — permanece; **svarge** — en Svarga; **bā** — o; **niroye** — el infierno; **tava** — por Ti; **bhakti** — devoción; **rahu** — que sea; **bhaktivinoda-hṛdoye** — en el corazón de Bhakti Vinod.\"],\"translation\":[\"Ya sea que viva como un ave o como una bestia, en el cielo o en el infierno, permite que este humilde Bhakti Vinod siempre acaricie la devoción a Ti en lo más íntimo de su corazón.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"paśu\",\"trans\":\"bestias\",\"sep\":\"-\"},{\"text\":\"pakṣī\",\"trans\":\"aves\",\"sep\":\" \"},{\"text\":\"hoye\",\"trans\":\"puede ser\",\"sep\":\" \"},{\"text\":\"thāki\",\"trans\":\"permanece\",\"sep\":\" \"},{\"text\":\"svarge\",\"trans\":\"en Svarga\",\"sep\":\" \"},{\"text\":\"bā\",\"trans\":\"o\",\"sep\":\" \"},{\"text\":\"niroye\",\"trans\":\"el infierno\",\"sep\":\"\"}],[{\"text\":\"tava\",\"trans\":\"por Ti\",\"sep\":\" \"},{\"text\":\"bhakti\",\"trans\":\"devoción\",\"sep\":\" \"},{\"text\":\"rahu\",\
