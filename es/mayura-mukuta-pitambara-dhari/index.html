ada con una pluma de pavo real y que vistes con ropas de color dorado!\"]},{\"number\":\"2\",\"text\":[\"śrī-rādhā-mādhava kuñja-bihārī\",\"muralīdhara govardhana-dhārī\"],\"word_by_word\":[\"**śrī-rādhā-mādhava** — Śrī Śrī Rādhā Kṛṣṇa; **kuñja-bihārī** — quien disfruta en las arboledas; **muralī-dhara** — quien sostiene la flauta (*muralī*); **govardhana-dhārī** — quien sostiene la colina de Govardhan.\"],\"translation\":[\"¡Oh, Kṛṣṇa, el que sostiene la flauta Muralī y el que ha levantado la colina Govardhan! ¡Oh, Kṛṣṇa, el Señor de Śrīmatī Rādhārāṇī, quien juega en los bosquecillos de Śrī Vṛndāvan!\"]},{\"number\":\"3\",\"text\":[\"jaya yaśodā-nandana kṛṣṇa murāri\",\"muralīdhara govardhana-dhārī\"],\"word_by_word\":[\"**jaya** — toda gloria; **yaśodā-nandana** — el hijo de Yaśodā; **kṛṣṇa** — Kṛṣṇa; **murāri** — el destructor del demonio Mura; **muralī-dhara** — quien sostiene la flauta (*muralī*); **govardhana-dhārī** — quien sostiene la colina de Govardhan.\"],\"translation\":[\"¡Oh, Kṛṣṇa, el que sostiene la flauta Muralī y el que ha levantado la colina Govardhan! Todas las glorias a Ti, Kṛṣṇa, el hijo de Madre Yaśodā y el destructor del demonio Mura.\"]},{\"number\":\"4\",\"text\":[\"jaya gopī-jana-ballabha vaṁśī-bihārī\",\"muralīdhara govardhana-dhārī\"],\"word_by_word\":[\"**jaya** — toda gloria; **gopī-jana-ballabha** — el amante de las pastorcillas; **vaṁśī-bihārī** — quien toca la flauta (*vaṁśī*); **muralī-dhara** — quien sostiene la flauta (*muralī*); **govardhana-dhārī** — quien sostiene la colina de Govardhan.\"],\"translation\":[\"¡Oh, Kṛṣṇa, el que sostiene la flauta Muralī y el que ha levantado la colina Govardhan! Todas las glorias a Ti, Kṛṣṇa, el muy querido amante de las pastorcillas de vacas de Vṛndāvan y el que toca la flauta Vaṁśī.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Sadhu Priya Prabhu\",\"ru\":\"Садху Прия Прабху\",\"ua\":\"Садгу Прія Прабгу\"},\"embed_url\":\"https://soundcloud.com/huron/mayura-mukuta\"}]}}}]\n"])</script>
