erHTML\":{\"__html\":\"\u003ci class=\\\"SongHeader__term\\\"\u003eśrī vaiṣṇava\u003c/i\u003e — venerable devoto; \u003ci class=\\\"SongHeader__term\\\"\u003emahimā\u003c/i\u003e — glorias; \u003ci class=\\\"SongHeader__term\\\"\u003egīti\u003c/i\u003e — canción).\"}}]],[],[[\"$\",\"div\",\"Śrīla Bhakti Vinod Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Bhakti Vinod Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L44\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":107,\"first_line\":\"(ohe) vaiṣṇava ṭhākura dayāra sāgara\"},\"title\":[\"Śrī Vaiṣṇava-mahimā-gīti\"],\"word_by_word\":[\"**śrī vaiṣṇava** — venerable devoto; **mahimā** — glorias; **gīti** — canción).\"],\"author\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"(ohe) vaiṣṇava ṭhākura dayāra sāgara\",\"    e dāse karuṇā kari\",\"diyā pada-chāyā    śodha he āmāre\",\"    tomāra charaṇa dhari\"],\"word_by_word\":[\"**ohe vaiṣṇava ṭhākura** — ¡oh, venerable Vaiṣṇava!; **dayāra** — de misericordia; **sāgara** — océano; **e dāse** — este sirviente; **karuṇā kari’** — sé misericordioso; **diyā** — dar; **pada** — pies; **chāyā** — la sombra; **śodhahe** — ¡oh, purifícame!; **āmāre** — a mí; **tomāra charaṇa** — tus pies; **dhari** — sostengo.\"],\"translation\":[\"¡Oh adorable Vaiṣṇava!Océano de gracia, sé misericordioso con este sirviente. Otórgame la sombra de tus pies y purifícame. Yo me aferro a tus sagrados pies de loto.\"]},{\"number\":\"2\",\"text\":[\"chhaya vega dami’    chhaya doṣa śodhi’\",\"    chhaya guṇa deha’ dāse\",\"chhaya sat-saṅga    deha’ he āmāre\",\"    basechhi saṅgera āśe\"],\"word_by_word\":[\"**chhaya vega** — los seis impulsos; **dami’** — controlar; **chhaya doṣa** — las seis faltas; **śodhi’** — purificador; **chhaya guṇa** — las seis buenas cualidades; **deha’ dāse** — por favor dale a tu sirviente; **chhaya sat-saṅga** — las seis clases de asociaciones sagradas; **deha’ he āmāre** — ¡oh dame!; **basechhi** — me he sentado aquí; **saṅgera** — de tener tu compañía; **āśe** — en la esperanza.\"],\"translation\":[\"Subyuga los seis impulsos, corrige los seis defectos y otorga las seis buenas cualidades a este sirviente. Por favor, concédeme las seis clases de asociación santa. Me postro a tus pies anhelando tener esa asociación.\"]},{\"number\":\"3\",\"text\":[\"ekākī āmāra        nāhi pāya bala\",\"    hari-nāma-saṅkīrtane\",\"tumi kṛpā kari    śraddhā-bindu diyā\",\"    deha’ kṛṣṇa-nāma-dhane\"],\"word_by_word\":[\"**ekakī** — solo; **āmāra** — mi; **nāhi pāya** — no tienes; **bala** — fuerza; **hari-nāma saṅkīrtane** — cantar el santo nombre del Señor Hari; **tumi** — tú; **kṛpā kari’** — dando misericordia; **śraddhā-bindu** — una partícula de fe; **diyā** — otorgar; **deha’** — por favor da; **kṛṣṇa-nāma-dhane** — el gran tesoro del Santo Nombre de Kṛṣṇa.\"],\"translation\":[\"Carezco de la fuerza para cantar apropiadamente el Santo Nombre. Ten la bondad de derramar una gota de fe en mi corazón, brindándome el tesoro del Nombre del Señor Kṛṣṇa.\"]},{\"number\":\"4\",\"text\":[\"kṛṣṇa se tomāra    kṛṣṇa dite pāra\",\"    tomāra śakati āchhe\",\"āmi ta’ kāṅgāla    ‘kṛṣṇa kṛṣṇa’ bali\",\"    dhāi tava pāchhe pāchhe\"],\"word_by_word\":[\"**kṛṣṇa se** — ese Kṛṣṇa; **tomāra** — es tuyo; **kṛṣṇa** — a Kṛṣṇa; **dite** — de dar; **pāro’a** — capaz; **tomāra śakati** — tu poder; **ache** — es; **āmi** — yo; **ta’** — de hecho; **kāṅgāla** — soy un desdichado; **‘kṛṣṇa’ ‘kṛṣṇa’ bali’** — ¡clamando Kṛṣṇa! ¡Kṛṣṇa!; **dhāi** — corro; **tava pāchhe pāchhe** — detrás de ti.\"],\"translation\":[\"Kṛṣṇa es tuyo, tú puedes otorgarlo, tienes el poder para hacerlo. Me encuentro desvalido, y desesperadamente corro tras de ti, gritando, “¡Kṛṣṇa! ¡Kṛṣṇa!”\"]},{\"text\":[\"(āmi) (dhāi tava pāchhe pāchhe)\",\"(kṛṣṇa dhana pābar āśe    dhāi tava pāchhe pāchhe)\",\"(tumi dile kṛṣṇa dite pāra)\",\"(kṛṣṇa tomār hṛdayer dhan    tumi dileo dite pāra)\",\"(kṛṣṇa debār śakti-dhara        tumi dileo dite pāra)\"],\"word_by_word\":[\"**āmi** — yo; **dhāi** — corro; **tava pāchhe pāchhe** — detrás de ti; **kṛṣṇa** — de Kṛṣṇa; **dhana** — la riqueza; **pābar** — obtener; **āśe** — esperanza; **āmi** — yo; **dhāi** — corro; **tava pāchhe pāchhe** — detrás de ti; **tumi** — tú; **dile** — has dado; **kṛṣṇa** — a Kṛṣṇa; **dite** — de dar; **pābar** — capaz; **kṛṣṇa** — de Kṛṣṇa; **tomār** — tuyo; **hṛdayer** — de tu corazón; **dhan** — riqueza; **tumi** — tú; **dile** — has dado; **kṛṣṇa** — a Kṛṣṇa; **dite** — de dar; **pābar** — capaz; **kṛṣṇa** — a Kṛṣṇa; **debār** — de dar; **śakti** — el poder; **dhara** — tienes; **tumi** — tú; **dile** — has dado; **kṛṣṇa** — a Kṛṣṇa; **dite** — de dar; **pābar** — capaz.\"],\"translation\":[\"Corro tras de ti. Corro tras de ti con la esperanza de alcanzar el tesoro de Kṛṣṇa. Si deseas dar a Kṛṣṇa, puedes darlo. Si deseas dar, puedes dar. Kṛṣṇa es la riqueza de tu corazón. Tienes el poder para darnos a Kṛṣṇa. Si sólo deseas dar a Kṛṣṇa, puedes darlo.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/07-ohe-vaishnava-thakura-dayara-sagara-12\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/acharya-maharaj-ohe-vaishnava\"},{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Навадвипский храм\",\"ua\":\"Навадвіпський храм\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-ohe-vaisnava\"},{\"title\":{\"en\":\"Sudarshan Prabhu\",\"ru\":\"Сударшан Прабху\",\"ua\":\"Сударшан Прабгу\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/sudarshan-prabhu-ohe-vaishnava\"}]}}}]\n"])</script><script>self.__next_
