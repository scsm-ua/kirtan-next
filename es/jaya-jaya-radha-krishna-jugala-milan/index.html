,{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Bhakti Vinod Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3b:[\"$\",\"$L41\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":247,\"first_line\":\"jaya jaya rādhā-kṛṣṇa jugala-milan\"},\"title\":[\"Śrī Jugala-ārati\"],\"word_by_word\":[\"**śrī** — adorable; **jugala** — de la pareja divina; **ārati** — ceremonia.\"],\"author\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"jaya jaya rādhā-kṛṣṇa jugala-milan\",\"ārati koroye lalitādi sakhī-goṇ\"],\"word_by_word\":[\"**jaya jaya** — ¡toda gloria! ¡toda gloria!; **rādhā-kṛṣṇa** — a Rādhā y Kṛṣṇa; **jugala-milan** — el encuentro de la pareja; **ārati** — ceremonia; **koroye** — hago; **lalitādi** — encabezadas por Lalitā; **sakhī-goṇ** — las *gopīs*.\"],\"translation\":[\"Todas las glorias, todas las glorias al encuentro de la pareja trascendental, Śrī Śrī Rādhā Kṛṣṇa. Las *gopīs*, encabezadas por Lalitā devī, llevan a cabo la ceremonia para adorarlos.\"]},{\"number\":\"2\",\"text\":[\"madana-mohana rūpa tri bhaṅga-sundara\",\"pītāmbara śikhi-pucha-chūḍā-manohara\"],\"word_by_word\":[\"**madana** — Kamadeva (Cupido); **mohana** — encantador; **rūpa** — forma; **tri bhaṅga** — curvado en tres partes; **sundara** — hermoso; **pītāmbara** — vestimentas amarillas; **śikhi-pucha-chūḍā** — corona de pluma de pavoreal; **manohara** — encantador.\"],\"translation\":[\"Kṛṣṇa es quien atrae a Cupido. Su hermosa forma se curva en tres partes de Su cuerpo. Viste ropas de color amarillo y lleva una encantadora corona de plumas de pavoreal.\"]},{\"number\":\"3\",\"text\":[\"lalita-mādhava-bāme vṛṣabhānu-kanyā\",\"nīla-basanā gaurī rūpe guṇe dhanyā\"],\"word_by_word\":[\"**lalita** — encantador; **mādhava** — Kṛṣṇa; **bāme** — a la izquierda; **vṛṣabhānu-kanyā** — hija de Vṛṣabhānu; **nīla** — azul; **basanā** — vestimentas; **gaurī** — justo; **rūpe** — forma; **guṇe** — de virtudes; **dhanyā** — glorioso.\"],\"translation\":[\"La hija del Rey Vṛṣabhānu, Śrīmatī Rādhikā, de hermosa tez, vestida con ropas de color azul y con Sus gloriosas virtudes, se encuentra a la izquierda del encantador Señor Mādhava.\"]},{\"number\":\"4\",\"text\":[\"nānā-bidha alaṅkāra kore jhalamala\",\"hari-mano-bimohana vadana ujvala\"],\"word_by_word\":[\"**nānā-bidha** — varios; **alaṅkāra** — ornamentos; **kore** — hacer; **jhalamala** — refulgencia; **hari-mano-bimohana** — encanta el corazón de Kṛṣṇa; **vadana** — cara; **ujvala** — esplendor.\"],\"translation\":[\"El brillo de Sus diversos adornos y la refulgencia de Su cara cautivan el corazón del Señor Kṛṣṇa.\"]},{\"number\":\"5\",\"text\":[\"viśākhādi sakhī-goṇ nānā rāge gāya\",\"priya-narma-sakhī jata chāmāra ḍhulāya\"],\"word_by_word\":[\"**viśākhādi** — encabezadas por Viśākha; **sakhī-goṇ** — las *gopīs*; **nānā** — varios; **rāge** — *ragās*; **gāya** — cantando; **priya-narma-sakhī** — queridas amigas alegres; **jata** — las cuales; **chāmāra** — abaníco; **ḍhulāya** — ondear.\"],\"translation\":[\"Viśākhā y las otras jóvenes cantan, con diversas tonadas y humores, mientras que las íntimas y juguetonas amigas de Kṛṣṇa abanican a la Pareja divina.\"]},{\"number\":\"6\",\"text\":[\"śrī-rādhā-mādhava-pada-sarasija-āśe\",\"bhakativinoda sakhī-pade sukhe bhāse\"],\"word_by_word\":[\"**śrī-rādhā-mādhava** — de Śrī Śrī Rādhā Kṛṣṇa; **pada** — pies; **sarasija** — loto; **āśe** — esperanza; **bhakativinoda** — Bhakti Vinod; **sakhī-pade** — a los pies de las *sakh**ī*; **sukhe** — en la felicidad; **bhāse** — flota.\"],\"translation\":[\"Anhelando alcanzar los pies de loto de Śrī Śrī Rādhā Kṛṣṇa, Bhakti Vinod flota en la felicidad, a los pies de las *gopīs*.\"]}],\"resources\":{}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L42\",null,{\"navMap\":{\"247\":{\"prev\":{\"path\":\"/es/radha-madhava-kunja-bihari?p=247\",\"title\":\"Jaya Rādhā-Mādhava\"},\"next\":{\"path\":\"/es
