gHeader__term\\\"\u003eaṣṭakam\u003c/i\u003e — ocho versos.\",{\"className\":\"SongHeader__wbw\",\"dangerouslySetInnerHTML\":{\"__html\":\"\u003ci class=\\\"SongHeader__term\\\"\u003eśrī\u003c/i\u003e — adorable; \u003ci class=\\\"SongHeader__term\\\"\u003enāma\u003c/i\u003e — nombre; \u003ci class=\\\"SongHeader__term\\\"\u003eaṣṭakam\u003c/i\u003e — ocho versos.\"}}]]\n3b:[\"$\",\"div\",\"Śrīla Bhakti Vinod Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Bhakti Vinod Ṭhākur\"}]}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L42\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":397,\"first_line\":\"ohe harinām tava mahimā\"},\"title\":[\"Śrī Nāmāṣṭakam 7\"],\"word_by_word\":[\"**śrī** — adorable; **nāma** — nombre; **aṣṭakam** — ocho versos.\"],\"author\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"ohe harinām, tava mahimā apāra\",\"tava pade nati āmi kori bāro bāro\"],\"word_by_word\":[\"**ohe harinām,** — ¡Oh santo nombre!; **tava** — tuyo; **mahimā** — las glorias; **apāra** — ilimitadas; **tava** — tuyo; **pade** — a tus pies; **nati āmi** — yo me postro; **kori** — hago; **bāro bāro** — una y otra vez.\"],\"translation\":[\"¡Oh, Santo Nombre, Tus glorias son ilimitadas! Por lo tanto, me postro a Tus pies de loto una y otra vez.\"]},{\"number\":\"2\",\"text\":[\"gokuler mahotsava ānanda-sāgara\",\"tomāra charaṇe poḍi hoiyā kātara\"],\"word_by_word\":[\"**gokuler** — de Gokula; **mahotsava** — gran festival; **ānanda-sāgara** — océano de felicidad; **tomāra** — tuyo; **charaṇe** — a tus pies; **poḍi** — caigo; **hoiyā** — estando; **kātara** — infeliz.\"],\"translation\":[\"¡Oh, gran festival de Gokula! ¡Oh, océano de dicha! Caigo a Tus pies de loto, pues me siento internamente muy afligido y preocupado.\"]},{\"number\":\"3\",\"text\":[\"tumi kṛṣṇa, pūrṇa-vapu, rasera nidāna\",\"tava pade poḍi tava guṇa kori gāna\"],\"word_by_word\":[\"**tumi kṛṣṇa** — Tú eres Kṛṣṇa; **pūrṇa-vapu** — la forma plena; **rasera** — de néctar; **nidāna** — el origen; **tava pade** — a Tus pies; **poḍi** — caigo; **tava guṇa** — Tus virtudes; **kori gāna** — yo canto.\"],\"translation\":[\"Tú eres el Señor Kṛṣṇa, Tu forma divina es plenamente perfecta y completa, y eres el origen de todas las melosidades trascendentales. Cayendo a Tus pies de loto, canto Tus cualidades divinas.\"]},{\"number\":\"4\",\"text\":[\"je kore tomār pade ekānta āśroya\",\"tā’ra ārti-rāśi nāśa koroho niśchoya\"],\"word_by_word\":[\"**je** — quién; **kore** — hace; **tomār** — Tuyo; **pade** — a Tus pies; **ekānta** — exclusivo; **āśroya** — refugio; **tā’ra** — de aquel; **ārti-rāśi** — muchos sufrimientos; **nāśa** — destrucción; **koroho** — haces; **niśchoya** — sin duda.\"],\"translation\":[\"Indudablemente destruyes la multitud de aflicciones de aquellas personas que se refugian exclusivamente en Tus sagrados pies.\"]},{\"number\":\"5\",\"text\":[\"sarvva aparādha tumi nāśa koro tā’ra\",\"nāma-aparādhāvadhi nāśaho tāhāra\"],\"word_by_word\":[\"**sarvva** — todas; **aparādha** — ofensas; **tumi** — Tú; **nāśa** — destruyes; **koro** — haces; **tā’ra** — de aquel; **nāma-aparādha** — ofensas al nombre; **āvadhi** — al límite; **nāśaho** — destruyes; **tāhāra** — de aquel.\"],\"translation\":[\"Destruyes todas sus ofensas, incluso las diez ofensas en contra del canto del Santo Nombre (*nāma-aparādhas*).\"]},{\"number\":\"6\",\"text\":[\"sarvva-doṣa dhauta kori’ tāhāra hṛdoya\",\"siṁhāsane baiso tumi parama āśroya\"],\"word_by_word\":[\"**sarvva-doṣa** — todas las faltas; **dhauta** — purificación; **kori’** — hacer; **tāhāra** — de aquel; **hṛdoya** — corazón; **siṁhāsane** — en el trono; **baiso** — sentar; **tumi** — Tú; **parama** — supremo; **āśroya** — refugio.\"],\"translation\":[\"Habiéndolos purificado de toda impureza, te sientas luego en el trono de su corazón como su refugio supremo.\"]},{\"number\":\"7\",\"text\":[\"ati-ramya chid-ghana-ānanda-mūrtimān\",\"‘raso vai saḥ’ boli’ veda kore tuyā gāna\"],\"word_by_word\":[\"**ati-ramya** — muy encantador; **chid** — espiritual; **ghana** — intenso; **ānanda** — regocijo; **mūrtimān** — teniendo una forma; **‘raso** — néctar; **vai** — ciertamente; **saḥ’** — Él; **boli’** — dice; **veda** — los Vedas; **kore** — hace; **tuyā** — de Ti; **gāna** — canta.\"],\"translation\":[\"Eres encantador y hermoso, la personificación del conocimiento completo y la bienaventuranza concentrada. Los Vedas te alaban diciendo: “La Suprema Personalidad de Dios es ciertamente la personificación de todas las melosidades trascendentales”.\"]},{\"number\":\"8\",\"text\":[\"bhaktivinoda rūpa-gosvāmī-charaṇe\",\"māgaye sarvvadā nāma-sphūrti sarvva-kṣane\"],\"word_by_word\":[\"**bhaktivinoda** — Bhakti Vinod; **rūpa-gosvāmī-charaṇe** — a los pies de Śrīla Rūpa Goswāmī; **māgaye** — ruega; **sarvvadā** — siempre; **nāma-sphūrti** — la manifestación del nombre; **sarvva-kṣane** — a cada momento.\"],\"translation\":[\"Bhakti Vinod ruega a los pies de loto de Śrīla Rūpa Goswāmī, constantemente, a cada momento, la revelación directa del Santo Nombre.\"]}],\"resources\":{}}}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L43\",null,{\"navMap\":{\"397\":{\"prev\":{\"path\":\"/es/kali-ghora-timire-garasala-jagajana/\",\"title\":\"Kali-ghora timire\"},\"next\":{\"path\":\"/es/atha-govardhane-ramye-surabhi/\",\"title\":\"Śrī Govinda Kuṇḍa Mahātmya\"}}}}]\n3e:[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@graph\\\":[{\\\"@type\\\":\\\"CollectionPage\\\",\\\"@id\\\":\\\"https://kirtan.site/es/ohe-harinam-tava-mahima-apara\\\",\\\"url\\\":\\\"https://kirtan.site/es/ohe-harinam-tava-mahima-apara\\\",\\\"name\\\":\\\"Śrī Nāmāṣṭakam 7. Śrīla Bhakti Vinod Ṭhākur\\\",\\\"inLanguage\\\":\\\"es\\\",\\\"isPartOf\\\":{\\\"@id\\\":\\\"https://kirtan.site/#website\\\"}},{\\\
