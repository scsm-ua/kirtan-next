\":\"multi\"},{\"text\":\"ke dayālu\",\"trans\":\"¿quién es misericordioso?\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"jagata mājhāre\",\"trans\":\"en este mundo material\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"2\",\"text\":[\"patita-pāvana-hetu tava avatāra\",\"mo sama patita prabhu nā pāibe āra\"],\"word_by_word\":[\"**patita-pāvana** — liberador de los caídos; **hetu** — motivo; **tava avatāra** — Tu encarnación; **mo sama** — tal como yo; **patita** — caído; **prabhu** — Señor; **nā** — no; **pāibe** — encontrarás; **āra** — otro.\"],\"translation\":[\"Has descendido sólo para redimir a las almas caídas. Oh Señor, no encontrarás en ninguna parte a un alma tan caída como yo.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"patita-pāvana\",\"trans\":\"liberador de los caídos\",\"sep\":\"-\",\"error\":\"multi\"},{\"text\":\"hetu\",\"trans\":\"motivo\",\"sep\":\" \"},{\"text\":\"tava avatāra\",\"trans\":\"Tu encarnación\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"mo sama\",\"trans\":\"tal como yo\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"patita\",\"trans\":\"caído\",\"sep\":\" \"},{\"text\":\"prabhu\",\"trans\":\"Señor\",\"sep\":\" \"},{\"text\":\"nā\",\"trans\":\"no\",\"sep\":\" \"},{\"text\":\"pāibe\",\"trans\":\"encontrarás\",\"sep\":\" \"},{\"text\":\"āra\",\"trans\":\"otro\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"hā hā prabhu nityānanda premānanda sukhī\",\"kṛpāvalokana kara āmi baḍa duḥkhī\"],\"word_by_word\":[\"**hā hā** — ¡oh! ¡oh!; **prabhu nityānanda** — el Señor Nityānanda; **premānanda** — la dicha del amor divino; **sukhī** — siempre feliz; **kṛpā-valokana** — mirada misericordiosa; **kara** — otorga; **āmi** — a mí; **baḍa duḥkhī** — muy triste.\"],\"translation\":[\"¡Oh Nityānanda! Alegre siempre en tu amor, ten la bondad de otorgarme Tu misericordiosa mirada, estoy muy triste.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"hā hā\",\"trans\":\"¡oh! ¡oh!\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"prabhu nityānanda\",\"trans\":\"el Señor Nityānanda\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"premānanda\",\"trans\":\"la dicha del amor divino\",\"sep\":\" \"},{\"text\":\"sukhī\",\"trans\":\"siempre feliz\",\"sep\":\"\"}],[{\"text\":\"kṛpāvalokana kara\",\"trans\":\"mirada misericordiosa\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"āmi\",\"trans\":\"otorga\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"baḍa\",\"trans\":\"a mí\",\"sep\":\" \",\"error\":\"mismatch\"},{\"text\":\"duḥkhī\",\"trans\":\"muy triste\",\"sep\":\"\",\"error\":\"mismatch\"}]]},{\"number\":\"4\",\"text\":[\"dayā kara sītā-pati advaita gosāñi\",\"tava kṛpā-bale pāi chaitanya-nitāi\"],\"word_by_word\":[\"**dayā kara** — otorga misericordia; **sītā-pati** — el señor de Sītā Ṭhākurāṇī; **advaita gosāñi** — Advaita Goswāmī; **tava kṛpā-bale** — por el poder de Tu misericordia; **pāi** — puedo obtener; **chaitanya-nitāi** — al Señor Nityānanda y al Señor Chaitanya.\"],\"translation\":[\"¡Oh Advaita Goswāmī, señor de Śrīmatī Sītā Ṭhākurāṇī! Sé misericordioso conmigo. Mediante Tu misericordia obtendré a Śrī Śrī NitāiChaitanya.\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"dayā kara\",\"trans\":\"otorga misericordia\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"sītā-pati\",\"trans\":\"el señor de Sītā Ṭhākurāṇī\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"advaita gosāñi\",\"trans\":\"Advaita Goswāmī\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"tava kṛpā-bale\",\"trans\":\"por el poder de Tu misericordia\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"pāi\",\"trans\":\"puedo obtener\",\"sep\":\" \"},{\"text\":\"chaitanya-nitāi\",\"trans\":\"al Señor Nityānanda y al Señor Chaitanya\",\"sep\":\"\",\"error\":\"multi\"}]]},{\"number\":\"5\",\"text\":[\"gaura-premamaya-tanu paṇḍit gadādhara\",\"śrīnivāsa haridāsa dayāra sāgara\"],\"word_by_word\":[\"**gaura** — de Gaura; **premamaya** — pleno de amor; **tanu** — personificación; **paṇḍit gadādhara** — Gadādhar Paṇḍit; **śrīnivāsa** — Śrīvās Paṇḍit; **haridāsa** — Haridās Ṭhākur; **dayāra** — de misericordia; **sāgara** — oceáno.\"],\"translation\":[\"¡Oh Gadādhar Paṇḍit, personificación del amor de Śrī Gaura! ¡Oh Śrīvāsa Paṇḍit, Haridās Ṭhākur, ustedes son el océano de la misericordia personificada!\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"gaura\",\"trans\":\"de Gaura\",\"sep\":\"-\"},{\"text\":\"premamaya\",\"trans\":\"pleno de amor\",\"sep\":\"-\"},{\"text\":\"tanu\",\"trans\":\"personificación\",\"sep\":\" \"},{\"text\":\"paṇḍit gadādhara\",\"trans\":\"Gadādhar Paṇḍit\",\"sep\":\"\",\"error\":\"multi\"}],[{\"text\":\"śrīnivāsa\",\"trans\":\"Śrīvās Paṇḍit\",\"sep\":\" \"},{\"text\":\"haridāsa\",\"trans\":\"Haridās Ṭhākur\",\"sep\":\" \"},{\"text\":\"dayāra\",\"trans\":\"de misericordia\",\"sep\":\" \"},{\"text\":\"sāgara\",\"trans\":\"oceáno\",\"sep\":\"\"}]]},{\"number\":\"6\",\"text\":[\"hā hā svarūpa sanātana rūpa raghunātha\",\"bhaṭṭa-yuga śrī jīva hā prabhu lokanātha\"],\"word_by_word\":[\"**hā hā** — ¡oh! ¡oh!; **svarūpa** — Svarūpa Dāmodar; **sanātana** — Sanātan; **rūpa** — Rūpa; **raghunātha bhaṭṭa-yuga** — los cuatro; Raghunāth Dās, Raghunāth Bhaṭṭa, Gopāl Bhaṭṭa; **śrī jīva** — Śrī Jīva Goswāmī; **hā** — ¡oh!; **prabhu** — señor; **lokanātha** — Lokanāth Goswāmī.\"],\"translation\":[\"¡Oh, mis señores, Svarūp Dāmodar, Sanātan, Rūpa, Raghunāth Dās, Raghunāth Bhaṭṭa, Gopāl Bhaṭṭa y Śrī Jīva! ¡Oh, mi señor, Lokanāth Prabhu!\"],\"isWbwInlineModeAvailable\":false,\"inline_word_by_word\":[[{\"text\":\"hā hā\",\"trans\":\"¡oh! ¡oh!\",\"sep\":\" \",\"error\":\"multi\"},{\"text\":\"svarūpa\",\"trans\":\"Svarūpa Dāmodar\",\"sep\":\" \"},{\"text\":\"sanātana\",\"trans\":\"Sanātan\",\"sep\":\" \"},{\"text\":\"rūpa\",\"trans\":\"Rūpa\",\"sep\":\" \"},{\"text\":\"raghunātha\",\"trans\":\"los cuatro; Raghunāth Dās, Raghunāth Bhaṭṭa, Gopāl Bhaṭṭa\",\"sep\":\"\",\"error\":\"multi\"
