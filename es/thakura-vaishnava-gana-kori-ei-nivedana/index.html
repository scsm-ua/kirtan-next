003evijñāpti\u003c/i\u003e — oración.\",{\"className\":\"SongHeader__wbw\",\"dangerouslySetInnerHTML\":{\"__html\":\"\u003ci class=\\\"SongHeader__term\\\"\u003evaiṣṇava\u003c/i\u003e — a los Vaiṣṇavas; \u003ci class=\\\"SongHeader__term\\\"\u003evijñāpti\u003c/i\u003e — oración.\"}}]],[],[[\"$\",\"div\",\"Śrīla Narottam Dās Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/es/authors\",\"children\":\"Śrīla Narottam Dās Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"37:[\"$\",\"$L3f\",null,{\"label\":\"Mostrar traducción\",\"song\":{\"meta\":{\"page\":68,\"first_line\":\"ṭhākura vaiṣṇava gaṇa\"},\"title\":[\"Vaiṣṇava-vijñāpti\"],\"word_by_word\":[\"**vaiṣṇava** — a los Vaiṣṇavas; **vijñāpti** — oración.\"],\"author\":[\"Śrīla Narottam Dās Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"ṭhākura vaiṣṇava-gaṇa        kari ei nivedana\",\"        mo baḍa adhama durāchāra\",\"dāruṇa-saṁsāra-nidhi        tāhe ḍubāila vidhi\",\"        keśe dhari’more kara pāra\"],\"word_by_word\":[\"**ṭhākura** — adorable; **vaiṣṇava-gaṇa** — Vaiṣṇavas reunidos; **kari** — hacer; **ei** — esta; **nivedana** — petición; **mo** — a mí; **baḍa** — muy; **adhama** — caído; **durāchāra** — de mal comportamiento; **dāruṇa** — aterrador; **saṁsāra** — existencia material; **nidhi** — el océano; **tāhe** — en ese; **ḍubāila** — se ha hundido; **vidhi** — mi destino; **keśe** — por el cabello; **dhari’** — sostener; **more** — a mí; **kara** — hacer; **pāra** — más allá.\"],\"translation\":[\"¡Oh adorables Vaiṣṇavas! Les ofrezcoestaoración, soy muy caído y micomportamiento es malo. El destino me ha hundido en el aterrador océano de laexistencia material. Por favor, tomándome del cabello llévenme hasta la orilla.\"]},{\"number\":\"2\",\"text\":[\"vidhi baḍa balavān    nā śune dharama-jñāna\",\"        sadāi karama-pāśe bāndhe\",\"nā dekhi tāraṇa leśa    yata dekhi saba kleśa\",\"        anātha kātare te̐i kānde\"],\"word_by_word\":[\"**vidhi** — destino; **baḍa** — es muy; **balavān** — fuerte; **nā** — no; **śune** — escucho; **dharama** — de religión; **jñāna** — conocimiento; **sadāi** — siempre; **karama** — del *karma*; **pāśe** — las cuerdas; **bāndhe** — atado; **nā** — no; **dekhi** — veo; **tāraṇa** — liberación; **leśa** — poco; **yata** — por lo cual; **dekhi** — ver; **saba** — todos; **kleśa** — sufrimientos; **anātha** — desamparado; **kātare** — afligido; **te̐i** — por eso; **kānde** — lloro.\"],\"translation\":[\"Mi destino es muy poderoso. No escucha mi conocimiento sobre religión y siempre me ata con las sogas del *karma*. No veo ni un rastro de esperanza. Todo lo que veo es sufrimiento. Así, impotente y afligido, lloro.\"]},{\"number\":\"3\",\"text\":[\"kāma, krodha, lobha, moha, mada, abhimāna saha\",\"        āpana āpana sthāne ṭāne\",\"aichāna āmāra mana    phire yena andha jana\",\"        supatha vipatha nāhi jāne\"],\"word_by_word\":[\"**kāma** — lujuria; **krodha** — ira; **lobha** — avaricia; **moha** — desconcierto; **mada** — locura; **abhimāna** — orgullo; **saha** — todas; **āpana** — propio; **āpana** — propio; **sthāne** — en ese lugar; **ṭāne** — jala; **aichāna** — de  esa manera; **āmāra** — mío; **mana** — mente; **phire** — deambula; **yena** — el cual; **andha jana** — alguien ciego; **supatha** — auspicioso; **vipatha** — inauspicioso; **nāhi** — no; **jāne** — sabe.\"],\"translation\":[\"La lujuria, la ira, la codicia, la ilusión, el orgullo y el ego, todas me jalan en sus propias direcciones. Así mi mente vaga como un hombre ciego que no conoce cuál es el camino auspicioso y cuál el inauspicioso.\"]},{\"number\":\"4\",\"text\":[\"nā la-inu sat mata    asate majila chita\",\"        tuyā pāye nā karinu āśa\",\"narottama dāse kaya    dekhi’ śuni’ lage bhaya\",\"        tarāiyā laha nija pāśa\"],\"word_by_word\":[\"**nā** — no; **la-inu** — he obtenido; **sat** — legítimo; **mata** — sendero; **asate** — impermanente; **majila** — abrumado; **chita** — mente; **tuyā** — tus; **pāye** — pies de loto; **nā** — no; **karinu** — hice; **āśa** — espero; **narottama dāse** — Narottam Dās; **kaya** — dice; **dekhi’** — viendo; **śuni’** — escuchando; **lage** — toco; **bhaya** — temor; **tarāiyā** — habiendo cruzado; **laha** — obtener; **nija** — propio; **pāśa** — cerca.\"],\"translation\":[\"Nunca he aceptado la concepción apropiada. Mi mente ha estado inmersa en ilusión, y nunca he aspirado por sus pies. Narottam Dās dice, “viendo y escuchando acerca de mi situación, estoy lleno de temor. Por favor rescátenme y manténganme a su lado”.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.K. Ashram Maharaj\",\"ru\":\"Шрила Б.К. Ашрам Махарадж\",\"ua\":\"Шріла Б.К. Ашрам Махарадж\"},\"embed_url\":\"https://soundcloud.com/scsmathcolombia/10-thakura-vaisnava-gana\"},{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Навадвипский храм\",\"ua\":\"Навадвіпський храм\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-thakura-vaisnava\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-thakura-vaishnava-gana\"}]}}}]\n"])</script><script>self.__next_f.push([1,"38:[\"$\",\"$L40\",null,{\"audio\":\"$37:props:song:resources:audio\",\"language\":\"es\"}]\n39:[\"$\",\"$L41\",null,{\"navMap\":{\"68\":{\"prev\":{\"path\":\"/es/bhaja-re-bhaja-re-amar-mana-ati-manda/\",\"title\":\"Bhajan-gīti\"},\"next\":{\"path\":\"/es/vibhavari-shiesha-aloka-praveshia/\",\"title\":\"Vibhāvarī Śeṣa\"}}}}]\n42:T95a,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/es/thakura-vaishnava-gana-kori-ei-nivedana\",\"url\":\"https://kirtan.site/es/thakura-vaishnava-gana-kori-ei-nivedana\",\"name\":\"Vaiṣṇava-vijñāpti. Śrīla Narottam Dās Ṭhākur\",\"inLanguage\":\"es\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#web
