ornamento; **śrī-gaura** — Śrī Gaurāṅga; **mahimā** — cualidades.\"],\"author\":[\"Śrīla Narottam Dās Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"gaurāṅgera duṭi pada,        jār dhana sampada,\",\"        se jāne bhakati-rasa-sār\",\"gaurāṅgera madhura-līlā,    jār karṇe praveśilā,\",\"        hṛdoya nirmala bhelo tār\"],\"word_by_word\":[\"**gaurāṅgera** — del Señor Gaurāṅga; **duṭi pada** — los dos pies de loto; **jār** — cuyo; **dhana sampada** — riqueza y tesoro; **se jane** — esa persona; **bhakati-rasa-sār** — (ellos entienden) la esencia de la devoción; **gaurāṅgera** — del Señor Gaurāṅga; **madhura-līlā** — los dulces pasatiempos; **jār karṇe** — en cuyo oído; **praveśila** — ha entrado; **hṛdoya** — el corazón; **nirmala bhelo** — se purifica; **tār** — suyo.\"],\"translation\":[\"Quienquiera que ha aceptado los dos pies de loto del Señor Chaitanya puede entender la verdadera esencia del servicio con devoción. El corazón de todo aquel que escucha los dulces pasatiempos del Señor Chaitanya se purifica.\"]},{\"number\":\"2\",\"text\":[\"je gaurāṅgera nāma loy,        tāra hoy premodoy,\",\"        tāre mui jāi bolihāri\",\"gaurāṅga-guṇete jhure,        nitya-līlā tāre sphure,\",\"        se jana bhakati-adhikārī\"],\"word_by_word\":[\"**je** — quién; **gaurāṅgera** — del Señor Gaurāṅga; **nāma loy** — canta el santo nombre; **tāra** — suyo; **hoy** — afectado; **premodoy** — el despertar del amor divino; **tāre** — a él; **mui** — yo (digo); **jāi bolihari** — ¡bravo, excelente!; **gaurāṅga gunete** — apreciar las cualidades del Señor Gaurāṅga; **jhure** — (si alguien) llora; **nitya-līlā** — los pasatiempos eternos del Señor; **tāre** — a él; **sphure** — son manifiestos; **se jana** — esa persona; **bhakati-adhikārī** — está calificado para realizar servicio devocional.\"],\"translation\":[\"En aquel que toma el Santo Nombre de Gaurāṅga hay un despertar del amor por el Supremo. A esa persona yo le digo: “¡Bravo, excelente!”. Los pasatiempos eternos se manifiestan en el corazón de aquel que aprecia las cualidades trascendentales del Señor Gaurāṅga. Esa persona tiene una verdadera cualificación devocional.\"]},{\"number\":\"3\",\"text\":[\"gaurāṅgera saṅgi-gaṇe,        nitya-siddha kori māne,\",\"        se jāy brajendra-suta-pāśa\",\"śrī-gauḍa-maṇḍala-bhūmi,    jebā jāne chintāmaṇi,\",\"        tāra hoy vraja-bhūme bāsa\"],\"word_by_word\":[\"**gaurāṅgera** — del Señor Gaurāṅga; **saṅgi-gaṇe** — los asociados; **nitya-siddha** — eternamente liberado; **kori’ māne** — considera; **se jāy** — esa persona va; **brajendra-suta-pāśa** — a la compañía del hijo del rey de Vraja; **śrī gauḍa-maṇḍala-bhūmi** — la tierra sagrada de Nabadwīp; **jebā** — quienquiera que sea; **jāne** — entiende; **chintāmaṇi** — hecho de piedras de toque trascendentales; **tāra hoy** — es suyo; **vraja-bhūme bāsa** — residencia en la tierra sagrada de Vraja.\"],\"translation\":[\"Aquel que considera a los asociados del Señor Gaurāṅga como eternamente perfectos, puede alcanzar la asociación de Śrī Kṛṣṇa en Vraja Dhām. Quienquiera que considere a Śrī Nabadwīp Dhām, la tierra del Señor Gaurāṅga, como la tierra de las piedras de toque trascendentales, esa persona reside en Vraja Dhām, Śrī Vrindāvan.\"]},{\"number\":\"4\",\"text\":[\"gaura-prema-rasārṇave,        se taraṅge jebā ḍube,\",\"        se rādhā-mādhava-antaraṅga\",\"gṛhe vā vanete thāke,        ‘hā gaurāṅga’ bo’le ḍāke,\",\"        narottama māge tāra saṅga\"],\"word_by_word\":[\"**gaura-prema** — de amor por el Señor Gaurāṅga; **rasārṇave** — en el éxtasis del océano apacible; **se taraṅge** — en esas olas; **jebā** — quienquiera que sea; **ḍube** — inmersiones; **se** — esa persona; **rādhā-mādhava-antaraṅga** — (se vuelve) uno de los asociados confidenciales de Śrī Śrī Rādhā y Mādhava; **gṛhe** — en casa; **va** — o; **vanete** — en el bosque; **thāke** — viviente; **‘hā gaurāṅga’ bo’le** — cantando “¡oh Gaurāṅga!”; **ḍāke** — gritando; **narottama māge** — Narottama suplica; **tāra saṅga** — su compañía.\"],\"translation\":[\"Quienquiera que se sumerja en las aguas del océano nectarino de amor por el Señor Gaurāṅga se vuelve un asociado íntimo de Śrī Śrī Rādhā-Mādhava. Ya sea que viva en una casa o en el bosque, si él canta “¡Oh, Señor Gaurāṅga!” Narottama Dās ruega por obtener su asociación.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/25-gaurangera-duti-pada-3\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-gaurangera-duti\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-savarana-sri-gaura-mahima-gaurangera-duti-pada\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/acharyamaharaj/5-savarana-sri-gaura-mahima\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L44\",null,{\"audio\":\"$3b:props:song:resources:audio\",\"language\":\"es\"}]\n3d:[\"$\",\"$L45\",null,{\"navMap\":{\"128\":{\"prev\":{\"path\":\"/es/haribolo-haribolo-haribolo-bhai-re/\",\"title\":\"Śrī Nāma Kīrtan 3\"},\"next\":{\"path\":\"/es/gaura-pahu-na-bhajiya-mainu/\",\"title\":\"Gaura Pahū̐\"}}}}]\n46:Tbc0,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/es/gaurangera-duti-pada-jar-dhana-sampada\",\"url\":\"https://kirtan.site/es/gaurangera-duti-pada-jar-dhana-sampada\",\"name\":\"Sāvaraṇa-śrī-Gaura-mahimā. Śrīla Narottam Dās Ṭhākur\",\"inLanguage\":\"es\",\"isPartOf\":{\"@id\":\"https://kirtan
