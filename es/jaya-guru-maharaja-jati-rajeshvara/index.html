":[\"achintya pratibhńĀ, snigdha, gambhńęra, udńĀra\",\"jaŠłća-j√ĪńĀna-giri-vajra divya-dńękŠĻ£ńĀdhńĀra\"],\"word_by_word\":[\"**achintya** ‚ÄĒ concebible; **pratibhńĀ** ‚ÄĒ genio, inteligencia; **snigdha** ‚ÄĒ afecto; **gambhńęra** ‚ÄĒ sobriedad; **udńĀra** ‚ÄĒ exaltado, magn√°nimo; **jaŠłća** ‚ÄĒ mundano; **j√ĪńĀna** ‚ÄĒ conocimiento; **giri** ‚ÄĒ las palabras; **vajra** ‚ÄĒ rayo; **divya** ‚ÄĒ divino; **dńękŠĻ£ńĀ** ‚ÄĒ ense√Īar; **dhńĀra** ‚ÄĒ corriente.\"],\"translation\":[\"Estas dotado con un genio inconcebible, afecto, sobriedad y magnanimidad. Eres un rayo que aplasta el conocimiento mundano y el conducto para la revelaci√≥n divina.\"]},{\"number\":\"8\",\"text\":[\"gaura-saŠĻÖkńęrtana-rńĀsa-rasera ńĀŇõraya\",\"‚ÄúdayńĀla nitńĀi‚ÄĚ nńĀme nitya premamaya\"],\"word_by_word\":[\"**gaura** ‚ÄĒ GaurńĀŠĻÖga (el Se√Īor dorado); **saŠĻÖkńęrtana** ‚ÄĒ canto congregacional; **rńĀsa-rasera** ‚ÄĒ quien disfruta del *rńĀsa* o melosidad; **ńĀŇõraya** ‚ÄĒ la morada; **‚ÄúdayńĀla** ‚ÄĒ compasivo; **nitńĀi‚ÄĚ** ‚ÄĒ NityńĀnanda; **nńĀme** ‚ÄĒ nombre; **nitya** ‚ÄĒ eterno; **premamaya** ‚ÄĒ amor divino.\"],\"translation\":[\"Eres la morada de la felicidad de la danza del *saŠĻÖkńęrtan* de Ňörńę GaurńĀŠĻÖga, y siempre est√°s pleno de amor divino mientras exclamas, ‚ÄúDayńĀl NitńĀi‚ÄĚ.\"]},{\"number\":\"9\",\"text\":[\"sńĀŠĻÖgopńĀŠĻÖge gaura-dhńĀme nitya-parakńĀŇõa\",\"gupta-govardhane divya-lńęlńĀra-vilńĀsa\"],\"word_by_word\":[\"**sńĀŠĻÖgopńĀŠĻÖge** ‚ÄĒ asociados, quienes son como sus partes; **gaura** ‚ÄĒ GaurńĀŠĻÖga; **dhńĀme** ‚ÄĒ del lugar sagrado (Nabadwńęp DhńĀm); **nitya** ‚ÄĒ eterno; **parakńĀŇõa** ‚ÄĒ manifestaci√≥n; **gupta** ‚ÄĒ oculto; **govardhane** ‚ÄĒ de Govardhan; **divya** ‚ÄĒ divino; **lńęlńĀra** ‚ÄĒ de los pasatiempos; **vilńĀsa** ‚ÄĒ disfrutar.\"],\"translation\":[\"Est√°s eternamente presente en Nabadwńęp DhńĀm con tus asociados y disfrutas de tus Pasatiempos divinos en la oculta colina de Govardhan.\"]},{\"number\":\"10\",\"text\":[\"gauŠłćńęya-ńĀchńĀrya-
