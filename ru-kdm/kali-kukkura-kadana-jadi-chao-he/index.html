икш̣ака    нйа̄сикула-на̄йака,\",\"    ма̄дхава-ра̄дха̄бха̄ва пӯра\"],\"translation\":[\"Он — луна Надии, Господь Маяпура и великодушный спаситель! Он открыл всем славу воспевания Святого Имени Кришны. Он — наставник семейных людей и предводитель *санньяси*. Шри Чайтанья Махапрабху — это Кришна, преисполненный упоительным чувством любви Радхарани!\"]},{\"number\":\"4\",\"text\":[\"са̄рвабхаума-ш́одхана    гаджапати-та̄ран̣а,\",\"    ра̄ма̄нанда-пош̣ан̣а-вӣра\",\"рӯпа̄нанда-вардхана    сана̄тана па̄лана,\",\"    харида̄са-модана-дхӣра\"],\"translation\":[\"Он очистил Сарвабхауму Бхаттачарью и спас Пратапарудру Махараджа, великого царя Ориссы. Он — герой и защитник Рамананды Рая. Он источник постоянно возрастающего счастья, приводящий в восторг благоразумного Харидаса Тхакура.\"]},{\"number\":\"5\",\"text\":[\"браджа раса-бха̄вана    душ̣т̣амата-ш́а̄тана,\",\"    капат̣ӣ-вигха̄тана-ка̄ма\",\"ш́уддха бхакта-па̄лана    ш́уш̣ка джн̃а̄на-та̄д̣ана,\",\"    чхоло бхакти-дӯш̣ан̣а-ра̄ма\"],\"translation\":[\"Шри Кришна Чайтанья поглощен сладостью Вриндавана! Он очищает ум от грязных мыслей, сводя на нет похоть и обман. Он изгоняет сухое эмпирическое знание, затмевающее красоту безраздельной преданности Богу. Он защищает, поддерживает и неустанно опекает всецело предавшиеся Ему души.\"]}],\"embeds\":[{\"title\":\"Шрила Авадхут Махарадж\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/avadxut-maxaradzh-utrennee-6\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Favadxut-maxaradzh-utrennee-6\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Favadxut-maxaradzh-utrennee-6\\\"\u003e\u003c/iframe\u003e\"}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.K. Ashram Maharaj\",\"ru\":\"Шрила Б.К. Ашрам Махарадж\",\"ua\":\"Шріла Б.К. Ашрам Махара
