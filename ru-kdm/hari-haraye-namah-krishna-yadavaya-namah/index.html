 Мадхусудана, Гиридхари, Гопинатх, Мадана-мохан!\"]},{\"number\":\"3\",\"text\":[\"ш́рӣ-чаитанйа нитйа̄нанда ш́рӣ адваита-чандра\",\"гада̄дхара ш́рӣва̄са̄ди гаура-бхакта-вр̣нда\"],\"translation\":[\"Слава Шри Чайтанье Махапрабху и Нитьянанде Прабху! Слава луноподобному Шри Адвайте Ачарье! Слава Шри Гададхару Пандиту и всем преданным Шри Чайтаньи, возглавляемым Шривасом Тхакуром!\"]},{\"number\":\"4\",\"text\":[\"джайа рӯпа сана̄тана бхат̣т̣а рагхуна̄тха\",\"ш́рӣ-джӣва-гопа̄ла-бхат̣т̣а да̄са рагхуна̄тха\"],\"translation\":[\"Слава Шри Рупе Госвами, Санатане Госвами, Рагхунатху Бхатте Госвами, Шри Дживе Госвами, Гопале Бхатте Госвами и Рагхунатху Дасу Госвами!\"]},{\"number\":\"5\",\"text\":[\"эи чхой госа̄ир кори чаран̣а вандана\",\"джа̄ха̄ хоите бигхна-на̄ш́ абхӣш̣т̣а пӯрана\"],\"translation\":[\"Я склоняюсь перед шестью Госвами Вриндавана. Поклонение им устраняет все препятствия на пути преданности и исполняет все духовные желания.\"]},{\"number\":\"6\",\"text\":[\"эи чхой госа̄ир джа̄̐ра му̐и та̄̐ра да̄са\",\"та̄̐-саба̄ра пада-рен̣у мора пан̃ча-гра̄са\"],\"translation\":[\"Я слуга того, кто служит шести Госвами. Пыль с их святых стоп — пять видов моей пищи.\"]},{\"number\":\"7\",\"text\":[\"та̄̐дера чаран̣а себи бхакта сане ба̄са\",\"джанаме джанаме мора эи абхила̄ш̣а\"],\"translation\":[\"Я лишь желаю в каждом рождении быть рядом с преданными, что служат лотосоподобным стопам шести Госвами.\"]},{\"number\":\"8\",\"text\":[\"эи чхой госа̄и джабе брадже коила̄ ба̄са\",\"ра̄дха̄-кр̣ш̣н̣а-нитйа-лӣла̄ корила̄ прака̄ш́а\"],\"translation\":[\"Когда эти Госвами жили во Врадже, они раскрыли и объяснили вечные игры Шри Радхи и Шри Кришны.\"]},{\"number\":\"9\",\"text\":[\"а̄нанде боло хари бхаджа вр̣нда̄вана\",\"ш́рӣ-гуру-ваиш̣н̣ава-паде маджа̄ийа̄ мана\"],\"translation\":[\"Сосредоточив ум на божественных стопах духовного учителя и святых вайшнавов, воспевайте в упоении имена Господа Хари и поклоняйтесь трансцендентному миру Вриндавана!\"]},{\"number\":\"10\",\"text\":[\"ш́рӣ-гуру-ваиш̣н̣ава-па̄да-падма кори а̄ш́а\",\"(хари) на̄ма-сан̇кӣрттана кохе нароттама да̄са\"],\"translation\":[\"Желая обрести прибежище лотосоподобных стоп Шри Гуру и вайшнавов, Нароттам Дас поет *санкиртану* Святого Имени!\"]}],\"embeds\":[{\"title\":\"Шрила Говинда Махарадж\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-hari-haraye\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fgovinda-maharaj-hari-haraye\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fgovinda-maharaj-hari-haraye\\\"\u003e\u003c/iframe\u003e\"},{\"title\":\"Навадвип Дхам\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-hari-haraye\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fnavadwip-scsm-hari-haraye\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fnavadwip-scsm-hari-haraye\\\"\u003e\u003c/iframe\u003e\"},{\"title\":\"Шрила Авадхут Махарадж\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/avadxut-maxaradzh-xari-xaraje\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Favadxut-maxaradzh-xari-xaraje\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Favadxut-maxaradzh-xari-xaraje\\\"\u003e\u003c/iframe\u003e\"}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",
