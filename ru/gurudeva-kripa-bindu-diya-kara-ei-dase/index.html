\":[\"РіСғСҖСғРҙРөРІ!\",\"РәСҖМЈРҝР°М„-РұРёРҪРҙСғ РҙРёР№Р°М„    РәРҫСҖРҫвҖҷ СҚРё РҙР°М„СҒРө,\",\"    СӮСҖМЈРҪМЈР°М„РҝРөРәСҲМЈР°М„ Р°СӮРё РҙУЈРҪР°\",\"СҒР°РәР°Р»Р°-СҒР°С…Р°РҪРө    РұРҫР»Рҫ РҙРёР№Р°М„ РәРҫСҖРҫ,\",\"    РҪРёРҙР¶Р°-РјР°М„РҪРө СҒРҝСҖМЈС…Р°М„-С…УЈРҪР°\"],\"translation\":[\"Р“СғСҖСғРҙРөРІ, РҙР°СҖСғР№ РјРҪРө, СӮРІРҫРөРјСғ СҒР»СғРіРө, С…РҫСӮСҸ РұСӢ РәР°РҝР»СҺ СҒРІРҫРөР№ РјРёР»РҫСҒСӮРё. РҜ РҪРөР·РҪР°СҮРёСӮРөР»СҢРҪРөРө СӮСҖР°РІРёРҪРәРё. РңРҫР»СҺ СӮРөРұСҸ, РҝРҫРјРҫРіРё РјРҪРө Рё РҙР°Р№ СҒРёР»! РҹСғСҒСӮСҢ СҸ, РҝРҫРҙРҫРұРҪРҫ СӮРөРұРө, РҫСҒРІРҫРұРҫР¶СғСҒСҢ РҫСӮ РІСҒРөС… СҚРіРҫРёСҒСӮРёСҮРөСҒРәРёС… Р¶РөР»Р°РҪРёР№ Рё СғСҒСӮСҖРөРјР»РөРҪРёР№.\"]},{\"number\":\"2\",\"text\":[\"СҒР°РәР°Р»Рө СҒР°РјРјР°М„РҪ    РәРҫСҖРёСӮРө СҲМҒР°РәР°СӮРё,\",\"    РҙРөС…Рҫ РҪР°М„СӮС…Р°! РҙР¶Р°СӮС…Р°М„ РҙР¶Р°СӮС…Р°\",\"СӮРҫРұРө СӮРҫвҖҷ РіР°М„РёРұРҫ    С…Р°СҖРёРҪР°М„РјР°-СҒСғРәС…Рө,\",\"    Р°РҝР°СҖР°М„РҙС…Р° С…РҫРұРө С…РҫСӮРҫ\"],\"translation\":[\"РқР°СғСҮРё РјРөРҪСҸ РҫРәР°Р·СӢРІР°СӮСҢ РҙРҫР»Р¶РҪРҫРө РҝРҫСҮСӮРөРҪРёРө РІСҒРөРј. РўРҫРіРҙР°, РұР»Р°РіРҫРҙР°СҖСҸ РІРҫСҒРҝРөРІР°РҪРёСҺ РЎРІСҸСӮРҫРіРҫ РҳРјРөРҪРё, РІСҒРө РјРҫРё РҫСҒРәРҫСҖРұР»РөРҪРёСҸ РұСғРҙСғСӮ РҝРҫР»РҪРҫСҒСӮСҢСҺ СғРҪРёСҮСӮРҫР¶РөРҪСӢ.\"]},{\"number\":\"3\",\"text\":[\"РәРҫРұРө С…РөРҪРҫ РәСҖМЈРҝР°М„    Р»РҫРұС…РёР№Р°М„ СҚ РҙР¶Р°РҪР°,\",\"    РәСҖМЈСӮР°М„СҖСӮС…Р° С…РҫРёРұРө, РҪР°М„СӮС…Р°!\",\"СҲМҒР°РәСӮРё-РұСғРҙРҙС…Рё-С…УЈРҪ    Р°М„РјРё Р°СӮРё РҙУЈРҪ,\",\"    РәРҫСҖРҫ РјРҫСҖРө Р°М„СӮРјР°-СҒР°М„СӮС…Р°\"],\"translation\":[\"Рһ РјРҫР№ РІР»Р°РҙСӢРәР°! РҡРҫРіРҙР° Р¶Рө СӮРІРҫСҸ РјРёР»РҫСҒСӮСҢ РҪРёР·РҫР№РҙРөСӮ РҪР° СӮРҫРіРҫ, РәСӮРҫ Р»РёСҲРөРҪ СҖР°Р·СғРјР°, РҫСҮРөРҪСҢ СҒР»Р°Рұ Рё РұРөСҒРҝРҫРјРҫСүРөРҪ. РңРҫР»СҺ, РҝРҫР·РІРҫР»СҢ РјРҪРө РұСӢСӮСҢ СҒ СӮРҫРұРҫР№!\"]},{\"number\":\"4\",\"text\":[\"РҙР¶Р№РҫРіР№Р°СӮР°М„-РІРёСҮР°М„СҖРө    РәРёСҮС…УҜ РҪР°М„С…Рё РҝР°М„Рё,\",\"    СӮРҫРјР°М„СҖР° РәРҫСҖСғРҪР°М„-СҒР°М„СҖР°\",\"РәРҫСҖСғРҪР°М„ РҪР°М„ С…РҫРёР»Рө    РәР°М„МҗРҙРёР№Р°М„ РәР°М„МҗРҙРёР№Р°М„,\",\"    РҝСҖР°М„РҪМЈР° РҪР°М„ СҖР°М„РәС…РёРұРҫ Р°М„СҖР°\"],\"translation\":[\"Р•СҒР»Рё СӮСӢ РІРҪРёРјР°СӮРөР»СҢРҪРҫ РҝРҫСҒРјРҫСӮСҖРёСҲСҢ РҪР° РјРөРҪСҸ, СӮРҫ РҪРө РҪР°Р№РҙРөСҲСҢ Рё СҒР»РөРҙР° С…РҫСҖРҫСҲРёС… РәР°СҮРөСҒСӮРІ. РўРІРҫСҸ РјРёР»РҫСҒСӮСҢ РҙР»СҸ РјРөРҪСҸ вҖ” РІСҒРө! Р•СҒР»Рё СӮСӢ РҪРө РұСғРҙРөСҲСҢ РјРёР»РҫСҒСӮРёРІ РәРҫ РјРҪРө, РјРҪРө РҫСҒСӮР°РҪРөСӮСҒСҸ СӮРҫР»СҢРәРҫ РіРҫСҖСҢРәРҫ РҫРҝР»Р°РәРёРІР°СӮСҢ СҒРІРҫСҺ СҒСғРҙСҢРұСғ, Рё СҒР°РјР° РјСӢСҒР»СҢ Рҫ РҝРҫРҙРҙРөСҖР¶Р°РҪРёРё Р¶РёР·РҪРё СҒСӮР°РҪРөСӮ РјРҪРө РҪРөРҪР°РІРёСҒСӮРҪР°.\"]}],\"embeds\":[{\"title\":\"РЁСҖРёР»Р° Р“РҫРІРёРҪРҙР° РңР°С…Р°СҖР°РҙР¶\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-gurudev-kripa\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fgovinda-maharaj-gurudev-kripa\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fgovinda-maharaj-gurudev-kripa\\\"\u003e\u003c/iframe\u003e\"},{\"title\":\"РЁСҖРёР»Р° РЁСҖРёРҙС…Р°СҖ РңР°С…Р°СҖР°РҙР¶\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/sridhar-maharaj-and-govinda-6\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fsridhar-maharaj-and-govinda-6\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fsridhar-maharaj-and-govinda-6\\\"\u003e\u003c/iframe\u003e\"},{\"title\":\"РқР°РІР°РҙРІРёРҝ Р”С…Р°Рј\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-gurudev-morning\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fnavadwip-scsm-gurudev-morning\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allo
