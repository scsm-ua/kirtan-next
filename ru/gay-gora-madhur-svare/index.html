Р°СҖРө С…Р°СҖРө\",\"С…Р°СҖРө СҖР°М„РјР° С…Р°СҖРө СҖР°М„РјР°, СҖР°М„РјР° СҖР°М„РјР° С…Р°СҖРө С…Р°СҖРө\"],\"translation\":[\"Р“РҫСҒРҝРҫРҙСҢ Р“Р°СғСҖР°СҒСғРҪРҙР°СҖ РҝРҫРөСӮ СҒР»Р°РҙРҫСҒСӮРҪСӢРј РіРҫР»РҫСҒРҫРј: В«РҘР°СҖРө РҡСҖРёСҲРҪР°, РҘР°СҖРө РҡСҖРёСҲРҪР°, РҡСҖРёСҲРҪР° РҡСҖРёСҲРҪР°, РҘР°СҖРө РҘР°СҖРө, РҘР°СҖРө Р Р°РјР°, РҘР°СҖРө Р Р°РјР°, Р Р°РјР° Р Р°РјР°, РҘР°СҖРө РҘР°СҖРө!В»\"]},{\"number\":\"2\",\"text\":[\"РіСҖМЈС…Рө СӮС…Р°М„РәРҫ, РІР°РҪРө СӮС…Р°М„РәРҫ, СҒР°РҙР°М„ вҖҳС…Р°СҖРёвҖҷ РұРҫР»РөвҖҷ РҙМЈР°М„РәРҫ\",\"СҒСғРәС…Рө РҙСғС…МЈРәС…Рө РұС…СғР»Рҫ РҪР°М„РәРҫ, РІР°РҙР°РҪРө С…Р°СҖРёРҪР°М„Рј РәРҫСҖРҫ СҖРө\"],\"translation\":[\"Р”РҫРјРҫС…РҫР·СҸРёРҪ СӮСӢ РёР»Рё РҫСӮСҲРөР»СҢРҪРёРә, РІСҒРөРіРҙР° РІРҫСҒРҝРөРІР°Р№ РЎРІСҸСӮРҫРө РҳРјСҸ Р“РҫСҒРҝРҫРҙР°! Р’ СҒСҮР°СҒСӮСҢРө Рё РҝРөСҮР°Р»Рё РҪРө Р·Р°РұСӢРІР°Р№ РІР·СӢРІР°СӮСҢ Рә РЎРІСҸСӮРҫРјСғ РҳРјРөРҪРё, РҪР°РҝРҫР»РҪСҸСҸ СҒРІРҫРё СғСҒСӮР° РҪРөРәСӮР°СҖРҫРј РҘР°СҖРёРҪР°РјР°.\"]},{\"number\":\"3\",\"text\":[\"РјР°М„Р№Р°М„-РҙР¶Р°М„Р»Рө РұР°РҙРҙС…Р° С…РҫвҖҷР№Рө, Р°М„СҮС…Рҫ РјРёСҮС…Рө РәР°М„РҙР¶Р° Р»РҫвҖҷР№Рө\",\"СҚРәС…РҫРҪР° Рҫ СҮРөСӮР°РҪР° РҝРөР№Рө, СҖР°М„РҙС…Р°М„-РјР°М„РҙС…Р°РІР°-РҪР°М„Рј РұРҫР»Рҫ СҖРө\"],\"translation\":[\"РЎРәРҫРІР°РҪРҪСӢР№ СҒРөСӮСҸРјРё *РјР°Р№Рё*, СӮСӢ СҒСӮР°Р» СҖР°РұРҫРј РёР»Р»СҺР·РёРё Рё СӮСүРөСӮРҪРҫ СӮСҖСғРҙРёСҲСҢСҒСҸ. РўСӢ РҫРұСҖРөР» СҮРөР»РҫРІРөСҮРөСҒРәСғСҺ Р¶РёР·РҪСҢ Рё СҒРҫР·РҪР°РҪРёРө, РІРҫСҒРҝРөРІР°Р№ Р¶Рө РёРјРөРҪР° Р Р°РҙС…Р°-РңР°РҙС…Р°РІСӢ!\"]},{\"number\":\"4\",\"text\":[\"РҙР¶УЈРІР°РҪР° С…РҫРёР»Рҫ СҲМҒРөСҲМЈР°, РҪР°М„ РұС…Р°РҙР¶РёР»Рө С…СҖМЈСҲМЈУЈРәРөСҲМҒР°\",\"РұС…Р°РәР°СӮРёРІРёРҪРҫРҙ-СғРҝР°РҙРөСҲМҒР°, СҚРәРұР°М„СҖ РҪР°М„Рј-СҖР°СҒРө РјР°М„СӮРҫ СҖРө\"],\"translation\":[\"РқРөСҒРҫРјРҪРөРҪРҪРҫ, Р¶РёР·РҪСҢ СҒРәРҫСҖРҫСӮРөСҮРҪР°, Р° СӮСӢ РҪРө РҝРҫРәР»РҫРҪСҸРөСҲСҢСҒСҸ РҘСҖРёСҲРёРәРөСҲРө, РҹРҫРІРөР»РёСӮРөР»СҺ СҮСғРІСҒСӮРІ. Р‘С…Р°РәСӮРёРІРёРҪРҫРҙ СғРјРҫР»СҸРөСӮ СӮРөРұСҸ: С…РҫСӮСҸ РұСӢ СҖР°Р· РІРәСғСҒРё *РҪР°РјР°-СҖР°СҒСғ*, РҪРөРәСӮР°СҖ РЎРІСҸСӮРҫРіРҫ РҳРјРөРҪРё!\"]}],\"embeds\":[{\"title\":\"РЁСҖРёР»Р° Р“РҫРІРё
