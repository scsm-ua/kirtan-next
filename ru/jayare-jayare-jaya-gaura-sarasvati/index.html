ts.first_line\":false,\"tg.a-z.title.words\":4},\"songsCount\":166},\"href\":\"/ua/jayare-jayare-jaya-gaura-sarasvati\",\"isActive\":false}]\n3b:[\"$\",\"$L43\",null,{\"bookId\":\"ru\"}]\n3c:[\"$\",\"section\",null,{\"className\":\"SongHeader\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"SongHeader__title\",\"children\":[[\"$\",\"div\",\"Шри Сарасват-арати\",{\"children\":\"Шри Сарасват-арати\"}]]}],null,[],[[\"$\",\"div\",\"Ш́рӣла Бхакти Ракш̣ак Ш́рӣдхар Дев-Госва̄мӣ Маха̄ра̄дж\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/ru/authors\",\"children\":\"Ш́рӣла Бхакти Ракш̣ак Ш́рӣдхар Дев-Госва̄мӣ Маха̄ра̄дж\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L44\",null,{\"label\":\"Показывать стихи / перевод\",\"song\":{\"meta\":{\"page\":66,\"first_line\":\"джайаре джайаре джайа гаура-сарасватӣ\"},\"title\":[\"Шри Сарасват-арати\"],\"author\":[\"Ш́рӣла Бхакти Ракш̣ак Ш́рӣдхар Дев-Госва̄мӣ Маха̄ра̄дж\"],\"verses\":[{\"number\":\"1\",\"text\":[\"джайаре джайаре джайа гаура-сарасватӣ\",\"бхакативинода нвайа корун̣а̄ мурати\"],\"translation\":[\"Слава! Слава! Слава Шриле Бхактисиддханте Сарасвати Тхакуру, который близок Шриле Бхактивиноду Тхакуру и является олицетворением чистой милости Шри Гауранги!\"]},{\"number\":\"2\",\"text\":[\"прака̄ш́иле гаура-сева̄ бхӯвана ман̇гала\",\"бхакатисиддха̄нта ш́уддха праджн̃а̄на уджвала\"],\"translation\":[\"Ты заново открыл преданное служение Господу Гауранге, — и это величайшее благо для всего мироздания. Твои философские заключения, исполненные безраздельной преданности Господу, сияют абсолютным знанием.\"]},{\"number\":\"3\",\"text\":[\"ра̄дха̄-ш́йа̄ма экатану дакш̣е гора̄ ра̄йа\",\"ба̄ме ра̄дха мадхйе свайам̇ ш́йа̄ма-гопа джайа\"],\"translation\":[\"Слава Шри Шри Радхе и Шьяму (Кришне), воплощенным в одном образе Шри Гауранги, Который стоит справа! Слава Шримати Радхарани, стоящей слева! Слава Тому, Кто стоит посередине, и Кто есть не кто иной, как верховный Пастушок — Шри Шьямасундар!\"]},{\"number\":\"4\",\"text\":[\"браджа раса нава бха̄ве набадвӣпе ра̄дже\",\"уда̄ре мадхура ра̄га абхинава са̄дже\"],\"translation\":[\"Вкус Враджи (Вриндавана) присутствует в Навадвипе в новом настроении. Когда это сладостное чувство любви соединяется с великодушием, оно становится бесподобно прекрасным.\"]},{\"number\":\"5\",\"text\":[\"ма̄дхурйа каивалйа ра̄га браджера нирджа̄са\",\"пра̄пти пара̄ка̄ш̣т̣ха̄ та̄хе гауран̇га вила̄са\"],\"translation\":[\"*Мадхура-раса* (божественная любовь в супружестве) — суть Враджа Дхамы, а игры Шримана Махапрабху возносят ее до наивысшего совершенства.\"]},{\"number\":\"6\",\"text\":[\"ра̄дха̄ бха̄ва-ка̄нти ан̇гикари’ бха̄ло мате\",\"дакш̣ин̣е а̄сана раса гарима̄ декха̄те\"],\"translation\":[\"Великодушно принимая настроение и красоту Шримати Радхарани, Он занимает Свое место справа, чтобы явить славу Своего положения.\"]},{\"number\":\"7\",\"text\":[\"ра̄дха̄-раса-тройо-сва̄да рахасйа пройа̄са\",\"ниракхи прапхулла ра̄дха̄ мукхе манда ха̄са\"],\"translation\":[\"Видя озорное желание Кришны познать славу Ее любви и вкушая Его удивительную сладость, которой только Она и может наслаждаться благодаря Своим трансцендентным качествам; переживая счастье от сладостной любви Кришны к Ней, Шримати Радхарани счастлива и прячет улыбку на Своем лице.\"]},{\"number\":\"8\",\"text\":[\"мадхйе рахи вам̇ш́ираве гхош̣е вам̇ш́ӣдхара\",\"ра̄дха̄ра сампаде а̄мӣ гаура̄н̇га-сундара\"],\"translation\":[\"Стоящий в центре Вамшидхара (Играющий на флейте) провозглашает: «Облаченный в славу Своей Радхи, Я являюсь Гауранга Сундаром!»\"]},{\"number\":\"9\",\"text\":[\"мадабхӣш̣т̣ха рӯпа ра̄дха̄ра хр̣дойа мандире\",\"гаура̄н̇га бхаджиле суш̣т̣ху спхӯрти па̄йа та̄ре\"],\"translation\":[\"«Мой самый сокровенный образ покоится в храме драгоценного сердца Шримати Радхарани. Самое высшее из Моих проявлений можно обрести лишь поклонением Гауранге».\"]},{\"number\":\"10\",\"text\":[\"надӣйа̄ прака̄ш́е маха̄прабху гаура-нидхи\",\"патита па̄вана деве мила̄ила видхи\"],\"translation\":[\"По божественной воле Господа высший Спаситель падших душ явился в Надии как величайший возлюбленный Шри Гауранга Махапрабху.\"]},{\"number\":\"11\",\"text\":[\"э-рӯпа а̄рати брахма̄ ш́амбху агочара\",\"гаура бхакта кр̣па̄ па̄тра ма̄тра сиддхи са̄ра\"],\"translation\":[\"Это поклонение Махапрабху не могут видеть ни Господь Брахма, ни Господь Шамбху (Шива). Только благодаря милости преданного Господа Гауранги можно обрести такое совершенство.\"]},{\"number\":\"12\",\"text\":[\"ш́рӣ сварӯпа, ра̄ма̄нанда, рӯпа, сана̄тана\",\"ш́рӣ рагху, джӣва̄ди кр̣па̄йа декхе бхакта-джана\"],\"translation\":[\"Только по милости Шри Сварупы Дамодара, Шри Рамананды Рая, Шри Рупы, Шри Санатаны, Шри Рагхунатхи, Шри Дживы Госвами и их сподвижников, преданные обретают подобное вúдение.\"]},{\"number\":\"13\",\"text\":[\"джайа гуру-гаура-ра̄дха̄-говинда-сундара\",\"джайа да̄о бхакта-вр̣нда нитйа нирантара\"],\"translation\":[\"Слава Шри Гуру, Господу Гауранге, Шри Радхе и прекрасному Господу Говинде! Преданные, воспевайте Их славу всегда и везде!\"]}],\"embeds\":[{\"title\":\"Навадвип Дхам\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-kiba-jaya-jaya\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fnavadwip-scsm-kiba-jaya-jaya\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fnavadwip-scsm-kiba-jaya-jaya\\\"\u003e\u003c/iframe\u003e\"},{\"title\":\"Каракас Дхам\",\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-gaura-arati-i\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fshchsm-karakas-gaura-arati-i\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbharatimaharaj%2Fshchsm-karakas-gaura-arati-i\\\"\u003e\u003c/iframe\u003e\"}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Навадвипский храм\",\"ua\":\"Навадвіпський храм\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-kiba-jaya-jaya\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-gaura-arati-i\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L45\",null,{\"audio\":\"$3d:props:song:resources:audio\",\"language\":\"ru\"}]\n3f:[\"$\",\"$L46\",null,{\"navMap\":{\"66\":{\"prev\":{\"path\":\"/ru/jaya-jaya-gaurachander-arotiko-shobha?p=64\",\"title\":\"Шри Гаура-арати\"},\"next\":{\"path\":\"/ru/gurudeva-kripa-bindu-diya-kara-ei-dase?p=68\",\"title\":\"Гурудев\"}}}}]\n47:T88e,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/ru/jayare-jayare-jaya-gaura-sarasvati\",\"url\":\"https://kirtan.site/ru/jayare-jayare-jaya-gaura-sarasvati\",\"name\":\"Шри Сарасват-арати. Ш́рӣла Бхакти Ракш̣ак Ш́рӣдхар Дев-Госва̄мӣ Маха̄ра̄дж\",\"inLanguage\":\"ru\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/ru/jayare-jayare-jaya-gaura-sarasvati#composition\",\"alternateName\":[\"джайаре джайаре джайа гаура-сарасватӣ\"],\"name\":\"Шри Сарасват-арати. Ш́рӣла Бхакти Ракш̣ак Ш́рӣдхар Дев-Госва̄мӣ Маха̄ра̄дж\",\"url\":\"https://kirtan.site/ru/jayare-jayare-jaya-gaura-sarasvati\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEntityOfPage\":{\"@id\":\"https://kirtan.site/ru/jayare-jayare-jaya-
