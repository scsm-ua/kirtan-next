uthor\":[\"Śrīla Bhakti Vinod Ṭhākur\"],\"subtitle\":[\"Canção 3\"],\"verses\":[{\"text\":[\"tṛṇād api sunīchena taror iva sahiṣṇunā\",\"amāninā mānadena kīrtanīyaḥ sadā hariḥ\"],\"word_by_word\":[\"**hariḥ**–O Nome de Hari **kīrtanīyaḥ**–deveria ser cantado **sadā**–sempre [por quem é] **api**–mais **sunīchena**–humilde que **tṛṇāt**–uma folha de grama, **sahiṣṇunā**–quem é tolerante **iva**–como **taroḥ**–uma árvore, **amāninā**–quem é sem orgulho, [e] **mānadena**–quem é respeitoso.\"],\"translation\":[\"“O Nome do Senhor deveria ser cantado sempre por aquele que é mais humilde que uma folha de grama, tão tolerante quanto uma árvore, respeitoso com os outros e livre de desejo por respeito.”\"]},{\"subtitle\":[\"Gīti\"]},{\"number\":\"1\",\"text\":[\"śrī-kṛṣṇa-kīrtane yadi mānasa tohāra\",\"parama yatane ta̐hi labha adhikāra\"],\"word_by_word\":[\"**yadi**–Se **tohāra [āchchhe]**–você tem **mānasa**–uma mente **kīrtane**–para cantar **śrī-kṛṣṇa**–o Nome de Śrī Kṛṣṇa, [então com] **parama**–grande **yatane**–cuidado **labha**–obtenha **adhikāra**–a qualificação **ta̐hi**–para isso.\"],\"translation\":[\"Se você aspira a cantar o Nome de Kṛṣṇa, então, com muito cuidado, torne-se qualificado para fazer isso.\"]},{\"number\":\"2\",\"text\":[\"tṛṇādhika hīna, dīna, akiñchana, chhāra\",\"āpane mānabi sadā chhāḍi’ ahaṅkāra\"],\"word_by_word\":[\"**chhāḍi’**–Abandone [seu] **ahaṅkāra**–falso ego, [e] **sadā**–sempre **mānabi**–considere **āpane**–se [a si] **hīna**–mais baixo **adhika**–do que [uma folha de] **tṛṇa**–grama, **dīna**–pobre, **akiñchana**–necessitado, [e] **chhāra**–mesquinho.\"],\"translation\":[\"Abandone seu falso ego, e sempre se considere mais baixo que uma folha de grama, pobre, necessitado, e mesquinho.\"]},{\"number\":\"3\",\"text\":[\"vṛkṣa-sama kṣamā-guṇa karabi sādhana\",\"pratihiṁsā tyaji’ anye karabi pālana\"],\"word_by_word\":[\"**sādhana karabi**–Pratique **guṇa**–a qualidade **kṣamā**–da tolerância **sama**–como **vṛkṣa**–uma árvore. **tyaji’**–Abandone [a] **pratihiṁsā**–vingança, [e] **pālana karabi**–nutra [os] **anye**–outros.\"],\"translation\":[\"Pratique a tolerância como uma árvore. Abandone a retaliação e nutra os outros.\"]},{\"number\":\"4\",\"text\":[\"jīvana-nirvāhe āne udvega nā dibe\",\"para-upakāre nija-sukha pāsaribe\"],\"word_by_word\":[\"**dibe nā**–Não cause **udvega**–ansiedade **āne**–aos outros **jīvana-nirvāhe**–para a manutenção da [sua] vida, [e] **pāsaribe**–esqueça [sua] **nija**–própria **sukha**–felicidade **upakāre**–no decurso de ajudar [os] **para**–outros.\"],\"translation\":[\"Não perturbe os outros em troca de sua manutenção, e esqueça a sua própria felicidade ao ajudar os outros.\"]},{\"number\":\"5\",\"text\":[\"ha-ileo sarva-guṇe guṇī mahāśaya\",\"pratiṣṭhāśā chhāḍi’ kara amānī hṛdaya\"],\"word_by_word\":[\"**ha-ileo**–Mesmo que você seja **mahāśaya**–honrável [e] **guṇī**–qualificado [com] **sarva**–todas [as] **guṇe**–qualidades, **chhāḍi’**–abandone [o] **āśā**–desejo **pratiṣṭhā**–por prestígio [e] **kara**–faça [seu] **hṛdaya**–coração **amānī**–sem orgulho.\"],\"translation\":[\"Mesmo que você seja honrável e qualificado com todas as qualidades, abandone o desejo por prestígio e torne seu coração sem orgulho.\"]},{\"number\":\"6\",\"text\":[\"kṛṣṇa-adhiṣṭhāna sarva-jīve jāni’ sadā\",\"karabi sammāna sabe ādare sarvadā\"],\"word_by_word\":[\"**jāni’**–Sabendo [que] **sarva**–toda **jīve**–alma [é] **sadā**–eternamente **adhiṣṭhāna**–uma morada **kṛṣṇa**–de Kṛṣṇa, **sarvadā**–sempre **ādare**–respeitosamente **sammāna karabi**–honre **sabe**–a todos.\"],\"translation\":[\"Sabendo que Kṛṣṇa reside eternamente dentro de cada alma, respeitosamente honre sempre a todos.\"]},{\"number\":\"7\",\"text\":[\"dainya, dayā, anye māna, pratiṣṭhā-varjana\",\"chāri guṇe guṇī hai’ karaha kīrtana\"],\"word_by_word\":[\"**dainya**–Humildade **dayā**–compaixão **māna**–honra [aos] **anye**–outros, [e] **varjana**–abandonando **pratiṣṭhā**–prestígio. **hai’**–Se torne **guṇī**–qualificado [com essas] **chāri**–quatro **guṇe**–qualidades [e] **kīrtana karaha**–cante.\"],\"translation\":[\"Humildade, gentileza (cuidado com os outros), oferecer honra aos outros (apreciar a qualidade do serviço dos outros) e ser desinteressado por posição, prestígio—se torne qualificado com estas quatro qualidades e cante o Nome.\"]},{\"number\":\"8\",\"text\":[\"bhakati-vinoda kā̐di’ bale prabhu-pāya\",\"“heno adhikāra kabe dibe he amāya”\"],\"word_by_word\":[\"**kā̐di’**–Chorando **pāya**–aos pés **prabhu**–do Senhor **bhakati-vinoda**–Bhakti Vinod **bale**–diz **“he**–“Oh **kabe**–quando **dibe**–Você dará **amāya**–a mim **hena**–essas **adhikāra”**–qualificações?”\"],\"translation\":[\"Chorando aos pés do Senhor, Bhakti Vinod diz: “Oh, quando Você me dará essas qualificações?”\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/102-srisrisiksastakam3-7\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/sri-krishna-kirtane-jodi-manasa-tohara\"}]}}}]\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L1e\",null,{\"audio\":\"$16:props:song:resources:audio\",\"language\":\"pt\"}]\n18:[\"$\",\"$L1f\",null,{\"navMap\":{\"139\":{\"prev\":{\"path\":\"/pt/tuhu-daya-sagara-tarayite-prani/\",\"title\":\"2. tuhu̐ dayā-sāgara\"},\"next\":{\"path\":\"/pt/prabhu-tava-pada-juge-mora-nivedana/\",\"title\":\"4. prabhu tava pada\"}}}}]\n20:T7cc,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/pt/shri-krishna-kirtane-jodi-manasa-tohara\",\"url\":\"https://kirtan.site/pt/shri-krishna-kirtane-jodi-manasa-tohara\",\"name\":\"Śrī Śikṣāṣṭakam. Śrīla Bhakti Vinod Ṭhākur. Canção 3\",\"inLanguage\":\"pt\"
