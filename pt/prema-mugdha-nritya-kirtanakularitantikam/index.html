undar, a personifica√ßao de KŠĻõŠĻ£ŠĻáa-prema.\"]},{\"number\":\"46\",\"text\":[\"brahma-sŇętra-bhńĀŠĻ£ya-kŠĻõŠĻ£ŠĻáa-nńĀradopadeŇõakaŠĻĀ\",\"Ňõloka-turya-bhńĀŠĻ£aŠĻáńĀnta-kŠĻõŠĻ£ŠĻáa-samprakńĀŇõakam\",\"Ňõabda-vartanńĀnta-hetu-nńĀma-jńęva-nistaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Quando o Senhor Chaitanyadev estava em KńĀŇõńę diante de uma grande assembleia de impersonalistas renunciados, Ele mostrou que o *Ňörńęmad BhńĀgavatam*, como √© ensinado na genu√≠na sucess√£o discipular do Senhor KŠĻõŠĻ£ŠĻáa a NńĀrad e entregue por este a Ňörńęla VyńĀsadev, √© o verdadeiro coment√°rio das conclus√Ķes dos *VedńĀnta-sŇętras*. Ňörńę GaurńĀŠĻÖga tamb√©m explicou os quatro versos fundamentais do *Ňörńęmad BhńĀgavatam* e revelou que o Senhor KŠĻõŠĻ£ŠĻáa √© a realidade √ļltima al√©m de toda dualidade e o princ√≠pio original de todo o arranjo universal. Atrav√©s do aforismo V√©dico *‚ÄėanńĀvŠĻõttiŠł• ŇõabdńĀt anńĀvŠĻõttiŠł• ŇõabdńĀt‚Äô*, o Senhor Chaitanya estabeleceu que os Santos Nomes do Senhor KŠĻõŠĻ£ŠĻáa s√£o o som consciente em sua express√£o mais elevada que concede o benef√≠cio m√°ximo ao libertar a alma de seu estado de exist√™ncia condicionada. Eu ofere√ßo minha rever√™ncia a esse belo Senhor Dourado, GaurńĀŠĻÖgasundar, a personifica√ßao de KŠĻõŠĻ£ŠĻáa-prema.\"]},{\"number\":\"47\",\"text\":[\"ńĀtma-rńĀma-vńĀchanńĀdi-nirvviŇõeŠĻ£a-khaŠĻáŠłćanaŠĻĀ\",\"Ňõrauta-vńĀkya-sńĀrthakaika-chidvilńĀsa-maŠĻáŠłćanam\",\"divya-kŠĻõŠĻ£ŠĻáa-vigrahńĀdi-gauŠĻáa-buddhi-dhikkaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Ao explicar o famoso verso ńĀtmarńĀma do *Ňörńęmad BhńĀgavatam* sessenta e uma vezes, o Senhor GaurńĀŠĻÖga estra√ßalhou a doutrina impersonalista propagada por ŇöaŠĻÖkar ńÄchńĀrya. O Senhor tamb√©m recitou muitas refer√™ncias dos UpaniŠĻ£ads, tais como *apńĀŠĻái-pńĀdo javano grahńętńĀ paŇõyaty achakŠĻ£uŠł• sa ŇõŠĻõnoty akarŠĻáaŠł•*, revelando a doce e encantadora natureza dos Passatempos espirituais da Verdade Absoluta. O Senhor Chaitanya censurou totalmente a odiosa concep√ß√£o dos impersonalistas de que a Forma transcendental do Senhor KŠĻõŠĻ£ŠĻáa, o Nome, as Qualidades, os Passatempos e a manifesta√ß√£o de Deidade s√£o simplesmente uma transforma√ß√£o imagin√°ria da energia ilus√≥ria de MńĀyńĀ. Eu ofere√ßo minha rever√™ncia a esse belo Senhor Dourado, GaurńĀŠĻÖgasundar, a personifica√ßao de KŠĻõŠĻ£ŠĻáa-prema.\"]},{\"number\":\"48\",\"text\":[\"brahma-pńĀramńĀtmya-lakŠĻ£aŠĻáńĀdvayaika-vńĀchanaŠĻĀ\",\"Ňõrńę-vraja-svasiddha-nanda-lńęla-nanda-nandanam\",\"Ňõrńę-rasa-svarŇępa-rńĀsa-lńęla-gopa-sundaraŠĻĀ\",\"prema-dhńĀma-devam eva naumi gaura-sundaram\"],\"translation\":[\"Quando o Senhor GaurńĀŠĻÖga Se referiu ao verso *‚ÄúparamńĀtmeti bhagavńĀn iti Ňõabdyate‚ÄĚ* do *Ňörńęmad BhńĀgavatam*, Ele harmoniosamente acomodou a concep√ß√£o do aspecto n√£o diferenciado da realidade, o Brahma, que √© a meta √ļltima dos impersonalistas, com a concep√ß√£o do aspecto localizado da realidade, ParamńĀtma, que √© a meta dos perfeccionistas m√≠sticos. O Senhor ajustou essas duas verdades mostrando que elas estavam inclu√≠das dentro‚ÄĒe ultrapassadas pela‚ÄĒda concep√ß√£o final da Verdade Absoluta n√£o dual, BhagavńĀn, que √© o princ√≠pio primordial da realidade. Ao revelar esta verdade axiom√°tica em conex√£o com a natureza alegre e confidencial dos Passatempos espirituais do Senhor Supremo, o Senhor GaurńĀŠĻÖga mostrou a natureza divina de Vraja, que existe acima dos planetas VaikuŠĻáŠĻ≠ha.\"]},{\"text\":[\"vaikuŠĻáŠĻ≠hńĀj janito varńĀ madhu-purńę tatrńĀpi rńĀsotsavńĀd\",\"vŠĻõndńĀraŠĻáyam udńĀra-pńĀŠĻái-ramaŠĻáńĀt tatrńĀpi govardhanaŠł•\",\"rńĀdhńĀ-kuŠĻáŠłćam ihńĀpi gokula-pateŠł• premńĀmŠĻõtńĀplńĀvanńĀt\",\"kuryńĀd asya virńĀjato giri-taŠĻ≠e sevńĀŠĻĀ vivekńę na kaŠł•\"],\"translation\":[\"$31\"]},{\"number\":\"49\",\"text\":[\"rńĀdhikńĀ-vinoda-mńĀtra-tattva-lakŠĻ£aŠĻáńĀnvayaŠĻĀ\",\"sńĀdhu-saŠĻÖga-kŠĻõŠĻ£ŠĻáa-nńĀma-sńĀdhanaika-niŇõchayam\",\"prema-sevanaika-mńĀtra-sńĀdhya-kŠĻõŠĻ£ŠĻáa-
