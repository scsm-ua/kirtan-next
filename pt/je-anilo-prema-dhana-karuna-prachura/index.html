ra rūpa kā̐hā sanātana\",\"kā̐hā dāsa raghunātha patita-pāvana\"],\"translation\":[\"Onde estão meus Svarūp, Rūpa e Sanātan? Onde está o meu Raghunāth Dās? Onde estão os salvadores das almas caídas?\"]},{\"number\":\"3\",\"text\":[\"kā̐hā mora bhaṭṭa-yuga kā̐hā kavirāja\",\"eka-kāle kothā gelā gorā naṭa-rāja\"],\"translation\":[\"Onde estão meus Raghunāth Bhaṭṭa e Gopāl Bhaṭṭa? Onde está meu Kṛṣṇadās Kavirāj? Para onde de repente o grande dançarino Śrī Gaurāṅga foi?\"]},{\"number\":\"4\",\"text\":[\"pāṣāṇe kuṭiba māthā anale paśiba\",\"gaurāṅga guṇera nidhi kothā gele pāba\"],\"translation\":[\"Eu vou quebrar minha cabeça em uma pedra, vou entrar no fogo—onde devo ir para alcançar o reservatório de todas as qualidades, Śrī Gaurāṅga?\"]},{\"number\":\"5\",\"text\":[\"se saba saṅgīra saṅge ye kaila vilāsa\",\"se saṅga nā pāñā kānde narottama dāsa\"],\"translation\":[\"Não encontrando a associação de Śrī Gaurāṅga, que realizou Seus Passatempos com todos esses associados, Narottam Dās chora.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/krsnachaitanya-das/49-ye-anilo-prema-dhana-1\"},{\"title\":{\"en\":\"Srila B.S. Goswami Maharaj\",\"ru\":\"Шрила Б.С. Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/goswami-maharaj-viraha-giti\"},{\"title\":{\"en\":\"Srila B.R. Madhusudan Maharaj\",\"ru\":\"Шрила Б.Р. Мадхусудан Махарадж\",\"ua\":\"Шріла Б.Р. Мадгусудан Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/madhusudan-maharaj-viraha-giti\"}]}}}]\n"])</script><script>self.__next_f.push([1,"29:[\"$\",\"$L31\",null,{\"audio\":\"$28:props:song:resources:audio\",\"language\":\"pt\"}]\n2a:[\"$\",\"$L32\",null,{\"navMap\":{\"207\":{\"prev\":{\"path\":\"/pt/krishna-hoite-chatur-mukha?p=204\",\"title\":\"Śrī Guru-param
