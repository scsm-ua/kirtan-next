ation\":[\"Então, enquanto eu cantava o Nome de Govinda, muitos êxta-ses surgiram. Eu vi Śyām, o melhor dos dançarinos, tocando flauta com a filha de Vṛṣabhanu às margens do Yamunā sob uma árvore kadamba.\"]},{\"number\":\"2\",\"text\":[\"dekhiyā yugala-dhana asthira ha-ila mana\",\"jñāna-hārā ha-ilu̐ takhana\",\"kata-kṣane nāhi jāni jñāna-lābha ha-ila\",\"māni āra nāhi bhela daraśana\"],\"word_by_word\":[\"**dekhiyā**–Vendo **dhana**–a riqueza **yugala**–do Casal, [meu] **mana**–coração **ha-ila**–se tornou **asthira**–instável, [e] **takhana**–então **hārā ha-ilu̐**–eu perdi [a] **jñāna**–consciência. [Depois] **kata**–quanto **kṣane**–tempo **jāni nāhi**–eu não sei, **lābha ha-ila**–eu reganhei **jñāna**–consciência [e] **māni**–descobri [que] **bhela nāhi**–não havia **āra**–mais **daraśana**–visão [do Casal].\"],\"translation\":[\"Vendo o Casal Divino, meu coração se desestabilizou, e então eu perdi a consciência. Depois de muito tempo, eu a retomei, e vi que Eles tinham ido embora.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/gaite-govinda-nam\"}]}}}]\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"$L20\",null,{\"audio\":\"$19:props:song:resources:audio\",\"language\":\"pt\"}]\n1b:[\"$\",\"$L21\",null,{\"navMap\":{\"151\":{\"prev\":{\"path\":\"/pt/gaite-gaite-nama-ki-doshia-hoilo?p=149\",\"title\":\"7a. gāite gāite nāma\"},\"next\":{\"path\":\"/pt/sakhi-go-kemote-dhoribo-paran?p=152\",\"title\":\"7c. sakhi go kemate\"}}}}]\n22:T59d,{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/pt/gaite-govinda-nam-upajilo-bhava-gram\",\"url\":\"https://kirtan.site/pt/gaite-govinda-nam-upajilo-bhava-gram\",\"name\":\"Śrī Śikṣāṣṭakam. Śrīla Bhakti Vinod Ṭhākur. Canção 7b\",\"inLanguage\":\"pt\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"M
