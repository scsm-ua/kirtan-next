ber\":\"1\",\"text\":[\"tumi sarveśvareśvara, vrajendra-kumāra!\",\"tomāra ichāya viśve sṛjana saṁhāra\"],\"translation\":[\"Ak, jauneklīgais Vradžas karali, Tu esi visu valdnieku valdnieks! Visuma radīšana un iznīcināšana notiek tikai saskaņā ar Tavu gribu.\"]},{\"number\":\"2\",\"text\":[\"tava ichā-mato brahmā korena sṛjana\",\"tava ichā-mato viṣṇu korena pālana\"],\"translation\":[\"Saskaņā ar Tavu gribu Kungs Brahma rada un saskaņā ar Tavu gribu Kungs Višnu uztur.\"]},{\"number\":\"3\",\"text\":[\"tava ichā-mate śiva korena saṁhāra\",\"tava ichā-mate māyā sṛje kārāgāra\"],\"translation\":[\"Saskaņā ar Tavu gribu Kungs Šiva iznīcina, saskaņā ar Tavu gribu maja būvē šīs pasaules cietumu.\"]},{\"number\":\"4\",\"text\":[\"tava ichā-mate jīver janama-maraṇa\",\"samṛddhi-nipāta duḥkha sukha-saṅghaṭana\"],\"translation\":[\"Saskaņā ar Tavu gribu dzīvas būtnes dzimst un mirst, saskaņā ar Tavu gribu tās piedzīvo uzplaukumu un postu, laimi un nelaimi.\"]},{\"number\":\"5\",\"text\":[\"miche māyā-baddha jīva āśā-pāśe phire\",\"tava ichā vinā kichu korite nā pāre\"],\"translation\":[\"Sīka dvēsele, majas paverdzināta, veltīgi cīnās pasaulīgo vēlmju važās. Bez Tava atbalsta dvēsele nespēj izdarīt pilnīgi neko.\"]},{\"number\":\"6\",\"text\":[\"tumi to’ rakṣaka āro pālaka āmāra\",\"tomāra charaṇa vinā āśā nāhi āra\"],\"translation\":[\"Tu esi vienīgais, kas mani sargā un uztur. Bez Tavām lotosam līdzīgajām pēdām man nav, uz ko cerēt.\"]},{\"number\":\"7\",\"text\":[\"nija-bala-cheṣṭa-prati bharasā chāḍiyā\",\"tomāra ichāya āchi nirbhara koriyā\"],\"translation\":[\"Es vairs nepaļaujos uz saviem spēkiem. Esmu pilnībā atkarīgs tikai no Tavas gribas.\"]},{\"number\":\"8\",\"text\":[\"bhakativinoda ati dīna akiñchana\",\"tomāra ichāya tā’ra jīvana maraṇa\"],\"translation\":[\"Bhaktivinoda lepnība ir sagrauta. Tagad viņš dzīvos vai mirs tikai saskaņā ar Tavu gribu.\"]}],\"resources\":{}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L41\",null,{\"navMap\":{\"162\":{
