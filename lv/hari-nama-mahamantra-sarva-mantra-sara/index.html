"isActive\":false}]\n26:[\"$\",\"$L2f\",null,{\"bookId\":\"lv\"}]\n27:[\"$\",\"section\",null,{\"className\":\"SongHeader\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"SongHeader__title\",\"children\":[[\"$\",\"div\",\"Daśa-vidha Nāmāparādha\",{\"children\":\"Daśa-vidha Nāmāparādha\"}]]}],null,[[\"$\",\"div\",\"Desmit Svētā Vārda apvainojumi\",{\"className\":\"SongHeader__subtitle\",\"children\":\"Desmit Svētā Vārda apvainojumi\"}]],[[\"$\",\"div\",\"(bengāļu poēma, kuru sastādīja Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža)\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/lv/authors#section-Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža\",\"children\":\"(bengāļu poēma, kuru sastādīja Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža)\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"28:[\"$\",\"$L30\",null,{\"label\":\"Parādīt tulkojumu\",\"song\":{\"meta\":{\"page\":26,\"author\":\"Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža\",\"first_line\":\"hari-nāma mahāmantra sarva-mantra-sāra\"},\"title\":[\"Daśa-vidha Nāmāparādha\"],\"author\":[\"(bengāļu poēma, kuru sastādīja Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža)\"],\"subtitle\":[\"Desmit Svētā Vārda apvainojumi\"],\"verses\":[{\"number\":\"1\",\"text\":[\"hari-nāma mahāmantra sarva-mantra-sāra\",\"jādera karuṇābale jagate prachāra\",\"sei nāma-parāyaṇ sādhu, mahājana\",\"tāhādera nindā nā koriho kadāchana\"],\"translation\":[\"Harē Krišna mahā-mantra ir vislabākā no visām mantrām. *Sādhū*, kuru sirdīs Svētais Vārds izpauž savas dievišķās rotaļas (*nāma-parājanas*), izplata to ar savas žēlsirdības spēku. Šie *mahādžāni* (dižās dvēseles) Kungam ir ļoti dārgi un vienīgi viņi saista mūs ar Viņa Svēto Vārdu. Nekad nekritizējiet un neatraidiet viņus.\",\"Pirmais apvainojums: apvainot Kunga bhaktas.\"]},{\"number\":\"2\",\"text\":[\"vrajendranandana kṛṣṇa sarveśvareśvara\",\"maheśvara ādi tāra sevana-tatpara\",\"nāma chintāmaṇi kṛṣṇa-chaitanya-svarūpa\",\"bheda-jñāna nā koribe līlā-guṇa-rūpa\"],\"translation\":[\"Vradžendra-nandana Krišna ir visu *rasu* ietvars un mūžam jaunais sākotnējais Visaugstais Kungs. Golokas Vrindāvana-dhamā Viņš ekstātiski bauda visas iespējamās garīgās attiecības (*rasas*). Viņš ir visupievilcīgais visu Dievu Dievs (Narājanas, Višnu un citu), visa un visu Kungs (*Sarvešvarešvara*). Visas Dieva ekspansijas un visi padievi ar Kungu Šivu (Mahešvaru) priekšgalā patiesi un iedvesmoti kalpo viņam, godājot Viņu par garīgas kalpošanas (*tatparas*) augstāko objektu.\",\"Kunga Svētais Vārds ir transcendentāls dārgakmens, kas piepilda mūsu vēlēšanās. Tas nav atšķirams no paša Kunga Krišnas (*Nāma chintāmaṇi Kṛṣṇa-Chaitanya-svarūpa*), tādēļ nedrīkst uzskatīt, ka Kunga veidols, īpašības un dievišķās rotaļas (*līlā-guṇa-rūpa*) ir atšķiramas no Viņa Svētā Vārda (jo tās izpaužas mūsu sirdīs pateicoties Viņa Svētajam Vārdam, kurš piepilda visas mūsu vēlēšanās).\",\"Vēl citādi “*Nāma chintāmaṇi Kṛṣṇa-Chaitanya-svarūpa...*” var tulkot šādi: Šrī Krišna Čaitanja Mahāprabhū ir visizcilākā, no Svētā Vārda – Harē Krišna mahā-mantras, neatšķirama Kunga forma. Svētais Vārds spēj piepildīt visas vēlēšanās. Nedrīkst domāt, ka ir atšķirība starp Svēto Vārdu, kurš piepilda vēlēšanās, pašu Mahāprabhū un viņa formu, īpašībām un rotaļām. Šajās rotaļās Viņš parāda Svētā Vārda bezgalīgi ekstātisko dievišķo dabu un piepilda ikviena vēlēšanās, personīgi dāvājot Vradžendra-nandana Krišnas *prēmu* visās iespējamās garīgajās attiecībās (*madhura-rasā* utt.) caur savu Svēto Vārdu, kurš piepilda visas vēlēšanās.\",\"Otrais apvainojums: uzskatīt padievus vienlīdzīgus Visaugstajam, kā arī uzskatīt Kunga Svēto Vārdu, formu, īpašības un rotaļas par atšķirīgiem no viņa.\"]},{\"number\":\"3\",\"text\":[\"“guru kṛṣṇa-rūpa hon śāstrera pramāṇe\",\"guru-rūpe kṛṣṇa kṛpā kore bhāgyavāne”\",\"se gurute martya-buddhi avajñādi tyaji\",\"iṣṭa-lābha kara, nirantara nāma bhaji\"],\"translation\":[\"Rakstos (“Šrī Čaitanja-čaritamrita”, Ādi-līla, 1.45; “Šrīmad-Bhāgavatam”, 11.17.27; u.c.) minēts, ka Gurudēvs nav atšķirams no paša Krišnas. Gurudēva formā Krišna lej savu žēlastību pār dvēselēm, kam atklājusies garīga veiksme. Tādēļ nepieciešams atraidīt ilūzijas radīto noslieci uzskatīt Gurudēvu par vienkāršu mirstīgo ar pasaulīgām tieksmēm (*mrtja-buddhi*), kā arī attiekties pret Gurudēvu ar necieņu (*avamanja*), būt viņam neuzticīgam, nepakļauties, ienīst (*avagja*) un apskaust (*asuja*) Gurudēvu. Jādara tieši pretējais, rūpējoties par Gurudēvu un kalpojot viņam. Viņš spēj piepildīt visas sava skolnieka vēlēšanās sasniegt augstāko mērķi – *Krišna-prēmu*. Ar cerību un ticību nepārstājoši kalpo Svētajam Vārdam.\",\"Trešais apvainojums: apvainot Šrī Gurudēvu.\"]},{\"number\":\"4\",\"text\":[\"śruti, śruti-mātā-saha sātvata-purāṇa\",\"śrī-nāma-charaṇa-padma kore nīrājana\",\"sei śruti śāstra jebā karaye nindana\",\"se aparadhīra saṅga koribe varjana\"],\"translation\":[\"Diev-atklātā patiesība tika nodota no Mātes Gajatrī un sasniedza savu kulmināciju Mahā-purānā – “Šrīmad-Bhāgavatam”. Šī patiesība nepārstājoši pielūdz (burtiski: piedāvā *āratī*) Šrī Nāma Prabhū (Svētā Vārda) lotosam līdzīgās pēdas ar savām atklāsmi un apgaismību nesošajām zinībām par tīru *bhakti*. Katrs, kurš zaimo jebkuru no Dieva atklātās patiesības rakstiem, kas veltīti tīrai garīgai kalpošanai – vai nu tieši zākājot vai izplatot tiem pretrunīgas pseido-mācības, ir apvainotājs. Vienmēr izvairies no šāda cilvēka nelabvēlīgās sabiedrības.\",\"Ceturtais apvainojums: zaimot Svētos Rakstus.\"]},{\"number\":\"5\",\"text\":[\"nāmera mahimā sarva-śāstrete vākhāne\",\"atistuti, heno kabhu nā bhāviha mane\",\"agastya, ananta, brahmā, śivādi satata\",\"je nāma-mahimā-gāthā saṅkīrtana-rata\",\"se nāma-mahimā-sindhu ke pāibe pāra\",\"atistuti bole jei—sei durāchāra\"],\"translation\":[\"Visi Diev-atklātie raksti sludina Svētā Vārda slavu. Šādi slavinājumi nebūt nav pārspīlējums (*atistuti*). Agastja, Ananta, Brahma, Šiva un visas cienīgākās, labākās un spēcīgākās personības no visas sirds mūžam *sankirtanā* slavē Svēto Vārdu. Kurš gan spēj izsmelt Svētā Vārda slavu, kas līdzinās bezgalīgam okeānam? Katrs, kurš uzdrīkstējies gānīties, ka Svētā Vārda slava ir pārspīlējums (*atistuti*), ir grēcinieks un garīgo veiksmi (*sukritī*) zaudējis nelietis.\",\"Piektais apvainojums: uzskatīt Svētā Vārda slavu par pārspīlējumu.\"]},{\"number\":\"6\",\"text\":[\"kṛṣṇa-nāmāboli nitya golokera dhana\",\"kalpita, prākṛta, bhāve—aparādhi-jana\"],\"translation\":[\"Krišnas Svētie Vārdi ir Goloka Vrindāvanas, augstākā garīgās pasaules līmeņa, mūžīgās bagātības. Garīgā pasaule ir piepildīta ar absolūtu ekstāzi, tā izpauž sevi pati (*adhokšadža*) un atrodas ārpus šīs materiālās pasaules (*aprākrita*). Katrs, kurš uzskata Krišnas Svētos Vārdus par fantāzijas augļiem (*kalpita*) vai šai pasaulei piederīgiem (*prākrita*), ir apvainotājs.\",\"Sestais apvainojums: uzskatīt, ka Svētā Vārda slava ir materiāla vai ka tā ir iedomāta.\"]},{\"number\":\"7\",\"text\":[\"nāme sarva-pāpa-kṣaya sarva-śāstre kaya\",\"sārā-dina pāpa kori sei bharasāya—\",\"emata durbuddhi jāra sei aparādhi\",\"māyā-pravañchita, duḥkha bhuñje niravadhi\"],\"translation\":[\"Raksti vispusīgi apliecina: Svētais Vārds spēj iznīcināt visus grēkus. Taču liekuļi (*durbuddhi*) turpina visu dzīvi grēkot, cerot uz Svētā Vārda atpestījošo spēku. Viņi ir apvainotāji, kurus apmānījusi maja (kuri zaudējuši Svētā Vārda žēlastību), viņi cietīs mūžīgi.\",\"Septītais apvainojums: grēkot paļaujoties uz Svēto Vārdu savu tā saucamo dziedāšanu.\"]},{\"number\":\"8\",\"text\":[\"atulya śrī-kṛṣṇa-nāma pūrṇa-rasa-nidhi\",\"tāra sama nā bhāviha śubha-karma ādi\"],\"translation\":[\"Šrī Krišna-Nāma ir neatkārtojama *rasas* (mīlestības, ekstāzes, nektāra, attiecību ar Dievu utt.) dārgumu lāde, kas nav atšķirama no paša Kunga. Šrī Krišna-Nāma *sankirtana* ir labākais veids, kā kalpot Krišnam un apmierināt Viņu (t. i. pieņemt to, ko Dievs mums ir paredzējis). Tādēļ Šrī Krišna-Nāma atkārtošanu nevar uzskatīt par vienlīdzīgu vai salīdzināmu ar tikai nosacīti labvēlīgām materiālajām karmām, tādām kā vispārpieņemta reliģiozitāte (*dharma*), zvērestu ievērošana (*vrata*), atsacīšanās un nožēla (*tjaga*), reliģiozi rituāli un upurēšana (*huta*), došanās svētceļojumos, labdarība, patriotisms utt.\",\"Astotais apvainojums: uzskatīt Svētā Vārda dziedāšanu par līdzvērtīgu dievbijīgai karmai.\"]},{\"number\":\"9\",\"text\":[\"nāme śraddhā-hina-jana—vidhātā vāñchita\",\"tāre nāma dāne aparādha suniśchita\"],\"translation\":[\"Ir cilvēki, kuri ir Dieva augstākās gribas apmānīti un tādēļ zaudējuši ticību. Viņi ir naidīgi pret Svēto Vārdu. Sniegt viņiem norādes kalpošanai Svētajam Vārdam viennozīmīgi ir apvainojums.\",\"Devītais apvainojums: tiekšanās dāvāt Svēto Vārdu neticīgajiem.\"]},{\"number\":\"10\",\"text\":[\"śuniyāo kṛṣṇa-nāma-māhātmya apāra\",\"je priti-rahita, sei narādhama chāra\",\"allaṅtā mamatā jāra antare bāhire\",\"śuddha kṛṣṇa-nāma tāra kabhu nāhi sphure\"],\"translation\":[\"Tas, kurš dzird par Krišna-Nāma neierobežoto slavu, taču neizjūt mīlestību pret Dieva Svēto Vārdu – kura sirds nekūst no mīlestības pret to – ir nelabojami atsvešinājusies, kritusi dvēsele, zemākais no cilvēkiem (*narādhama čhāra*). Krišnas tīrais Svētais Vārds (*šuddha-Krišna-Nām*) neizpaudīs sevi tādam cilvēkam, kura domas, vārdi un rīcība ārēji un iekšēji ir saistīti ar nelabojamu pieķeršanos egoistiskajai pasaulīgajai ilūzijai “es, man un mans” (*ahamta mamata*).\",\"Desmitais apvainojums: dziedot Svēto Vārdu saglabāt savas materiālās pieķeršanās.\"]},{\"number\":\"11\",\"text\":[\"ei daśa aparādha koriyā varjana\",\"jena jana kore harināma saṅkīrtana\",\"apūrva śrī-kṛṣṇa-prema labhya tāre hoy\",\"nāma-prabhu tāra hṛde nitya vilasay\"],\"translation\":[\"Tās tīrās dvēseles, kas ir pārņemtas ar Harī-Nāma *sankirtanu*, izvairoties no šiem desmit Svētā Vārda apvainojumiem, izgaršo Šrī Krišnas *prēmas* brīnumaino augli, jo Šrī Nāma Prabhū (personiskais, patvarīgais un žēlsirdīgais Svētais Vārds, neatšķirams no paša Kunga) parādās viņu sirdīs un mūžam pauž tajā savu ekstātisko formu, īpašības un rotaļas.\",\"Vēl citādi šo vārsmu var tulkot šādi: Tās tīrās dvēseles, kuras piedalās personīgā Mahāprabhū Šrī Čaitanjadēva Harī-Nāma *sankirtanā*, izvairoties no šiem desmit apvainojumiem, izgaršo Krišna-prēmas neatkārtojamo augli, kuru brīvi izplata vienīgi Mahāprabhū, jo Viņš pats (Nāma Prabhū) ir viņu sirdīs un ar savu dievišķi ekstātisko rotaļu viņus aizrauj.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.R. Madhusudan Maharaj\",\"ru\":\"Шрила Б.Р. Мадхусудан Махарадж\",\"ua\":\"Шріла Б.Р. Мадгусудан Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/madhusudan-maharaj-dasa-vidha-namaparadha\"}]}}}]\n"])</script><script>self.__next_f.push([1,"29:[\"$\",\"$L31\",null,{\"audio\":\"$28:props:song:resources:audio\",\"language\":\"lv\"}]\n2a:[\"$\",\"$L32\",null,{\"navMap\":{\"26\":{\"prev\":{\"path\":\"/lv/hare-krishna-hare-krishna-krishna-krishna-hare-hare/\",\"title\":\"Harē Krišna mahā-mantra\"},\"next\":{\"path\":\"/lv/jaya-jaya-girirajer-arati-vishiala/\",\"title\":\"Gupta Govardhana Āratī\"}}}}]\n33:T757,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/lv/hari-nama-mahamantra-sarva-mantra-sara\",\"url\":\"https://kirtan.site/lv/hari-nama-mahamantra-sarva-mantra-sara\",\"name\":\"Daśa-vidha Nāmāparādha. (bengāļu poēma, kuru sastādīja Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža). Desmit Svētā Vārda apvainojumi\",\"inLanguage\":\"lv\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/lv/hari-nama-mahamantra-sarva-mantra-sara#composition\",\"alternateName\":[\"hari-nāma mahāmantra sarva-mantra-sāra\"],\"name\":\"Daśa-vidha Nāmāparādha. (bengāļu poēma, kuru sastādīja Šrīla Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža). Desmit Svētā Vārda apvainojumi\",\"ur
