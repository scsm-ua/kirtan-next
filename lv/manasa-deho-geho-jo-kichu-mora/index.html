Śrīla Bhakti Vinod Ṭhākur\",\"children\":\"Šrīla Bhaktivinoda Thākurs\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L45\",null,{\"label\":\"Parādīt tulkojumu\",\"song\":{\"meta\":{\"page\":147,\"first_line\":\"mānasa, deho, geho, jo kichū mora\",\"author\":\"Śrīla Bhakti Vinod Ṭhākur\"},\"title\":[\"Mānasa Deho Geho\"],\"author\":[\"Šrīla Bhaktivinoda Thākurs\"],\"verses\":[{\"number\":\"1\",\"text\":[\"mānasa, deho, geho, jo kichū mora\",\"arpilu̐ tuyā pade, nanda-kiśora!\"],\"translation\":[\"Prātu, ķermeni, ģimeni; visu, kas man pieder, esmu nolicis pie Tavām lotosam līdzīgajām pēdām, ak, jauneklīgais Nandas dēls!\"]},{\"number\":\"2\",\"text\":[\"sampade vipade, jīvane-maraṇe\",\"dāy mama gelā, tuyā o-pada varaṇe\"],\"translation\":[\"Laime un nelaime, dzīvība un nāve – nekādas grūtības vairs nesagādā man raizes, jo esmu izvēlējies Tavas lotosam līdzīgās pēdas par savu vienīgo patvērumu.\"]},{\"number\":\"3\",\"text\":[\"mārobi rākhobi—jo ichā tohārā\",\"nitya-dāsa prati tuyā adhikārā\"],\"translation\":[\"Tavā varā ir lemt, atņemt man dzīvību vai pasargāt no nelaimēm, jo Tu esi Kungs, bet es – Tavs mūžīgais kalps.\"]},{\"number\":\"4\",\"text\":[\"janmāobi moye ichā jadi tora\",\"bhakta-gṛhe jani janma hau mora\"],\"translation\":[\"Ja Tu vēlēsies, lai es piedzimstu no jauna, tad lai tas notiek Vaišnava mājā.\"]},{\"number\":\"5\",\"text\":[\"kīṭa-janma hau yathā tuyā dāsa\",\"bahir-mukha brahma-janme nāhi āśa\"],\"translation\":[\"Esmu gatavs piedzimt kaut vai par tārpu, lai tikai paliktu Tavs bhakta. Es negribu būt pat Kungs Brahma, ja tādējādi es nevēlēšos veltīt sevi Tev.\"]},{\"number\":\"6\",\"text\":[\"bhukti-mukti-spṛhā bihīna je bhakta\",\"labhaite tā̐ka saṅga anurakta\"],\"translation\":[\"Es ilgojos pēc tāda Vaišnava sabiedrības, kurš ir pilnībā brīvs no slāpēm pēc pasaulīgām baudām vai tieksmes panākt muktī - atbrīvošanos.\"]},{\"number\":\"7\",\"text\":[\"janaka, jananī, doyita, tanoy\",\"prabhu, guru, pati—tuhu̐ sarva-moy\"],\"translation\":[\"Tēvs, māte, mīļotais, dēls, Kungs, skolotājs un vīrs – Tu man esi viss!\"]},{\"number\":\"8\",\"text\":[\"bhakativinoda kohe, śuno kāna!\",\"rādhā-nātha! tuhu̐ hāmāra parāṇa\"],\"translation\":[\"Bhaktivinoda saka: “Krišna, sadzirdi jel mani! Ak, Rādhas pavēlniek, Tu esi mana dzīvība un dvēsele!”\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-manasa-deho\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L46\",null,{\"audio\":\"$3d:props:song:resources:audio\",\"language\":\"lv\"}]\n3f:[\"$\",\"$L47\",null,{\"navMap\":{\"147\":{\"prev\":{\"path\":\"/lv/bhajahu-re-mana-shri-nanda-nandana?p=146\",\"title\":\"Bhajahu̐ Re Mana\"},\"next\":{\"path\":\"/lv/e-ghora-samsare-podiya-manava?p=148\",\"title\":\"E ghora saṁsāre\"}}}}]\n48:T5da,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/lv/manasa-deho-geho-jo-kichu-mora\",\"url\":\"https://kirtan.site/lv/manasa-deho-geho-jo-kichu-mora\",\"name\":\"Mānasa Deho Geho. Šrīla Bhaktivinoda Thākurs\",\"inLanguage\":\"lv\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/lv/manasa-deho-geho-jo-kichu-mora#composition\",\"alternateName\":[\"mānasa, deho, geho, jo kichū mora\"],\"name\":\"Mānasa Deho Geho. Šrīla Bhaktivinoda Thākurs\",\"url\":\"https://kirtan.site/lv/manasa-deho-geho-jo-kichu-mora\",\"composer\":{\"@type\":\"Person\",\"name\":\"Śrīla Bhakti Vinod Ṭhākur\"},\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEntityOfPage\":{\"@id\":\
