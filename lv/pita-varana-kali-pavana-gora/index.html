 ciešanu uguni dzimšanu un miršanu mežā! Kā vēsajos mēness staros uzplaukst nakts lotoss, tā Svētā Vārda nektārā uzplaukst sirds.\",\"Tad dvēsele mostas un apzinās savu īsteno iekšējo bagātību – dzīvi mīlestībā ar Krišnu! Malkojot šo nektāru, dvēsele gremdējas pieaugošas svētlaimes okeānā.\",\"Ikviena sirdī mītoša vēlēšanās, kāda vien iedomājama, tiek atbildēta un attīrīta. Tad dvēsele pilnībā nodod sevi Krišnas Svētā Vārda viļņiem, kas dvēseli attīra pilnībā.\",\"*Paskaidrojums grāmatā: [The Golden Volcano of Divine Love. Part II Śikṣāṣṭakam: The Holy Name of Kṛṣṇa](https://krishnasearch.com/#/book/en-GoldenVolcanoofDivineLove?c=12\u0026p=12)*\"]},{\"number\":\"1\",\"text\":[\"pīta-varaṇa kali-pāvana gorā\",\"gāoyāi aichana bhāva-bibhorā\"],\"translation\":[\"Kungs Gauranga, kura ķermenis ir zelta krāsā, ir kritušo dvēseļu glābējs *Kali-jugā*! Pārdzīvojot garīgu svētlaimi, viņš dzied šo dziesmu.\"]},{\"number\":\"2\",\"text\":[\"chitta-darpaṇa-parimārjana-kārī\",\"kṛṣṇa-kīrtana jaya chitta-bihārī\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! Tā pilnībā notīra sirds spoguli un sajūsmina dvēseli.”\"]},{\"number\":\"3\",\"text\":[\"helā-bhava-dāva-nirvāpaṇa-vṛtti\",\"kṛṣṇa-kīrtana jaya kleśa-nivṛtti\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! Tā dzēš materiālās esības uguni un atbrīvo no visām ciešanām un raizēm.”\"]},{\"number\":\"4\",\"text\":[\"śreyaḥ-kumuda-bidhu-jyotsnā-prakāśa\",\"kṛṣṇa-kīrtana jaya bhakti-vilāsa\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! Tā parādās sirdī līdzīgi mēnesim, kas lej dzīvinošu gaismu, pateicoties kurai plaukst un zied dvēseles labās veiksmes baltais lotoss. *Krišna-kīrtans* ir *bhakti-vilasa* — garīgas kalpošanas brīnišķīgā rotaļa.”\"]},{\"number\":\"5\",\"text\":[\"viśuddha-vidyā-vadhu jīvana-rūpa\",\"kṛṣṇa-kīrtana jaya siddha-svarūpa\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! Tā atklāj dvēseles īsteno dabu attiecībās ar Kungu līdz pat dievišķai laulībai. Svētā Vārda dziedāšana ir pati dzīves pilnība”\"]},{\"number\":\"6\",\"text\":[\"ānanda-payo-nidhi-vardhana-kīrti\",\"kṛṣṇa-kīrtana jaya plābana-mūrti\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! *Krišna-kīrtans* liek ekstātiskas svētlaimes okeānam plūst pāri malām. Tā ir nebeidzama garīgās mīlestības plūsma.”\"]},{\"number\":\"7\",\"text\":[\"pade pade pījuṣa-svāda-pradātā\",\"kṛṣṇa-kīrtana jaya prema-bidhātā\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! *Krišna-kirtans* ik uz soļa sniedz nektāra garšu, bet noslēgumā apdāvina ar ekstātisku mīlestību uz Dievu.”\"]},{\"number\":\"8\",\"text\":[\"bhakativinoda-svātma-snapana-vidhān\",\"kṛṣṇa-kīrtana jaya prema-nidān\"],\"translation\":[\"“Visa slava Krišnas Svētā Vārda dziedāšanai! Tā atdzīvina Bhaktivinodas dvēseli. Svētā Vārda dziedāšana ir mīlestības uz Dievu dārgumu lāde.”\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/pita-barana-kali-pavana-gora\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-pita-barana-kali-pavana-gora\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/100-srisrisiksastakam1-6\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L45\",null,{\"audio\":\"$3c:props:song:resources:audio\",\"language\":\"lv\"}]\n3e:[\"$\",\"$L46\",null,{\"navMap\":{\"184\":{\"prev\":{\"path\":\"/lv/shri-rupa-manjari-pada-sei-mora-sampada/\",\"title\":\"Śrī-Rūpa-Mañjarī-pada\"},\"next\":{\"path\":\"/lv/tuhu-daya-sagara-tarayite-prani/\",\"title\":\"2. Tuhu̐ dayā-sāgara\"}}}}]\n47:T8cb,"])</script><script>self.__next_f.push([1,"{\"@context\
