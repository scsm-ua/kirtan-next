avināšana\"],\"verses\":[{\"number\":\"1\",\"text\":[\" jaya jaya gurudever ārati ujjvala\",\" govardhana-pāda-pīthe bhuvana-maṅgala\"],\"translation\":[\"Visa slava mirdzošajai Šrī Gurudēva āratī ceremonijai, kura visas pasaules svētībai norisinās Govardhāna kalna pakājē.\"]},{\"number\":\"2\",\"text\":[\" śrī bhakti sundara deva prabhu śiromaṇi\",\" Gosvami govinda jaya ānandera khani\"],\"translation\":[\"Visa slava Šrī Bhakti Sundaram Govindam Gosvāmī, mūsu garīgajam skolotājam, neizsīkstošajam prieka avotam!\"]},{\"number\":\"3\",\"text\":[\"ājānu lambita bhuja divya kalevara\",\"ananta pratibhā bharā divya guṇadhara\"],\"translation\":[\"Viņa graciozās, garās rokas skar viņa ceļgalus, bet ķermenis ir brīnišķīgs un transcendentāls. Viņš ir bezgalīgs ģeniālu un transcendentālu īpašību okeāns.\"]},{\"number\":\"4\",\"text\":[\"gaura-kṛṣṇe jāni tava abhinna svarūpa\",\"saṁsāra tarite ebe śuddha-bhakta-rūpa\"],\"translation\":[\"Gurudēv, tu esi neatšķirams no Krišnas un Gaurangas, taču, lai glābtu šo mirstīgo pasauli, tu esi pieņēmis tīra garīga kalpotāja veidolu!\"]},{\"number\":\"5\",\"text\":[\"rūpānuga-dhārā tumi koro ālokita\",\"prabhākara sama prabhā bhuvana-vidita\"],\"translation\":[\"Tu apmirdzi Šrīlas Rūpas Gosvāmī garīgo sekotāju līniju! Tavs spožums līdzinās saulei un apmirdz visu pasauli!\"]},{\"number\":\"6\",\"text\":[\"śuddha bhakti prachārite tomā sama nāi\",\"akalaṅka indu jena dayāla nitāi\"],\"translation\":[\"Tīras mīlestības uz Dievu sludināšanā tev nav līdzvērtīgu! Tu līdzinies nevainojamam mēnesim un esi tik pat žēlsirdīgs kā Kungs Nitjānanda!\"]},{\"number\":\"7\",\"text\":[\"ullasita viśvavāsī labhe prema-dhana\",\"ānande nāchiyā gāhe tava guṇagaṇa\"],\"translation\":[\"Kad līksmojošie Visuma iemītnieki iegūst Krišnas mīlestības dārgumus, viņi dejo un dzied, veltot tev slavinājumus!\"]},{\"number\":\"8\",\"text\":[\"sthāpilā āśrama bahu jagata mājhāre\",\"pāramahaṁsa-dharma-jñāna śikṣāra prachāre\"],\"translation\":[\"Lai mācītu augstākās zināšanas un sludinātu tās ļaudīm, tu visā pasaulē esi ierīkojis daudzus ašramus.\"]},{\"number\":\"9\",\"text\":[\"hintyāchintya veda-jñāne tumi ādhikārī\",\"akala saṁśaya chettvā susiddhāntadhārī\"],\"translation\":[\"Tu esi visu Vēdu zintnieks – gan izprotamo, gan neizprotamo! Tu sevī glabā visas šaubas novērsošas, nevainojamas garīgas atziņas un patiesības!\"]},{\"number\":\"10\",\"text\":[\"omāra mahimā gāhe goloka maṇḍale\",\"itya-siddha parikare tava līlāsthale\"],\"translation\":[\"Tevis uz mūžiem atbrīvotie kalpi slavina tevi Golokas garīgajā pasaulē, tavu rotaļu valstībā.\"]},{\"number\":\"11\",\"text\":[\"atita pāvana tumi doyāra samīra\",\"arvva-kārye sunipuṇa satya-sugambhīra\"],\"translation\":[\"Žēlastības pilns tu glāb kritušas dvēseles. Tu esi visu kalpošanas veidu lietpratējs, tu sakņojies patiesībā un nopietnībā.\"]},{\"number\":\"12\",\"text\":[\"purvva lekhanī dhārā pragāḍha pāṇḍitya\",\"adā hāsya miṣṭa bhāśī suśila kavitva\"],\"translation\":[\"Tavi brīnišķie, neatkārtojamie rakstītie darbi atspoguļo tavu zinību dziļumu. Tu vienmēr smaidi un tava runa ir salda, tā apstiprina tavas dzejiskās dotības, kuras nes mierinājumu sirdij.\"]},{\"number\":\"13\",\"text\":[\"ādhu-saṅge sadānandī sarala vinayī\",\"abhā-madhye vaktā śreṣṭha sarvatra vijayī\"],\"translation\":[\"Tu esi pazemīgs un tava runa ir vienkārša uztverei, bhaktu sabiedrībā tu vienmēr esi laimīgs. Garīgās pulcēšanās tu vienmēr esi labākais runātājs un visā, ko tu dari, tu vienmēr gūsti panākumus!\"]},{\"number\":\"14\",\"text\":[\"gauḍīya gagane tumi āchāryya-bhāskara\",\"nirantara sevāpriya miṣṭa kaṇṭhasvara\"],\"translation\":[\"Gaudija Vaišnavu debesjumā tu esi patriarhs, mirdzošs kā saule. Tu kalpo ar nemainīgu prieku un iedvesmo kalpošanai citus.\"]},{\"number\":\"15\",\"text\":[\"tomāra koruṇā māge trikāla vilāse\",\"gāndharvvikā-giridhārī sevā-mātra āśe\"],\"translation\":[\"Pagātnē, tagadnē un nākotnē – mūžīgi, mēs lūdzam tavu žēlastību! Vienīgi ar tavu žēlastību mēs varēsim iegūt kalpošanu pilnīgā pašatdevē Šrī Šrī Gandhārvika-Giridhārī!\"]},{\"number\":\"16\",\"text\":[\"kṛpā koro ohe prabhu śri-gaura-prakāśa\",\"ārati koroye sadā e adhama dāsa\"],\"translation\":[\"Ak, mans valdniek, Šrī Gaurangas žēlastības izpausme, lūdzu, esi žēlastīgs pret mani! Šādi, tevi pielūdzot, vienmēr lūdzas tavs nenozīmīgais kalps!\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.K. Ashram Maharaj\",\"ru\":\"Шрила Б.К. Ашрам Махарадж\",\"ua\":\"Шріла Б.К. Ашрам Махарадж\"},\"embed_url\":\"https://soundcloud.com/scsmathcolombia/3-sri-guru-arati\"},{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/003-jayajayagurudeveraratiujjvala-5\"},{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"Навадвипский храм\",\"ua\":\"Навадвіпський храм\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-jaya-jaya\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-dzhaya-dzhaya\"}]}}}]\n"])</script><script>self.__next_f.push([1,"2d:[\"$\",\"$L35\",null,{\"audio\":\"$2c:props:song:resources:audio\",\"language\":\"lv\"}]\n2e:[\"$\",\"$L36\",null,{\"navMap\":{\"42\":{\"prev\":{\"path\":\"/lv/jaya-guru-maharaja-karuna-sagara/\",\"title\":\"Śrī Śrī Nitāi-Chaitanya-Ārati\"},\"next\":{\"path\":\"/lv/jaya-guru-maharaja-jati-rajeshvara/\",\"title\":\"Śrī Guru Ārati-stuti\"}}}}]\n37:Tcc6,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/lv/jaya-jaya-gurudever-arati-ujjvala\",\"url\":\"https://kirtan.site/lv/jaya-jaya-gurudever-arati-ujjvala\",\"name\":\"Śrī Guru Ārati. Šrīpāds B.A. Paramahamsa Mahārādža. Šrīlas Bhakti Sundar Govinda Dēv-Gosvāmī Mahārādža slavināšana\",\"inLanguage\":\"lv\",\"isPartOf\":{\"@id\":\"https://
