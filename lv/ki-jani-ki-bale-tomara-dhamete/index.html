cietības un žēlastības avots un mana vienīgā cerība! Nav neviena cita, kam Tava žēlastība būtu nepieciešama vairāk, nekā man! Tu neapšaubāmi kliedēsi visas manas bailes.\"]},{\"number\":\"3\",\"text\":[\"āmāre tārite,    kāhāro śakati,\",\"    avanī-bhitore nāhi\",\"dayāla ṭhākura!    ghoṣaṇā tomāra,\",\"    adhama pāmare trāhi\"],\"translation\":[\"Nevienam citam nav pa spēkam mani glābt! Ak, žēlsirdīgais Kungs, piepildi savu solījumu, lūdzu, glāb šo nožēlojamo un nelaimīgo grēcinieku!\"]},{\"number\":\"4\",\"text\":[\"sakala chāḍiyā,   āsiyāchi āmi,\",\"    tomāra charaṇe nātha!\",\"āmi nitya-dāsa,     tumi pālayitā,\",\"    tumi goptā, jagannātha!\"],\"translation\":[\"Esmu atteicies no visa un atnācis pie Tavām lotosam līdzīgajām pēdām. Visuma Valdniek, es esmu Tavs mūžīgais kalps, bet Tu – mans patvērums, mans sargātājs.\"]},{\"number\":\"5\",\"text\":[\"tomāra sakala,  āmi mātra dāsa,\",\"    āmāra tāribe tumi\",\"tomāra charaṇa, korinu varaṇa,\",\"    āmāra nahi to’ āmi\"],\"translation\":[\"Viss pieder Tev! Es esmu vien kalps, kas pārliecināts par to, ka Tu mani glābsi. Esmu nolēmis, ka Tavas lotosam līdzīgās pēdas ir mans vienīgais patvērums. Es vairs nepiederu sev.\"]},{\"number\":\"6\",\"text\":[\"bhakativinoda,  kā̐diya śaraṇa,\",\"    lo’yeche tomāra pāya\",\"khomi aparādha,  nāme ruchi diyā,\",\"    pālana karahe tāya\"],\"translation\":[\"Raudādams Bhaktivinoda pieņem Tavu pēdu patvērumu. Piedod viņa apvainojumus, ļauj viņam izgaršot Tavu Svēto Vārdu un balsti viņu!\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-goptritve\"},{\"title\":{\"en\":\"Sudarshan Prabhu\",\"ru\":\"Сударшан Прабху\",\"ua\":\"Сударшан Прабгу\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/sudarshan-prabhu-goptrtve\"}]}}}]\n"])</script><script>self.__next
