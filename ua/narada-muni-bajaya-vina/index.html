t_f.push([1,"14:[\"$\",\"$L1b\",null,{\"label\":\"Показувати вірші / переклад\",\"song\":{\"meta\":{\"page\":140,\"translation\":\"auto\",\"first_line\":\"на̄рада муні, ба̄джа̄я вīна̄\",\"version\":\"draft-v8\",\"translator\":\"nazar\"},\"title\":[\"Шрī На̄ма̄штакам 8\"],\"author\":[\"Шрīла Бгактівінод Тха̄кур\"],\"verses\":[{\"number\":\"1\",\"text\":[\"на̄рада муні,    ба̄джа̄я вīна̄,\",\"    ‘ра̄дгіка̄-рамана’-на̄ме\",\"на̄ма амані,    удіта хоя,\",\"    бгаката-ґīта-са̄ме\"],\"translation\":[\"Коли великодушний Нарада Муні торкається струн своєї *віни*, Cвяте Імʼя Радгіка-Рамана сходить і відразу ж проявляється у *кіртані* відданих Господа.\"]},{\"number\":\"2\",\"text\":[\"амія-дга̄ра̄,    баріше гана,\",\"    шравана-джуґале ґія\",\"бгаката-джана,    сагане на̄че,\",\"    бгорія а̄пана хія\"],\"translation\":[\"Як хмара у сезон дощів, це Святе Імʼя проливає чистий нектар у їхні вуха. Усі віддані танцюють, перебуваючи в глибокому блаженстві та сповнені радості у своєму серці.\"]},{\"number\":\"3\",\"text\":[\"ма̄дгурī-пӯра,    а̄сабо паші’,\",\"    ма̄та̄я джаґата-джане\",\"кехо ва̄ ка̄нде,    кехо ва̄ на̄че,\",\"    кехо ма̄те мане мане\"],\"translation\":[\"Усі мешканці всесвіту шаленіють, потрапивши під цю пʼянку, солодку, божественну зливу. Хтось плаче, хтось танцює, а хтось повністю пʼяніє в глибині душі.\"]},{\"number\":\"4\",\"text\":[\"паньча-вадана,    на̄раде дгорі’,\",\"    премера сагана рол\",\"камала̄сана,    на̄чія боле,\",\"    ‘боло боло харі боло’\"],\"translation\":[\"Пʼятиликий Господь Шіва обіймає Нараду Муні та безупинно галасує від духовного піднесення, тоді як Господь Брахма захоплено танцює і промовляє: «Усі ви повторюйте: “Харібол! Харібол!”».\"]},{\"number\":\"5\",\"text\":[\"сахасра̄нана,    парама-сукхе,\",\"    ‘харі харі’ болі ґа̄й\",\"на̄ма-прабга̄ве,    ма̄тіло вішва,\",\"    на̄ма-раса сабе па̄й\"],\"translation\":[\"Тисячеустий Ананта Шєша сповнюється найвищого щастя, співає й вигукує: «Харі! Харі!». Хвилі звуку цього Святого Імені проливають на жителів всесвіту солодкий нектар, від якого всі знову і знову шаленіють.\"]},{\"number\":\"6\",\"text\":[\"шрī-кришна-на̄ма,    расане спхурі’,\",\"    пӯра̄’о а̄ма̄ра а̄шя\",\"шрī-рӯпа-паде,    джа̄чає іха̄,\",\"    бгакатівінода-да̄са\"],\"translation\":[\"Святе Імʼя Шрі Крішни здійснило всі мої прагнення, проявившись в устах кожного. Тому Бгактівінод, смиренний слуга Господа, молиться до лотосових стоп Шрі Рупи Ґосвамі, благаючи, щоб оспівуваня Харінами завжди лунало саме так.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-namastakam-song-8-narada-muni-bajaya-vina\"}]}}}]\n"])</script><script>self.__next_f.push([1,"15:[\"$\",\"$L1c\",null,{\"audio\":\"$14:props:song:resources:audio\",\"language\":\"ua\"}]\n16:[\"$\",\"$L1d\",null,{\"navMap\":{\"140\":{\"prev\":{\"path\":\"/ua/kripa-kara-vaishnava-thakura/\",\"title\":\"Пра̄ртхана̄ Лаласа̄маї\"},\"next\":{\"path\":\"/ua/krishnotkirtana-gana-nartana-parau/\",\"title\":\"Шрī Шрī Шад-Ґосва̄мй-аштакам\"}}}}]\n1e:T5ab,{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/ua/narada-muni-bajaya-vina\",\"url\":\"https://kirtan.site/ua/narada-muni-bajaya-vina\",\"name\":\"Шрī На̄ма̄штакам 8. Шрīла Бгактівінод Тха̄кур\",\"inLanguage\":\"ua\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/ua/narada-muni-bajaya-vina#composition\",\"alternateName\":[\"на̄рада муні, ба̄джа̄я вīна̄\"],\"name\":\"Шрī На̄ма̄штакам 8. Шрīла Бгактівінод Тха̄кур\",\"url\":\"https://kirtan.site/ua/narada-muni-bajaya-vina\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEn
