nks/8819-47c945bf6e78ba1b.js\",\"4925\",\"static/chunks/4925-081e61b59bf55407.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-56c4784d99790455.js\"],\"ServiceWorkerRegistration\"]\n34:[\"$\",\"$L3d\",null,{\"bookId\":\"ua\"}]\n35:[\"$\",\"section\",null,{\"className\":\"SongHeader\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"SongHeader__title\",\"children\":[[\"$\",\"div\",\"Шрī Ґуру-парампара̄\",{\"children\":\"Шрī Ґуру-парампара̄\"}]]}],null,[],[[\"$\",\"div\",\"Verses 1-9 composed by Śrīla Saraswati Ṭhākur\",{\"className\":\"SongHeader__author\",\"children\":[\"$\",\"a\",null,{\"href\":\"/ua/authors#section-Шрīла Сарасваті Тха̄кур\",\"children\":\"Verses 1-9 composed by Śrīla Saraswati Ṭhākur\"}]}]]]}]\n"])</script><script>self.__next_f.push([1,"36:[\"$\",\"$L3e\",null,{\"label\":\"Показувати вірші / переклад\",\"song\":{\"meta\":{\"page\":216,\"translation\":\"auto\",\"first_line\":\"кришна хоіте чатур-мукха\",\"author\":\"Шрīла Сарасваті Тха̄кур\",\"version\":\"draft-v8\",\"translator\":\"nazar\"},\"title\":[\"Шрī Ґуру-парампара̄\"],\"author\":[\"Verses 1-9 composed by Śrīla Saraswati Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"кришна хоіте чатур-мукха,    хон кришна-севонмукха,\",\"    брахма̄ хоіте на̄радера маті\",\"на̄рада хоіте вʼяса,    мадгва кохе вʼяса-да̄са,\",\"    пӯрнапраґʼя падмана̄бга ґаті\"],\"translation\":[\"На початку творення світу наука відданого служіння була явлена чотириликому Брахмі від Верховного Господа Шрі Крішни. Деварши Нарада прийняв цю божественну науку від Брахми. Великий мудрець Крішна Двайпаяна Вʼяса, якому було даровано силу укласти *ведичні* писання, став учнем Деварши Наради. Шріпад Мадгва Ачарʼя, засновник школи *ведантичної* філософії *шюддга-двайти*, називає себе слугою Крішни Двайпаяни Вʼяси. У XIII столітті він відвідав Вʼясадеву в Бадарікашрамі, щоб навчатися у нього *веданти*. Пурнапраґʼя Тіртха (Мадгва) є *ґуру* і єдиним притулком Падманабги Тіртхи.\"]},{\"number\":\"2\",\"text\":[\"нрихарі ма̄дгава-бамшє,    акшобгʼя парамахамсе,\",\"    шішʼя болі анґīка̄ра коре\",\"акшобгʼєра шішʼя джая-    тīртха на̄ме парічая,\",\"    та̄нра да̄сьє ґʼянасіндгу торе\"],\"translation\":[\"Двома іншими головними учнями Мадгви є Нріхарі Тіртха і Мадгава Тіртха. Мадгава Тіртха прийняв великого *парамахамсу* Акшобгʼю Тіртху як свого учня. Головний учень Акшобгʼї Тіртхи був відомий як Джаятіртха. Слугою Джаятіртхи був його учень Ґʼянасіндгу.\"]},{\"number\":\"3\",\"text\":[\"та̄нга̄ хоіте даянідгі,    та̄нра да̄са відьянідгі,\",\"    ра̄джендра хоіло та̄нга̄ хоіте\",\"та̄нга̄ра кінкора джая-    дгарма на̄ме парічоя,\",\"    парампара̄ джа̄но бга̄ло мате\"],\"translation\":[\"Даянідгі прийняв науку відданого служіння від Ґʼянасіндгу, а слугою Даянідгі був Відьянідгі (Відьядгіраджа Тіртха). Раджендра Тіртха став учнем Відьядгіраджі Тіртхи. Слугою Раджендри Тіртхи був Джаядгарма, відомий також як Віджаядгваджа Тіртха. Так слід належним чином розуміти цю учнівську послідовність.\"]},{\"number\":\"4\",\"text\":[\"джаядгарма-да̄сьє кхʼяті,    шрī пурушоттама-яті\",\"    та̄н’ха’те брахманья-тīртха сӯрі\",\"вʼясатīртха та̄нра да̄са,    лакшмīпаті вʼяса-да̄са,\",\"    та̄нга хоіте ма̄дгавендра пурī\"],\"translation\":[\"Великий *санньясі* Шрі Пурушоттама Тіртха отримав своє духовне знання в служінні своєму *ґуру*, Віджаядгваджі Тіртсі (Джаядгармі). Головним учнем Пурушоттами Тіртхи був Субрахманья Тіртха. Його слугою був великий Вʼясатіртха (Вʼяса Рая). Слугою Вʼясатіртхи був Лакшміпаті Тіртха, учнем якого став Мадгавендра Пурі Ґосвамі.\"]},{\"number\":\"5\",\"text\":[\"ма̄дгавендра пурī-вара,    шішʼя-вара шрī-īшвара,\",\"    нітьянанда, шрī-адвайта вібгу\",\"īшвара-пурīке дгонья,    корілена шрī-чайтанья,\",\"    джаґад-ґуру ґаура маха̄прабгу\"],\"translation\":[\"Головним учнем Мадгавендри Пурі був Ішвара Пурі, а двома іншими його учнями були славні втілення Господа - Шрі Нітьянанда і Шрі Адвайта Ачарʼя. Шрі Чайтанья Махапрабгу, духовний наставник усіх світів, обдарував Ішвару Пурі великою вдачею, прийнявши Його як свого духовного вчителя.\"]},{\"number\":\"6\",\"text\":[\"маха̄прабгу шрī-чайтанья,    ра̄дга̄-кришна нахе анья,\",\"    рӯпа̄нуґа джонера джīвана\",\"вішвамбгара пріянкара,    шрī сварӯпа-да̄модара,\",\"    шрī ґосва̄мī рӯпа-сана̄тана\"],\"translation\":[\"Махапрабгу Шрі Чайтанья не відрізняється від Шрі Шрі Радги і Крішни і є самим життям *вайшнавів*, які йдуть за Шрі Рупою Ґосвамі. Шрі Сварупа Дамодар Ґосвамі, Рупа Ґосвамі і Санатана Ґосвамі дарували велику радість Вішвамбгару (Шрі Чайтаньї).\"]},{\"number\":\"7\",\"text\":[\"рӯпапрія маха̄джана,    джīва-рагуна̄тха хон,\",\"    та̄нра прія каві кришнада̄са\",\"кришнада̄са-пріявара,    нароттама сева̄пара,\",\"    джа̄нра пада вішвана̄тха-а̄шя\"],\"translation\":[\"Великі душі Джіва Ґосвамі і Рагунатх Дас Ґосвамі стали дуже дорогими Рупі Ґосвамі. Джіва Ґосвамі був учнем Рупи Ґосвамі. Рагунатх Дас Ґосвамі, учень учня Адвайти Ачарʼї — Джадунандана Ачарʼї, був прийнятий Рупою і Санатаною як їхній третій брат. Улюбленим учнем Рагунатха Даса Ґосвамі був Крішнадас Кавірадж Ґосвамі. Крішнадас Кавірадж був близьким другом Локанатха Ґосвамі. Вони жили разом у Вриндавані і завжди обговорювали між собою теми, повʼязані з Крішною. Локанатх Ґосвамі, учень Ґададгара Пандіта, мав лише одного учня на імʼя Нароттам Дас. Нароттам Дас завжди служив своєму *ґуру*, а також віддавав себе служінню близьким друзям свого *ґуру*. Так він став дуже дорогим для Крішнадаса Кавіраджа Ґосвамі. Служити лотосовим стопам Нароттама Даса Тхакура було єдиним прагненням Вішванатха Чакраварті Тхакура, який був четвертим *ачарʼєю* в учнівській спадкоємності від Нароттама Даса.\"]},{\"number\":\"8\",\"text\":[\"вішвана̄тха-бгакта-са̄тх,    баладева джаґанна̄тх,\",\"    та̄нра прія шрī-бгактівінода\",\"маха̄-бга̄ґавата-вара,    шрī-ґауракішора-вара,\",\"    харі-бгаджанете джа̄нра мода\"],\"translation\":[\"Вішванатх Чакраварті Тхакур був *шікша-ґуру* (наставником) Баладеви Відьябгушани, якому він передав науку «Шрімад-Бгаґаватам». Джаґаннатх Дас Бабаджі був дуже визначним *ачарʼєю* після Шрі Баладеви Відьябгушани і став улюбленим *шікша-ґуру* Шрі Бгактівінода Тхакура. Бгактівінод Тхакур мав близьку дружбу і спільне служіння з видатним *махабгаґаватою* Шрі Ґаура Кішором Дасом Бабаджі, чия єдина радість завжди була в *харі-бгаджані*.\"]},{\"number\":\"9\",\"text\":[\"тадануґа-маха̄джон    шрī-кришна-кīртана-дгон\",\"    джеба̄ діло пурі джаґа ка̄ма\",\"шрī ва̄ршабга̄навīбара̄    сада̄ севʼя сева̄пара̄\",\"    та̄нга̄ра даїта-да̄са на̄ма\"],\"translation\":[\"Послідовники Шріли Ґаури Кішора Даса Бабаджі наповнюють світ скарбом Шрі Крішна-*кіртану*. Його учень, Шрі Варшабганаві Даїта Дас (Шріла Сарасваті Тхакур) - той, хто завжди служить Крішні, найдорожчому коханому Радгарані.\"]},{\"number\":\"10\",\"text\":[\"тадабгīнна дехо-дівʼя    сварӯпа-рӯпа-рагу-джівʼя\",\"    сада̄ севʼя джа̄нра па̄дападма\",\"сусіддга̄нта мӯрті-дгара    шрī шрīдгара ґурувара\",\"    рупа̄нуґа-са̄дгу шрея садма\"],\"translation\":[\"Той, хто є уособленням *бгакті-сіддганти* (як і Шріла Сарасваті Тхакур); хто живе в настрої вчення Шріли Сварупи Дамодара, Шріли Рупи Ґосвамі та Шріли Рагунатха Даса Ґосвамі; чиї лотосові стопи завжди є радісним, гідним поклоніння притулком для послідовників Рупи Ґосвамі, - це Шріла Шрідгар Дев-Ґосвамі.\"]},{\"number\":\"11\",\"text\":[\"та̄нра прія мано’ бгīшта    стха̄пане сада̄сачешта\",\"    бгакті сундара шрī ґовінда на̄ма\",\"еі парампара̄ дгана    сабе ґаура-ніджаджана\",\"    та̄ндера уччхіште мора ка̄ма\"],\"translation\":[\"Той, хто є дуже дорогим учнем цього Шріли Шрідгара Дев-Ґосвамі Махараджа, хто утверджує його божественне вчення і безупинно сповнює його прагнення, — це Шріла Бгакті Судгір Ґовінда Дев-Ґосвамі. Це - наша велична лінія духовних наставників, і всі вони дуже дорогі Шрі Чайтаньї Махапрабгу. Я живу лише їхньою милістю.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/acharya-maharaj-guru-parampara\"},{\"title\":{\"en\":\"Srila B.B. Avadhut Maharaj\",\"ru\":\"Шрила Б.Б. Авадхут Махарадж\",\"ua\":\"Шріла Б.Б. Авадгут Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/avadxut-maxaradzh-shri-guru\"}]}}}]\n"])</script><script>self.__next_f.push([1,"37:[\"$\",\"$L3f\",null,{\"audio\":\"$36:props:song:resources:audio\",\"language\":\"ua\"}]\n38:[\"$\",\"$L40\",null,{\"navMap\":{\"216\":{\"prev\":{\"path\":\"/ua/jaya-shrila-maharaja-charanaravinda?p=214\",\"title\":\"А̄ча̄рʼя-чарана-вандана\"},\"next\":{\"path\":\"/ua/bhayabhanjana-jayashiamsana?p=219\",\"title\":\"Шрī Даїта Да̄с Пранаті Паньчакам\"}}}}]\n41:T829,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/ua/krishna-hoite-chatur-mukha\",\"url\":\"https://kirtan.site/ua/krishna-hoite-chatur-mukha\",\"name\":\"Шрī Ґуру-парампара̄. Verses 1-9 composed by Śrīla Saraswati Ṭhākur\",\"inLanguage\":\"ua\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/ua/krishna-hoite-chatur-mukha#composition\",\"alternateName\":[\"кришна хоіте чатур-мукха\"],\"name\":\"Шрī Ґуру-парампара̄. Verses 1-9 composed by Śrīla Saraswati Ṭhākur\",\"url\":\"https://kirtan.site/ua/krishna-hoite-chatur-mukha\",\"composer\":{\"@type\":\"Person\",\"name\":\"Шрīла Сарасваті Тха̄кур\"},\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEntityOfPage\":{\"@id\":\"https://kirtan.site/ua/krishna-hoite-chatur-mukha\"},\"audio\":[{\"@type\":\"MusicRecording\",\"name\":\"Шрī Ґуру-парампара̄. Verses 1-9 composed by Śrīla Saraswati Ṭhākur\",\"url\":\"https://soundcloud.com/bharatimaharaj/
