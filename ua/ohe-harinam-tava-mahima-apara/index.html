"number\":\"3\",\"text\":[\"тумі кришна, пӯрна-вапу, расера ніда̄на\",\"тава паде поді тава ґуна корі ґа̄на\"],\"translation\":[\"Ти є Сам Господь Крішна, Твоє божественне тіло досконале й повне, і Ти є джерелом усіх трансцендентних смаків. Падаючи до Твоїх лотосових стоп, я оспівую Твої божественні якості.\"]},{\"number\":\"4\",\"text\":[\"дже коре тома̄р паде ека̄нта а̄шроя\",\"та̄’ра а̄рті-ра̄ші на̄шя карахо нішчоя\"],\"translation\":[\"Ти безперечно знищуєш більшість страждань тих, хто шукає прихистку лише у Твоїх святих стопах.\"]},{\"number\":\"5\",\"text\":[\"сарва апара̄дга тумі на̄шя кара та̄’ра\",\"на̄ма-апара̄дга̄вадгі на̄шяхо та̄ха̄ра\"],\"translation\":[\"Ти знищуєш усі їх образи, аж до *нама-апарадг* — десяти образ у повторенні Святого Імені.\"]},{\"number\":\"6\",\"text\":[\"сарва-доша дгаута корі’ та̄ха̄ра хридоя\",\"сімга̄сане байсо тумі парама а̄шроя\"],\"translation\":[\"Омиваючи їх від усіляких нечистот, Ти займаєш престол їх сердець, стаючи для них найвищим притулком.\"]},{\"number\":\"7\",\"text\":[\"аті-рамʼя чід-гана-а̄нанда-мӯртіма̄н\",\"‘расо вай сах’ болі’ веда коре туя ґа̄н\"],\"translation\":[\"Ти привабливий і прекрасний, втілення повного знання і насиченого блаженства. Веди оспівують Тебе, промовляючи: «Верховна Особа Бога воістину є втіленням усіх трансцендентних смаків».\"]},{\"number\":\"8\",\"text\":[\"бгактівінода рӯпа-ґосва̄мī-чаране\",\"ма̄ґає сарвада̄ на̄ма-спхӯрті сарва-кшане\"],\"translation\":[\"Бгактівінод біля лотосових стоп Шріли Рупи Ґосвамі безупинно щомиті благає про пряме одкровення Святого Імені.\"]}],\"resources\":{}}}]\n"])</script><script>self.__next_f.push([1,"15:[\"$\",\"$L1b\",null,{\"navMap\":{\"144\":{\"prev\":{\"path\":\"/ua/krishnotkirtana-gana-nartana-parau/\",\"title\":\"Шрī Шрī Шад-Ґосва̄мй-аштакам\"},\"next\":{\"path\":\"/ua/ki-rupe-paibo-seva-mui-durachara/\",\"title\":\"Кі-рӯпе па̄ібо сева̄\"}}}}]\n16:[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\
