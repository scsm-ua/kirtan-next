дданого служіння, а саме служіння *вайшнавам* є найвищою досконалістю та коренем ніжної ліани божественної любові.\"]},{\"number\":\"2\",\"text\":[\"ма̄дгава-тітхі,    бгакті-джананī,\",\"    джатане па̄лана корі\",\"кришна-басаті,    басаті болі’,\",\"    парама а̄даре борі\"],\"translation\":[\"Я з великою уважністю дотримуюся святих днів, таких як Екадаші та Джанмаштамі, бо вони є матірʼю відданості. А місцем свого життя я з найглибшою пошаною і любовʼю обираю вічну обитель Шрі Крішни.\"]},{\"number\":\"3\",\"text\":[\"ґаура а̄ма̄ра,    дже-саба стха̄не,\",\"    корало бграмана ранґе\",\"се-саба стха̄на,    херібо а̄мі,\",\"    пранаї-бгаката-санґе\"],\"translation\":[\"У супроводі люблячих відданих я буду відвідувати всі ті місця, якими подорожував мій Господь Ґаурасундар, звершуючи Свої ігри.\"]},{\"number\":\"4\",\"text\":[\"мриданґа-ба̄дья,    шюніте мон,\",\"    абасара сада̄ джа̄че\",\"ґаура-біхіта,    кīртана шюні’,\",\"    а̄нанде хридоя на̄че\"],\"translation\":[\"Мій ум невпинно благає про можливість слухати звучання *мриданґи*. Коли я чую той *кіртан*, який заповідав Господь Ґаурачандра, моє серце радісно танцює.\"]},{\"number\":\"5\",\"text\":[\"джуґала-мӯрті,    декхія мора,\",\"    парама-а̄нанда хой\",\"праса̄да-сева̄    коріте хоя,\",\"    сакала прапаньча джай\"],\"translation\":[\"Споглядаючи *мурті* Божественної Пари, Шрі Шрі Радги-Крішни, я переживаю найвищу радість. А коли я з пошаною приймаю *прасад* Господа, я долаю всі мирські омани.\"]},{\"number\":\"6\",\"text\":[\"дже-діна ґрихе,    бгаджана декхі,\",\"    ґрихете ґолока бга̄я\",\"чарана-сīдгу,    декхія ґанґа̄,\",\"    сукха на̄ сīма̄ па̄я\"],\"translation\":[\"Коли в моєму домі я бачу поклоніння і служіння Господу Харі, для мене там постає Ґолока Вриндаван. Коли я споглядаю Ґанґу, ріку нектару, що витікає зі стоп-лотосів Господа, моєму щастю немає меж.\"]},{\"number\":\"7\",\"text\":[\"туласī декхі’,    джуда̄я пра̄на,\",\"    ма̄дгава-тошанī джа̄ні’\",\"ґаура-прія,    шяка-севане,\",\"    джīвана са̄ртхака ма̄ні\"],\"translation\":[\"Погляд на священне дерево Туласі заспокоює мою душу, бо я знаю, що вона приносить радість Господу Крішні. Коли я з повагою приймаю *шак* — страву зі шпинату, що так до вподоби Господу Чайтаньї, — я вважаю своє життя справді вдалим.\"]},{\"number\":\"8\",\"text\":[\"бгакатівінода,    кришна-бгаджане,\",\"    анукӯла па̄я джа̄ха̄\",\"праті-дівасе,    парама-сукхе,\",\"    свīка̄ра карає та̄ха̄\"],\"translation\":[\"Усе, що Бгактівінод отримує як сприятливе для служіння Шрі Крішні, він щодня приймає з великою радістю.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"Шрила Б.Н. Ачарья Махарадж\",\"ua\":\"Шріла Б.Н. Ачарʼя Махарадж\"},\"embed_url\":\"https://soundcloud.com/kostya-netrebenko/083-suddhabhakatacharanarenu-11\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L44\",null,{\"audio\":\"$3b:props:song:resources:audio\",\"language\":\"ua\"}]\n3d:[\"$\",\"$L45\",null,{\"navMap\":{\"240\":{\"prev\":{\"path\":\"/ua/shri-hari-vasare-hari-kirtana-vidhana/\",\"title\":\"Шрī Харі-ва̄сара-ґīті\"},\"next\":{\"path\":\"/ua/chaudda-shiata-sata-shiake-masa-je-phalgun/\",\"title\":\"Шрī Ґаура Пурнīма̄\"}}}}]\n46:T5be,{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/ua/shiuddha-bhakata-charana-renu\",\"url\":\"https://kirtan.site/ua/shiuddha-bhakata-charana-renu\",\"name\":\"Шюддга-бгаката. Шрīла Бгактівінод Тха̄кур\",\"inLanguage\":\"ua\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://kirtan.site/ua/shiuddha-bhakata-charana-renu#composition\",\"alternateName\":[\"шюддга-бгаката-чарана-рену\"],\"name\":\"Шюддга-бгаката. Шрīла Бгактівінод Тха̄кур\",\"url\":\"https://kirtan.site/ua/shiuddha-bhakata-charana-renu\",\"isPartOf\":{\"@id\":\"https://kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\
