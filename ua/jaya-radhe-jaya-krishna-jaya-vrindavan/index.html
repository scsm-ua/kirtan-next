9-47c945bf6e78ba1b.js\",\"4925\",\"static/chunks/4925-4fbb1ee2228b41f3.js\",\"4989\",\"static/chunks/app/%5BbookId%5D/%5Bslug%5D/page-56c4784d99790455.js\"],\"ServiceWorkerRegistration\"]\n31:[\"$\",\"a\",null,{\"href\":\"/ua/authors\",\"children\":\"Шрīла Кришнада̄с Кавіра̄дж Ґосва̄мī\"}]\n"])</script><script>self.__next_f.push([1,"32:[\"$\",\"$L39\",null,{\"label\":\"Показувати вірші / переклад\",\"song\":{\"meta\":{\"page\":206,\"translation\":\"auto\",\"first_line\":\"джая ра̄дге, джая кришна, джая вринда̄ван\",\"version\":\"draft-v8\",\"translator\":\"Alokananda Devi Dasi\"},\"title\":[\"Шрī Враджа-дга̄ма-махіма̄мрита\"],\"author\":[\"Шрīла Кришнада̄с Кавіра̄дж Ґосва̄мī\"],\"verses\":[{\"number\":\"1\",\"text\":[\"джая ра̄дге, джая кришна, джая вринда̄ван\",\"шрī-ґовінда, ґопīна̄тха, мадана-мохан\"],\"translation\":[\"Слава Радзі та Крішні і їхньому божественному лісу Вриндавану. Слава трьом головним Божествам Вриндавана — Шрі Ґовінді, Ґопінатху та Мадана-Мохану.\"]},{\"number\":\"2\",\"text\":[\"шьяма-кунда, ра̄дга̄-кунда, ґірі-ґовардган\",\"ка̄ліндī ямуна̄ джая, джая маха̄ван\"],\"translation\":[\"Слава Шьяма-*кунді*, Радга-*кунді*, пагорбу Ґовардгану та річці Ямуні, знаній як Калінді. Слава безкрайньому лісу Махавану, в якому Крішна й Баларам явили всі Свої дитячі *ліли*.\"]},{\"number\":\"3\",\"text\":[\"кеші-га̄та, вамші-вата, два̄дашя-ка̄нан\",\"джа̄нга̄ соб лīла̄ коіло шрī-нанда-нандан\"],\"translation\":[\"Слава Кеші-*гату*, де Крішна вбив демона Кеші. Вся слава дереву Вамші-ват, під яким грав на Своїй флейті Крішна, закликаючи всіх *ґопі*. Слава дванадцятьом лісам Враджі, місцям, де відбулися всі *ліли* сина Нанди, Шрі Крішни.\"]},{\"number\":\"4\",\"text\":[\"шрī-нанда-яшода̄ джая, джая ґопа-ґан\",\"шрīда̄ма̄ді джая, джая дгену-ватса-ґан\"],\"translation\":[\"Слава божественним батькові й матері Крішни, Нанді та Яшоді. Слава пастушкам, на чолі зі Шрідамою, старшим братом Шріматі Радгарані та Ананґи Маньджарі. Слава коровам і телятам Враджі.\"]},{\"number\":\"5\",\"text\":[\"джая вришабга̄ну, джая кīртіда̄ сундарī\",\"джая паурнама̄сī, джая а̄бгīра-на̄ґарī\"],\"translation\":[\"Слава божественним батькові й матері Радги, Вришабгану та прекрасній Кіртіді. Слава Паурнамасі, матері Сандіпані Муні, бабусі Мадгуманґала й Нандімукхі, яка є улюбленою ученицею Деварши Наради. Слава юним пастушкам Враджі.\"]},{\"number\":\"6\",\"text\":[\"джая джая ґопешвара вринда̄вана-ма̄джг\",\"джая джая кришна-сакха̄ бату двіджа-ра̄дж\"],\"translation\":[\"Слава, слава Ґопешвару Шіві, який перебуває у Вриндавані, щоб оберігати святу *дгаму*. Слава, слава кумедному другові Крішни — *брахману* Мадгуманґалу.\"]},{\"number\":\"7\",\"text\":[\"джая ра̄ма-га̄та, джая рохінī-нандан\",\"джая джая вринда̄вана-ва̄сī джата джон\"],\"translation\":[\"Слава Рама-*гату*, на якому Господь Баларам звершив Свою *раса-лілу*. Слава Господу Баларамі, синові Рохіні. Слава, слава всім мешканцям Вриндавана.\"]},{\"number\":\"8\",\"text\":[\"джая двіджа-патнī, джая на̄ґа-конья-ґон\",\"бгактіте джа̄нга̄ра̄ па̄іло ґовінда-чаран\"],\"translation\":[\"Вся слава дружинам гордовитих ведичних *брахманів*. Вся слава дружинам змія Калії. Завдяки чистоті своєї *бгакті* всі вони досягли лотосових стоп Господа Ґовінди.\"]},{\"number\":\"9\",\"text\":[\"шрī-ра̄са-мандала джая, джая ра̄дга̄-шьям\",\"джая джая ра̄са-лīла̄ сарва-манорам\"],\"translation\":[\"Слава місцю *раса-ліли* Шрі Крішни. Слава Радзі та Шьяму. Слава, слава найпрекраснішій серед усіх *ліл* Господа Крішни — божественній *раса-лілі*.\"]},{\"number\":\"10\",\"text\":[\"джая джайоджвала-раса сарва-раса-са̄р\",\"паракīя-бга̄ве джа̄ха̄ враджете прача̄р\"],\"translation\":[\"Слава, слава *расі* подружньої любові, найвищій серед усіх *рас*. У Враджі Шрі Крішна являє її у вигляді божественної *паракія-бгави*, настрою кохання поза шлюбом.\"]},{\"number\":\"11\",\"text\":[\"шрī-джа̄хнава̄-па̄да-падма корія смаран\",\"дīна кришнада̄са кохе на̄ма-санкīртан\"],\"translation\":[\"Несучи в серці образ лотосових стоп Шрі Джахнави Деві, супутниці Господа Нітьянанди, цей дуже занепалий і нікчемний Крішнадас співає *санкіртану* Святого Імені.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-jaya-radhe\"},{\"title\":{\"en\":\"Srila B.S. Goswami Maharaj\",\"ru\":\"Шрила Б.С. Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/goswami-maharaj-jaya-radhe\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-dzhaya-radxe-1\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-dzhaya-radxe\"},{\"title\":{\"en\":\"Srila B.R. Madhusudan Maharaj\",\"ru\":\"Шрила Б.Р. Мадхусудан Махарадж\",\"ua\":\"Шріла Б.Р. Мадгусудан Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/madhusudan-maharaj-jaya-radhe\"}]}}}]\n"])</script><script>self.__next_f.push([1,"33:[\"$\",\"$L3a\",null,{\"audio\":\"$32:props:song:resources:audio\",\"language\":\"ua\"}]\n34:[\"$\",\"$L3b\",null,{\"navMap\":{\"206\":{\"prev\":{\"path\":\"/ua/radha-krishna-prana-mora-jugala-kishora/\",\"title\":\"Сакхі-вринде Віґʼяптіх\"},\"next\":{\"path\":\"/ua/janama-saphala-tara-krishna-darashiana-jara/\",\"title\":\"Рӯпа-Кīртан\"}}}}]\n3c:Tf7b,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/ua/jaya-radhe-jaya-krishna-jaya-vrindavan\",\"url\":\"https://kirtan.site/ua/jaya-radhe-jaya-krishna-jaya-vrindavan\",\"name\":\"Шрī Враджа-дга̄ма-махіма̄мрита. Шрīла Кришнада̄с Кавіра̄дж Ґосва̄мī\",\"inLanguage\":\"ua\",\"isPartOf\":{\"@id\":\"ht
