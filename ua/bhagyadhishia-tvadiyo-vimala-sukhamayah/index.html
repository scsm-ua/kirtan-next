–љ –Ї—Е–∞–ї—Г —Е–∞—А—Ц-–≤—Ц–Љ—Г–Ї—Е–∞ћД–љ\",\"    “С–∞—Г—А–∞-–і–µ–≤–Њ –і–∞—П—П\",\"—А”ѓ–њ–∞–Љ “С–∞—Г–і–µ –±–≥–∞–≤–∞—Б—В–∞–Љ –њ–∞—А–∞–Љ–∞-–Ї–∞—А—Г–љ–∞—П\",\"    –њ—А–∞ћД—Е—Ц–љ–Њ–і- –іƒЂ–љ–∞ –±–∞–љ–і–≥–Њ!\",\"–µ—В–∞–і–ґ “С Љ—П—В–≤–∞ћД –њ—А–∞–Ї–∞ћД—И—П—В —Б—Г–і—Ц–љ–∞-—Б–∞–Љ—Г–і–∞—П–Љ\",\"    —Б–Љ–∞ћД—А–∞–Љ–∞ћД—И—П—Е —Б–∞—Е–∞—А—И–∞ћД\",\"–і–ґ–∞—П–љ—В–µ —З–∞–є–≤–∞ –Љ–∞ћД—П-–љ—Ц“С–∞–і–∞-–љ—Ц–Ї–∞—А–∞-\",\"    —Б–∞–Љ–Љ–Њ—З–∞–љ–µ вАЩ—Б–Љ–∞–Ї–∞–Љ–∞–і–і–≥–∞ћД\"]},{\"number\":\"4\",\"text\":[\"—П–і–≤–∞–і-–±–≥–∞ћД–љ—Г—Е –Ї—Ц—А–∞–љ–∞-–љ—Ц–Ї–∞—А–∞–є—А-\",\"    –±–≥–∞ћД—Б–∞—П–љ –≤—Ц—И–≤–∞–Љ –µ—В–∞–љ\",\"–љ–∞ћД—И—П–Љ –Ї—А–Є—В–≤–∞ћД –љ—Ц–Ї—Е—Ц–ї–∞-—В–∞–Љ–∞—Б–∞ћД–Љ\",\"    —В–µ–і–ґ–∞—Б–∞ћД —Б–∞–Љ–≤—Ц–±–≥–∞ћД—В—Ц\",\"–Ї—А–Є—В–≤–∞ћД –љ–∞ћД—И—П–Љ –њ—А–∞–Ї—А–Є—В—Ц-—В–∞–Љ–∞—Б–∞ћД–Љ\",\"    —Б–∞—В—М—П-—Б”ѓ—А Љ—П–Љ –њ—А–∞–Ї–∞ћД—И—М—П\",\"–і—Ц–≤ Љ—П-“С Љ—П–љ–∞–є—А-—Е–∞—А—Ц-“С—Г–љ–∞-“С–∞–љ–∞–є—Б\",\"    —В–≤–∞–љ —З–∞ —В–∞–і–≤–∞–і-–≤—Ц–±–≥–∞ћД—Б—Ц\"]},{\"number\":\"5\",\"text\":[\"–і—Г—Е–Ї—Е–∞–є—Е –њ”ѓ—А–љ–∞–Љ –≤—Ц–±—Г–і–≥–∞-—Е—А–Є–і–∞—П–Љ\",\"    –Ї–∞ћД–ї–∞-–і–≥–∞—А–Љ–∞ћД—З —З–∞ –і—А–Є—И—В–≤–∞ћД\",\"–Љ–∞ћД—П–≤–∞ћД–і–∞ћД–љ –Ї–∞–ї—Ц–і–ґ–∞–Ї—Г–Љ–∞—В–∞ћД–љ\",\"    –і—Г—И–Ї—А–Є—В–∞ћД–љ —И—П—Б—Ц—В—Г–љ —З–∞\",\"–і–µ—И—Ф –і–µ—И—Ф –±–≥—А–∞–Љ–∞—Б—Ц –≤—Ц—В–∞—А–∞–љ\",\"    “С–∞—Г—А–∞-–≤–∞ћД–љƒЂ–љ —З–∞ –љ–∞ћД–Љ–∞\",\"–і–≥—А–Є—В–≤–∞ћД –і–µ–≤–∞! —В—А—Ц–±–≥—Г–≤–∞–љ–∞-–і–ґ–∞—П–Љ\",\"    –≤–∞–і–ґ—А–∞-–Ї–∞–ї–њ–∞–Љ —В—А—Ц–і–∞–љ–і–∞–Љ\"]},{\"number\":\"6\",\"text\":[\"–≤–∞—А—И–∞ћД—П–Љ –≤–∞–є —Б–∞–і–ґ–∞–ї–∞-–і–ґ–∞–ї–∞–і–Њ\",\"    –≤–∞ћД–і–∞—П–љ –Љ–∞–љ–і—А–∞–±–≥–µ—А—Ц–Љ\",\"—П–і—М—П–і –≤—Ц—И–≤–µ –±–≥—А–∞–Љ–∞—В—Ц –±–∞—Е—Г–і–≥–∞ћД\",\"    –≤–∞ћД—А—Ц–і–≥–∞ћД—А–∞ћД–љ —З–∞ –≤–∞—А—И–∞–љ\",\"—В–∞–і–≤–∞–і-–±–≥”ѓ–Љ–∞—Г –±–≥—А–∞–Љ–∞—Б—Ц —Б–∞“С–∞–љ–∞–є—А-\",\"    –≥–Њ—И–∞—П–љ “С–∞—Г—А–∞-“С–∞ћД—В—Е–∞ћД\",\"–љ—Ц—В—М—П–Љ –і—Ц–≤ Љ—П–Љ—А–Є—В–∞-—Б—Г–Ї–∞—А—Г–љ–∞ћД–Љ\",\"    —В–≤–∞–Љ —Е—Ц –і–µ–≤–∞! –њ—А–∞–≤–∞—А—И–∞–љ\"]},{\"number\":\"7\",\"text\":[\"—И—АƒЂ-—З–∞–є—В–∞–љ—М—П-–≤—Ц–ї–∞ћД—Б–∞-–і–≥–∞ћД–Љ–∞–љ—Ц\",\"    –љ–∞–≤–∞–і–≤ƒЂ–њ–∞ћД—
