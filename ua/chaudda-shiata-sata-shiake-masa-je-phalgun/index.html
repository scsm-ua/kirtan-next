–∞ћД—Б–µ –Ї–µ–±–∞ћД –і–ґ–∞ћД—П,       –Ї–µ–±–∞ћД –љ–∞ћД—З–µ –Ї–µ–±–∞ћД “С–∞ћД—П,\",\"    —Б–∞–Љ–±–≥–∞ћД–ї—Ц—В–µ –љ–∞ћД—А–µ –Ї–∞ћД—А–∞ –±–Њ–ї–Њ\",\"–Ї—Е–∞–љ–і—Ц–ї–µ–Ї–∞ –і—Г—Е–Ї—Е–∞-—И–Њ–Ї–∞, –њ—А–∞–Љ–Њ–і–∞-–њ”ѓ—А—Ц—В–∞ –ї–Њ–Ї–∞,\",\"    –Љ—Ц—И—А–∞ —Е–Њ—Ц–ї–∞ћД –∞ћД–љ–∞–љ–і–µ –≤—Ц—Е–≤–∞–ї–∞\"]},{\"number\":\"108\",\"text\":[\"–∞ћД—З–∞ћД—А Љ—П—А–∞—В–љ–∞, —И—АƒЂ–љ—Ц–≤–∞ћД—Б–∞, –і–ґ–∞“С–∞–љ–љ–∞ћД—В—Е–∞-–Љ—Ц—И—А–∞-–њ–∞ћД—И—П,\",\"    –∞ћД—Б—ЦвАЩ —В–∞ћД–љ—А–µ –Ї–Њ—А–µ —Б–∞ћД–≤–∞–і–≥–∞ћД–љ–∞\",\"–Ї–Њ—А–∞ћД—Ц–ї–Њ –і–ґ–∞ћД—В–∞–Ї–∞—А–Љ–∞,    –і–ґ–µ –∞ћД—З—Ц–ї–Њ –≤—Ц–і–≥—Ц-–і–≥–∞—А–Љ–∞,\",\"    —В–Њ–±–µ –Љ—Ц—И—А–∞ –Ї–Њ—А–µ –љ–∞ћД–љ–∞ћД –і–∞ћД–љ–∞\"]},{\"number\":\"109\",\"text\":[\"–і–ґ–∞—Г—В—Г–Ї–∞ –њ–∞ћД—Ц–ї–Њ –і–ґ–∞—В–∞,    –≥–Њ—А–µ –≤–∞ћД –∞ћД—З—Ц–ї–Њ –Ї–∞—В–∞,\",\"    —Б–Њ–± –і–≥–Њ–љ –≤—Ц–њ—А–µ –і—Ц–ї–Њ –і–∞ћД–љ–∞\",\"–і–ґ–∞—В–∞ –љ–∞—А—В–∞–Ї–∞, “С–∞ћД—П–љ,    –±–≥–∞ћД—В–∞, –∞–Ї—Ц–љ—М—З–∞–љ–∞ –і–ґ–Њ–љ,\",\"    –і–≥–Њ–љ –і—Ц—П –Ї–Њ—Ц–ї–Њ —Б–∞–±–∞ћД—А–∞ –Љ–∞ћД–љ–∞\"]},{\"number\":\"110\",\"text\":[\"—И—АƒЂ–≤–∞ћД—Б–µ—А–∞ –±—А–∞ћД—Е–Љ–∞–љƒЂ,    –љ–∞ћД–Љ–∞ —В–∞ћД–љ—А–∞ вАШ–Љ–∞ћД–ї—Ц–љƒЂвАЩ,\",\"    –∞ћД—З–∞ћД—А Љ—П—А–∞—В–љ–µ—А–∞ –њ–∞—В–љƒЂ-—Б–Њ–љ“С–µ\",\"—Б—Ц–љ–і”ѓ—А–∞, —Е–∞—А—Ц–і—А–∞ћД, —В–Њ—Ц–ї–Њ,    –Ї—Е–Њ—Ц, –Ї–∞–ї–∞ћД, –љ–∞ћД–љ–∞ћД –њ—Е–Њ–ї,\",\"    –і—Ц—П –њ”ѓ–і–ґ–µ –љ–∞ћД—АƒЂ“С–Њ–љ–∞ —А–Њ–љ“С–µ\"]},{\"number\":\"111\",\"text\":[\"–∞–і–≤–∞–є—В–∞-–∞ћД—З–∞ћД—А Љ—П-–±–≥–∞ћД—А–і–ґ Љ—П,    –і–ґ–∞“С–∞—В-–њ”ѓ–і–ґ—Ц—В–∞ћД –∞ћД—А–і–ґ Љ—П,\",\"    –љ–∞ћД–Љ–∞ —В–∞ћД–љ—А–∞ вАШ—БƒЂ—В–∞ћД —В—Е–∞ћД–Ї—Г—А–∞ћД–љƒЂвАЩ\",\"–∞ћД—З–∞ћД—А–і–ґ Љ—Ф—А–∞ –∞ћД“С Љ—П –њ–∞ћД—П,    “С–µ–ї–Њ —Г–њ–∞—Е–∞ћД—А–∞ –ї–Њ—П,\",\"    –і–µ–Ї—Е—Ц—В–µ –±–∞ћД–ї–∞–Ї–∞-—И—Ц—А–Њ–Љ–∞–љ—Ц\"]},{\"number\":\"112\",\"text\":[\"—Б—Г–≤–∞—А–љ–µ—А–∞ –Ї–∞–і—Ц-–±–∞—Г–ї—Ц,    —А–∞–і–ґ–∞—В–∞–Љ—Г–і—А–∞ћД-–њ–∞ћД—И—О–ї—Ц,\",\"    —Б—Г–≤–∞—А–љ–µ—А–∞ –∞–љ“С–∞–і–∞, –Ї–Њ–љ–Ї–Њ–љ\",\"–і—Г-–±–∞ћД—Е—Г—В–µ –і—Ц–≤ Љ—П —И—П–љ–Ї—Е–∞,    —А–∞–і–ґ–∞—В–µ—А–∞ –Љ–∞–ї–∞–±–∞–љ–Ї–∞,\",\"    —Б–≤–∞—А–љ–∞-–Љ—Г–і—А–∞ћД—А–∞ –љ–∞ћД–љ–∞ћД —Е–∞ћД—А–∞“С–Њ–љ\"]},{\"number\":\"113\",\"text\":[\"–≤ Љ—П–≥—А–∞-–љ–∞–Ї—Е–∞ —Е–µ–Љ–∞-–і–ґ–Њ–і—Ц,    –Ї–∞—В—Ц-–њ–∞—В—В–∞—Б”ѓ—В—А–∞-–і–Њ—АƒЂ\",\"    —Е–∞—Б—В–∞-–њ–∞–і–µ—А–∞ –і–ґ–∞—В–∞ –∞ћД–±–≥–∞—А–∞–љ\",\"—З—Ц—В—А–∞-–≤–∞—А–љ–∞ –њ–∞—В—В–∞-—Б–∞ћД–іƒЂ,    –±—Г–љ—Ц –њ—Е–Њ—В–Њ –њ–∞—В—В–∞–њ–∞ћД–іƒЂ,\",\"    —Б–≤–∞—А–љ–∞-—А–∞—Г–њ Љ—П-–Љ—Г–і—А–∞ћД –±–∞—Е—Г-–і–≥–Њ–љ\"]},{\"number\":\"114\",\"text\":[\"–і—Г—А–≤–∞ћД, –і–≥–∞ћД–љ—М—П, “С–Њ—А–Њ—З–∞–љ–∞,\",\"        —Е–∞—А—Ц–і—А–∞ћД, –Ї—Г–љ–Ї—Г–Љ–∞, —З–∞–љ–і–∞–љ–∞,\",\"    –Љ–Њ–љ“С–Њ–ї-–і—А–∞–≤ Љ—П –њ–∞ћД—В—А–∞ –±–≥–Њ—А—Ц—П\",\"–≤–∞—Б—В—А–∞-“С—Г–њ—В–∞ –і–Њ–ї–∞ћД —З–∞–і—ЦвАЩ    —Б–Њ–љ“С–µ –ї–Њ—П –і–∞ћД—БƒЂ —З–µ–іƒЂ,\",\"    –≤–∞—Б—В—А–∞ћД–ї–∞–љ–Ї–∞ћД—А–∞ –њ–µ—В–∞ћД—А—Ц –±–≥–Њ—А—Ц—П\"]},{\"number\":\"115\",\"text\":[\"–±–≥–∞–Ї—И Љ—П, –±–≥–Њ–і–ґ Љ—П, —Г–њ–∞—Е–∞ћД—А–∞, —Б–Њ–љ“С–µ –ї–Њ—Ц–ї–Њ –±–∞—Е—Г –±–≥–∞ћД—А–∞,\",\"    —И—П—ЗƒЂ “С—А–Є—Е–µ —Е–Њ—Ц–ї–Њ —Г–њ–∞–љƒЂ—В–Њ\",\"–і–µ–Ї—Е—Ц—П –±–∞ћД–ї–∞–Ї–∞-—В—Е–∞ћД–Љ,    —Б–∞ћД–Ї—И–∞ћД—В “С–Њ–Ї—Г–ї–∞-–Ї–∞ћД–љ,\",\"    –≤–∞—А–љ–∞-–Љ–∞ћД—В—А–∞ –і–µ–Ї—Е—Ц –≤—Ц–њ–∞—АƒЂ—В–Њ\"]},{\"number\":\"116\",\"text\":[\"—Б–∞—А–≤–∞ –∞–љ“С–∞вАФ—Б—Г–љ—Ц—А–Љ–∞ћД–љ–∞, —Б—Г–≤–∞—А–љ–∞-–њ—А–∞—В—Ц–Љ–∞ћД-–±–≥–∞ћД–љ–∞,\",\"    —Б–∞—А–≤–∞ –∞–љ“С–∞вАФ—Б—Г–ї–∞–Ї—И–∞–љ–∞–Љ–Њ–є\",\"–±–∞ћД–ї–∞–Ї–µ—А–∞ –і—Ц–≤ Љ—П –і–ґ–є–Њ—В—Ц,    –і–µ–Ї—Е—ЦвАЩ –њ–∞ћД—Ц–ї–Њ –±–∞—Е—Г –њ—АƒЂ—В—Ц,\",\"    –≤–∞ћД—В—Б–∞–ї—М—Ф—В–µ –і—А–∞–≤—Ц–ї–Њ —Е—А–Є–і–Њ–є\"]},{\"number\":\"117\",\"text\":[\"–і—Г—А–≤–∞ћД, –і–≥–∞ћД–љ—М—П, –і—Ц–ї–Њ —И—Ц—А—И–µ,    –Ї–Њ—Ц–ї–Њ –±–∞—Е—Г –∞ћД—И—Ц—И–µ,\",\"    —З—Ц—А–∞–і–ґƒЂ–≤ƒЂ —Е–∞–Њ –і—Г—Ц –±–≥–∞ћД—Ц\",\"–і–∞ћД–Ї—Ц–љƒЂ-—И—П–љ–Ї—Е—Ц–љƒЂ —Е–Њ—Ц—В–µ,    —И—П–љ–Ї–∞ћД —Г–њ–∞–і–ґ—Ц–ї–Њ —З—Ц—В–µ,\",\"    –і–Њ—А–µ –љ–∞ћД–Љ–∞ —В—Е—Г—Ц–ї–Њ вАШ–љ—Ц–Љ–∞ћД—ЦвАЩ\"]},{\"number\":\"118\",\"text\":[\"–њ—Г—В—А–∞–Љ–∞ћД—В–∞ћД-—Б–љ–∞ћД–љ–∞–і—Ц–љ–µ,    –і—Ц–ї–Њ –≤–∞—Б—В—А–∞ –≤—Ц–±–≥”ѓ—И–∞–љ–µ,\",\"    –њ—Г—В—А–∞-—Б–∞—Е–∞ –Љ—Ц—И—А–µ—А–µ —Б–∞–Љ–Љ–∞ћД–љ—ЦвАЩ\",\"—И—П—ЗƒЂ-–Љ—Ц—И—А–µ—А–∞ –њ”ѓ–і–ґ–∞ћД –ї–Њ—П,    –Љ–Њ–љ–µ—В–µ —Е–∞—А—Ц—И–∞ —Е–Њ—П,\",\"    –≥–Њ—А–µ –∞ћД—Ц–ї–∞ћД —Б—Ц—В–∞ћД —В—Е–∞ћД–Ї—Г—А–∞ћД–љƒЂ\"]},{\"number\":\"119\",\"text\":[\"–∞–є—З–µ —И—П—ЗƒЂ-–і–ґ–∞“С–∞–љ–љ–∞ћД—В—Е,    –њ—Г—В—А–∞ –њ–∞ћД—П –ї–∞–Ї—И–ЉƒЂ–љ–∞ћД—В—Е,\",\"    –њ”ѓ—А–љ–∞ —Е–Њ—Ц–ї–Њ —Б–∞–Ї–∞–ї–∞ –≤–∞ћД–љ—М—З—Ц—В–Њ\",\"–і–≥–Њ–љ-–і–≥–∞ћД–љ—М—Ф –±–≥–Њ—А–µ –≥–Њ—А–∞,    –ї–Њ–Ї–∞–Љ–∞ћД–љ—М—П –Ї–∞–ї–µ–≤–∞—А–∞,\",\"    –і—Ц–љ–µ –і—Ц–љ–µ —Е–Њ–є –∞ћД–љ–∞–љ–і—Ц—В–Њ\"]},{\"number\":\"120\",\"text\":[\"–Љ—Ц—И—А–∞вАФ–≤–∞–є—И–љ–∞–≤–∞, —И—П–љ—В–∞, –∞–ї–∞–Љ–њ–∞—В–∞, —И—О–і–і–≥–∞, –і–∞ћД–љ—В–∞,\",\"    –і–≥–Њ–љ-–±–≥–Њ“С–µ –љ–∞ћД—Е—Ц –∞–±–≥—Ц–Љ–∞ћД–љ–∞\",\"–њ—Г—В—А–µ—А–∞ –њ—А–∞–±–≥–∞ћД–≤–µ –і–ґ–∞—В–∞,    –і–≥–Њ–љ –∞ћД—Б—ЦвАЩ –Љ—Ц–ї–µ, —В–∞—В–∞,\",\"    –≤—Ц—И–љ—Г-–њ—АƒЂ—В–µ –і–≤—Ц–і–ґ–µ –і–µ–љ–Њ –і–∞ћД–љ–∞\"]},{\"number\":\"121\",\"text\":[\"–ї–∞“С–љ–∞ “С–Њ–љ—ЦвАЩ —Е–∞—А—И–∞–Љ–∞—В—Ц,    –љƒЂ–ї–∞ћД–Љ–±–∞—А–∞ —З–∞–Ї—А–∞–≤–∞—А—ВƒЂ,\",\"    “С—Г–њ—В–µ –Ї—Ц—З—Е—Г –Ї–Њ—Е—Ц–ї–Њ –Љ—Ц—И—А–µ—А–µ\",\"–Љ–∞—Е–∞ћД–њ—Г—А—Г—И–µ—А–∞ —З—Ц—Е–љ–∞,    –ї–∞“С–љ–µ –∞–љ“С–µ –±–≥—Ц–љ–љ–∞ –±–≥—Ц–љ–љ–∞,\",\"    –і–µ–Ї—Е—Ц, вАФ –µ—Ц —В–∞ћД—А—Ц–±–µ —Б–∞–Љ—Б–∞ћД—А–µ\"]},{\"number\":\"122\",\"text\":[\"–∞–є—З–µ –њ—А–∞–±–≥—Г —И—П—ЗƒЂ-–≥–Њ—А–µ,    –Ї—А–Є–њ–∞ћД–є –Ї–Њ—Ц–ї–Њ –∞–≤–∞—В–∞ћД—А–µ\",\"    –і–ґ–µ—Ц —Ц—Е–∞ћД –Ї–∞—А–∞—Ф —И—А–∞–≤–∞–љ–∞\",\"“С–∞—Г—А–∞-–њ—А–∞–±–≥—Г –і–∞—П–Љ–Њ–є,    —В–∞ћД–љ—А–µ —Е–Њ—Ф–љ–∞ —Б–∞–і–Њ–є,\",\"    —Б–µ—Ц –њ–∞ћД—П —В–∞ћД–љ–≥–∞ћД—А–∞ —З–∞—А–∞–љ–∞\"]},{\"number\":\"123\",\"text\":[\"–њ–∞ћД—Ц—П –Љ–∞ћД–љ—Г—И–∞ –і–ґ–∞–љ–Љ–∞,    –і–ґ–µ –љ–∞ћД —И—О–љ–µ “С–∞—Г—А–∞-“С—Г–љ–∞,\",\"    —Е–µ–љ–Њ –і–ґ–∞–љ–Љ–∞ —В–∞ћД—А–∞ –≤ Љ—П—А—В—Е–∞ —Е–Њ—Ц–ї–Њ\",\"–њ–∞ћД—Ц—П –∞–Љ—А–Є—В–∞–і–≥—Г–љƒЂ,    –њ—Ц—Ф –≤—Ц—И–∞-“С–∞—А—В–∞-–њ–∞ћД–љ—Ц\",\"    –і–ґ–∞–љ–Љ—Ц—П —Б–µ –Ї–µ–љ–µ –љ–∞ћД—Е—Ц –Љ–Њ—Ц–ї–Њ\"]},{\"number\":\"124\",\"text\":[\"—И—АƒЂ-—З–∞–є—В–∞–љ—М—П-–љ—Ц—В—М—П–љ–∞–љ–і–∞, –∞ћД—З–∞ћД—А Љ—П –∞–і–≤–∞–є—В–∞—З–∞–љ–і—А–∞,\",\"    —Б–≤–∞—А”ѓ–њ–∞-—А”ѓ–њ–∞-—А–∞–≥—Г–љ–∞ћД—В—Е–∞-–і–∞ћД—Б–∞\",\"—Ц—Е–∞ћД-—Б–∞–±–∞ћД—А–∞ —И—АƒЂ-—З–∞—А–∞–љ–∞,    —И—Ц—А–µ –≤–∞–љ–і—Ц –љ—Ц–і–ґ–∞-–і–≥–Њ–љ,\",\"    –і–ґ–∞–љ–Љ–∞-–їƒЂ–ї–∞ћД “С–∞ћД—Ц–ї–Њ –Ї—А–Є—И–љ–∞–і–∞ћД—Б–∞\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.N. Acharya Maharaj\",\"ru\":\"–®—А–Є–ї–∞ –С.–Э. –Р—З–∞—А—М—П –Ь–∞—Е–∞—А–∞–і–ґ\",\"ua\":\"–®—А—Ц–ї–∞ –С.–Э. –Р—З–∞—А Љ—П –Ь–∞—Е–∞—А–∞–і–ґ\"},\"embed_url\":\"https://soundcloud.com/madhupuri/4-chauda-sata-sat-acharya\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L43\",null,{\"audio\":\"$3b:props:song:resources:audio\",\"language\":\"ua\"}]\n3d:[\"$\",\"$L44\",null,{\"navMap\":{\"242\":{\"prev\":{\"path\":\"/ua/shiuddha-bhakata-charana-renu?p=240\",\"title\":\"–®—О–і–і–≥–∞-–±–≥–∞–Ї–∞—В–∞\"},\"next\":{\"path\":\"/ua/prabhu-kohe-kohilan-ei-mahamantra?p=249\",\"title\":\"–Я—А–∞–±–≥—Г –Ї–Њ—Е–µ\"}}}}]\n45:T728,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://next.kirtan.site/ua/chaudda-shiata-sata-shiake-masa-je-phalgun\",\"url\":\"https://next.kirtan.site/ua/chaudda-shiata-sata-shiake-masa-je-phalgun\",\"name\":\"–®—АƒЂ “Р–∞—Г—А–∞ –Я—Г—А–љƒЂ–Љ–∞ћД. –®—АƒЂ–ї–∞ –Ъ—А–Є—И–љ–∞–і–∞ћД—Б –Ъ–∞–≤—Ц—А–∞ћД–і–ґ “Р–Њ—Б–≤–∞ћД–ЉƒЂ. Verses 89-124 from ≈ЪrƒЂ Chaitanya CharitƒБmбєЫta\",\"inLanguage\":\"ua\",\"isPartOf\":{\"@id\":\"https://next.kirtan.site/#website\"}},{\"@type\":\"MusicComposition\",\"@id\":\"https://next.kirtan.site/ua/chaudda-shiata-sata-shiake-masa-je-phalgun#composition\",\"alternateName\":[\"—З–∞—Г–і–і–∞-—И—П—В–∞ —Б–∞ћД—В–∞-—И—П–Ї–µ –Љ–∞ћД—Б–∞ –і–ґ–µ –њ—Е–∞ћД–ї“С—Г–љ\"],\"name\":\"–®—АƒЂ “Р–∞—Г—А–∞ –Я—Г—А–љƒЂ–Љ–∞ћД. –®—АƒЂ–ї–∞ –Ъ—А–Є—И–љ–∞–і–∞ћД—Б –Ъ–∞–≤—Ц—А–∞ћД–і–ґ “Р–Њ—Б–≤–∞ћД–ЉƒЂ. Verses 89-124 from ≈ЪrƒЂ Chaitanya CharitƒБmбєЫta\",\"url\":\"https://next.kirtan.site/ua/chaudda-shiata-sata-shiake-masa-je-phalgun\",\"isPartOf\":{\"@id\":\"https://next.kirtan.site/#website\"},\"about\":[{\"@type\":\"Thing\",\"name\":\"Bhakti Yoga\"},{\"@type\":\"Thing\",\"name\":\"Gaudiya Vaishnavism\"}],\"genre\":[\"Devotional\",\"Bhajan\",\"Kirtan\"],\"mainEntityOfPage\":{\"@id
