 –∞–ї–µ –≤ —П–Ї–Њ–Љ—Г —П –њ–Њ–ї–Њ–ґ–µ–љ–љ—Ц? –Ь–Њ—Ф –њ–Њ–ї–Њ–ґ–µ–љ–љ—П –њ—А–Њ—В–Є–ї–µ–ґ–љ–µ, –Њ –Љ–Њ—П –Я–Њ–≤–µ–ї–Є—В–µ–ї—М–Ї–Њ. –Ь—Ц–є —Б—В–∞–љ —В–∞–Ї–Є–є, —Й–Њ –±–µ–Ј —Б–њ–Њ–≥–ї—П–і–∞–љ–љ—П –Ґ–≤–Њ–≥–Њ –Њ–±—А–∞–Ј—Г, –Њ –Ґ–≤–Њ—П –Ь–Є–ї–Њ—Б—В–µ, –Љ–Њ—Ф —Б–µ—А—Ж–µ –Ј–≥–Њ—А–∞—Ф –≤ –њ–Њ–њ—Ц–ї. –Ґ–∞–Ї–Є–є –Љ—Ц–є —Б—В–∞–љ. *“Р–Њ—А–Њ–ї–µ –і–ґ–∞ћД—А–∞–ї–Њ –і–µ—Е—Ц* вАФ –љ—Ц–±–Є –Њ—В—А—Г—В–∞ –Ї–Њ–±—А–Є, —П–Ї–∞ —Б–њ—А–Є—З–Є–љ—П—Ф –љ–µ—Б—В–µ—А–њ–љ–Є–є –±—Ц–ї—М –Љ–Њ—Ф–Љ—Г —Б–µ—А—Ж—О. –Ь–µ–љ–µ –≤–Ї—Г—Б–Є–ї–∞ –Ј–Љ—Ц—П, —Ц —Й–Њ —Ж–µ –Ј–∞ –Ј–Љ—Ц—П? –¶–µ –≤—Ц–і—Б—Г—В–љ—Ц—Б—В—М –њ—А—П–Љ–Њ–≥–Њ –Ј–≤ Љ—П–Ј–Ї—Г –Ј –Ґ–Њ–±–Њ—О, –Ґ–≤–Њ—П –Ь–Є–ї–Њ—Б—В–µ. –Ю—В—А—Г—В–∞ —Ж—Ц—Ф—Ч –Ј–Љ—Ц—Ч —Б–Ї—Г–≤–∞–ї–∞ –Љ–Њ—Ф —Б–µ—А—Ж–µ, —Ц —П –њ–Њ–Љ–Є—А–∞—О. *–І—Ц—А–Њ-–і—Ц–љ–∞ —В–∞ћД–њ—Ц—В–∞ –і–ґƒЂ–≤–∞–љ–∞* вАФ —Ц —Ж–µ —Б—В–∞–ї–Њ—Б—П –љ–µ —А–∞–њ—В–Њ–≤–Њ: –Ј –і–∞–≤–љ—Ц—Е-–і–∞–≤–µ–љ —П —В–µ—А–њ–ї—О —Ж–µ–є –±—Ц–ї—М —А–Њ–Ј–ї—Г–Ї–Є –Ј –њ—А–µ–Ї—А–∞—Б–љ–Є–Љ, —Б–њ–Њ–≤–љ–µ–љ–Є–Љ –љ–∞–і—Ц—Ч —Й–∞—Б–ї–Є–≤–Є–Љ –ґ–Є—В—В—П–Љ.\",\"*–•–∞ћД —Е–∞ћД —А”ѓ–њ–∞ –Ї–∞—А–∞ –і–∞—П, –і–µ—Е–Њ –Љ–Њ—А–µ –њ–∞–і–∞-—З—Е–∞ћД—П, –љ–∞—А–Њ—В—В–∞–Љ–∞ –ї–Њ—Ц–ї–Њ —И—П—А–∞–љ–∞* вАФ –∞–ї–µ –Ј–∞—А–∞–Ј —П –і—Ц–є—И–Њ–≤ –Ї—А–∞—О —Ц –≤–Њ—Б—В–∞–љ–љ—Ф –±–ї–∞–≥–∞—О –Ґ–≤–Њ—Ф—Ч –Љ–Є–ї–Њ—Б—В—Ц; —Ц–љ–∞–Ї—И–µ —П –Ј–≥–Є–љ—Г.\",\"–¶–µ–є *–±–≥–∞–і–ґ–∞–љ* —Б–Ї–ї–∞–≤ –Э–∞—А–Њ—В—В–∞–Љ –Ґ—Е–∞–Ї—Г—А –љ–∞ —Б–ї–∞–≤—Г –®—А—Ц–ї–Є –†—Г–њ–Є “Р–Њ—Б–≤–∞–Љ—Ц. –Ґ–∞–Ї –≤—Ц–љ –≤—Ц–і–Ї—А–Є–≤ –љ–∞–Љ –њ—А–Њ–Љ—Ц–љ—М —Б–≤—Ц—В–ї–∞ –Ј –љ–∞–є–≤–Є—Й–Њ—Ч —Б—Д–µ—А–Є –ґ–Є—В—В—П *–±–≥–∞–і–ґ–∞–љ—Г*. –¶—П *—Б–∞–Љ–њ—А–∞–і–∞—П* –Ј–≤–µ—В—М—Б—П –†—Г–њ–∞–љ—Г“С–∞-—Б–∞–Љ–њ—А–∞–і–∞—П, —Ц –љ–∞—И–∞ “Р—Г—А—Г-–њ–∞—А–∞–Љ–њ–∞—А–∞ —В–∞ –≤—Б–µ, —Й–Њ –Ј –љ–µ—О –њ–Њ–≤ Љ—П–Ј–∞–љ–µ, —Г–Ј–≥–Њ–і–ґ–µ–љ—Ц –Ј —Ж–Є–Љ –љ–∞—Б—В—А–Њ—Ф–Љ. –Т—Ц–љ –љ–∞–њ–Є—Б–∞–≤ –±–∞–≥–∞—В–Њ –њ—Ц—Б–µ–љ—М, —Ц –≤—Б—Ц –≤–Њ–љ–Є –Љ–∞—О—В—М –≥–ї–Є–±–Њ–Ї—Г –≤–љ—Г—В—А—Ц—И–љ—О –Њ—Б–љ–Њ–≤—Г —В–∞ —Б–њ–Њ–≤–љ–µ–љ—Ц –њ—Ц–і–љ–µ—Б–µ–љ–Њ–≥–Њ –і—Г—Е–Њ–≤–љ–Њ–≥–Њ –њ–µ—А–µ–ґ–Є–≤–∞–љ–љ—П —Ц –љ–µ–њ–Њ—Е–Є—В–љ–Њ—Ч –≤—Ц—А–Є.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\
