Р°СҖР°СӮРҫ РҪСҖРёСҒС–РјРіРҫ\",\"СҸСӮРҫ СҸСӮРҫ СҸРјС– СӮР°СӮРҫ РҪСҖРёСҒС–РјРіР°С…\",\"РұР°С…С–СҖ РҪСҖРёСҒС–РјРіРҫ С…СҖРёРҙР°С” РҪСҖРёСҒС–РјРіРҫ\",\"РҪСҖРёСҒС–РјРіР°Рј Р°М„РҙС–Рј СҲСҸСҖР°РҪР°Рј РҝСҖР°РҝР°РҙСҢС”\"],\"translation\":[\"Р“РҫСҒРҝРҫРҙСҢ РқР°СҖР°СҒС–РјРіР° РҝСҖРёСҒСғСӮРҪС–Р№ С– СӮСғСӮ, С– СӮР°Рј. РҡСғРҙРё Рұ СҸ РҪРө РҝС–СҲРҫРІ вҖ” СғСҒСҺРҙРё С” Р“РҫСҒРҝРҫРҙСҢ РқР°СҖР°СҒС–РјРіР°. Р’С–РҪ РҫРҙРҪРҫСҮР°СҒРҪРҫ РҝРөСҖРөРұСғРІР°С” С– РІ СҒРөСҖСҶС–, С– Р·РҫРІРҪС–. РҜ РІСҖСғСҮР°СҺ СҒРөРұРө Р“РҫСҒРҝРҫРҙСғ РқР°СҖР°СҒС–РјР·С– вҖ” РҝРөСҖСҲРҫРҙР¶РөСҖРөР»Сғ РІСҒСҢРҫРіРҫ СҒСғСүРҫРіРҫ С– РҪР°Р№РІРёСүРҫРјСғ РҝСҖРёСӮСғР»РәСғ.\"]},{\"subtitle\":[\"РЁСҖД« Р”Р°СҲСҸРІР°СӮР°М„СҖ-СҒСӮРҫСӮСҖР°Рј\"]},{\"number\":\"4\",\"text\":[\"СӮР°РІР° РәР°СҖР°-РәР°РјР°Р»Р°-РІР°СҖРө РҪР°РәС…Р°Рј Р°РҙРұРіСғСӮР°-СҲСҖРёРҪТ‘Р°Рј\",\"    РҙР°Р»С–СӮР°-С…С–СҖР°РҪСҢСҸРәР°СҲС–РҝСғ-СӮР°РҪСғ-РұРіСҖРёРҪТ‘Р°Рј\",\"РәРөСҲСҸРІР° РҙРіСҖРёСӮР°-РҪР°СҖР°С…Р°СҖС–-СҖУҜРҝР° РҙР¶Р°СҸ РҙР¶Р°Т‘Р°РҙД«СҲСҸ С…Р°СҖРө\"],\"translation\":[\"Рһ РҡРөСҲСҸРІРҫ! Рһ Р’РҫР»РҫРҙР°СҖСҺ РІСҒРөСҒРІС–СӮСғ! Рһ Р“РҫСҒРҝРҫРҙРё РҘР°СҖС–! РўРё РҝСҖРёР№РҪСҸРІ РҫРұСҖР°Р· РҪР°РҝС–РІР»СҺРҙРёРҪРё-РҪР°РҝС–РІР»РөРІР°. РЎР»Р°РІР° РўРҫРұС–! РўР°Рә СҒР°РјРҫ, СҸРә РҫСҒСғ РјРҫР¶РҪР° Р»РөРіРәРҫ СҖРҫР·СҮР°РІРёСӮРё РҝР°Р»СҢСҶСҸРјРё, РўРё СҖРҫР·С–СҖРІР°РІ СӮС–Р»Рҫ РҙРөРјРҫРҪР° РҘС–СҖР°РҪСҢСҸРәР°СҲРёРҝСғ, РҝРҫРҙС–РұРҪРҫРіРҫ РҙРҫ РҫСҒРё, РҙРёРІРҫРІРёР¶РҪРёРјРё РіРҫСҒСӮСҖРёРјРё РәС–РіСӮСҸРјРё РЎРІРҫС—С… РҝСҖРөРәСҖР°СҒРҪРёС… Р»РҫСӮРҫСҒРҫРІРёС… СҖСғРә.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Goswami Maharaj\",\"ru\":\"РЁСҖРёР»Р° Р‘.РЎ. Р“РҫСҒРІР°РјРё РңР°С…Р°СҖР°РҙР¶\",\"ua\":\"РЁСҖС–Р»Р° Р‘.РЎ. ТҗРҫСҒРІР°РјС– РңР°С…Р°СҖР°РҙР¶\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/goswami-maharaj-s-ri-nr-sim-ha\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Р‘С…Р°РәСӮРё РӣР°Р»РёСӮР° Р”РөРІРё\",\"ua\":\"Р‘РіР°РәСӮС– РӣР°Р»С–СӮР° Р”РөРІС–\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-sri-nrsimha-pranam-n
