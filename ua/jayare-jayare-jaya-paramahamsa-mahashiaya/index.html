Т‘Р°РҪСӮР°СҖРө\"]},{\"number\":\"7\",\"text\":[\"СҒСӮС…Р°М„РҪРө СҒСӮС…Р°М„РҪРө РәРҫСӮРҫ РјРҫСӮС…    СҒСӮС…Р°М„РҝС–СҸСҮР° РҪС–СҲРәР°РҝРҫСӮ\",\"    РҝСҖРөРјР° СҒРөРІР°М„ СҲС–РәС…Р°М„С–СӮРө РҙР¶Д«РІРө\",\"РјРҫСӮС…РөСҖР° РІР°Р№СҲРҪР°РІР° Т‘РҫРҪ    РәРҫСҖРө СҒР°РҙР°М„ РІС–СӮР°СҖРҫРҪ\",\"    С…Р°СҖС– Т‘СғРҪР°-РәР°СӮС…Р°М„РјСҖРёСӮР° РұРіР°РІРө\"]},{\"number\":\"8\",\"text\":[\"СҲСҺРҙРҙРіР°-РұРіР°РәСӮС–-РјР°РҪРҙР°М„РәС–РҪД«    РІС–РјР°Р»Р° РҝСҖР°РІР°М„С…Р° Р°М„РҪС–\",\"    СҲС–СӮР°Р»Р° РәРҫСҖС–Р»Р°М„ СӮР°РҝСӮР°РҝСҖР°М„РҪР°\",\"РҙРөСҲС” РҙРөСҲС” РҪС–СҲРәС–РҪСҢСҮР°РҪ    РҝСҖРөСҖС–Р»Р°М„ РІР°Р№СҲРҪР°РІР° Т‘РҫРҪ\",\"    РІС–СҒСӮР°М„СҖС–СӮРө С…Р°СҖС–Т‘СғРҪР° Т‘Р°М„РҪР°\"]},{\"number\":\"9\",\"text\":[\"РҝУҜСҖРІРө СҸСӮС…Р°М„ Т‘Р°СғСҖР°С…Р°СҖС–    РјР°М„СҸРІР°М„РҙР° СҮРөРҙР° РәРҫСҖС–\",\"    РІР°Р№СҲРҪР°РІР° РәРҫСҖС–Р»Р°М„ РәР°М„СҲС–РІР°М„СҒД«\",\"РІР°Р№СҲРҪР°РІР° РҙР°СҖСҲСҸРҪР°-СҒСғРәСҲРјР°    РІС–СҮР°М„СҖРө СӮСғРјС– С…Рө РҙР°РәСҲР°\",\"    СӮРөРјР°СӮС– СӮРҫСҲРёР»Р°М„ РІР°М„СҖР°М„РҪР°СҒД«\"]},{\"number\":\"10\",\"text\":[\"РҙР°Р№РІР°-РІР°СҖРҪР°М„СҲСҖР°РјР°-РҙРіР°СҖРјР°    С…Р°СҖС– РұРіР°РәСӮС– РҙР¶Р°М„СҖР° РјР°СҖРјР°\",\"    СҲСҸСҒСӮСҖР° РҙР¶СғРәСӮРө РәРҫСҖС–Р»Р°М„-РҪС–СҲСҮРҫР№\",\"Т‘КјСҸРҪР°-РҙР¶РҫТ‘Р°-РәР°СҖРјР° СҮС…РҫР№    РјУҜР»СҢСҸ СӮР°М„СҖР° РәС–СҮС…Сғ РҪРҫР№\",\"    РұРіР°РәСӮС–СҖР° РІС–СҖРҫРҙРіД« РҙР¶РҫРҙС– С…РҫР№\"]},{\"number\":\"11\",\"text\":[\"СҲСҖД« Т‘Р°СғРҙР°РјР°РҪРҙР°Р»Р° РұРіУҜРјС–    РұРіР°РәСӮР° СҒР°РҪТ‘Рө РҝР°СҖС–РәСҖР°РјС–\",\"    СҒСғРәД«СҖСӮС– СҒСӮС…Р°М„РҝС–Р»Р°М„ РјР°С…Р°М„СҲРҫР№\",\"Р°РұРіС–РҪРҪР° РІСҖР°РҙР¶Р° РјР°РҪРҙР°Р»Р°    Т‘Р°СғРҙР°РұРіУҜРјС– РҝСҖРөРјРҫРҙР¶РІР°Р»Р°\",\"    РҝСҖР°СҮР°М„СҖР° С…РҫС–Р»Рҫ РІС–СҲРІР°РјРҫР№\"]},{\"number\":\"12\",\"text\":[\"РәСғР»С–СҸСӮРө РҝР°М„СҲР°РҪРҙД«СҖР°М„    Р°СӮСҢСҸСҮР°М„СҖР° РәРҫС–Р»Рҫ РҙР¶Р°М„вҖҷСҖР°М„\",\"    СӮР°М„ СҒР°РұР°М„СҖР° РҙРҫСҲР° РәСҲРҫРјР°М„ РәРҫСҖС–\",\"РҙР¶Р°Т‘Р°СӮРө РәРҫС–Р»Рө РіРҫСҲР°РҪР°М„    вҖҳСӮР°СҖРҫСҖС–РІР° СҒР°С…С–СҲРҪСғРҪР°М„вҖҷ\",\"    С…РҫРҪ вҖҳРәД«СҖСӮР°РҪД«СҸС… СҒР°РҙР°М„ С…Р°СҖС–С…вҖҷ\"]},{\"number\":\"13\",\"text\":[\"СҲСҖД« РІС–СҲРІР°-РІР°Р№СҲРҪР°РІР°-СҖР°М„РҙР¶Р°    СҒР°РұРіР°М„-РјР°РҙРіКјС” вҖҳРҝР°М„СӮСҖР°СҖР°М„РҙР¶Р°вҖҷ\",\"    СғРҝР°М„РҙРіС–-РұРіУҜСҲР°РҪРө РІС–РұРіУҜСҲРёСӮР°\",\"РІС–СҲРІРөСҖР° РјР°РҪТ‘Р°Р»Р° Р»Р°М„Т‘С–вҖҷ    С…РҫС–СҸСҮРҫ СҒР°СҖРІР°вҖҷ СӮСҢСҸТ‘Д«\",\"    РІС–СҲРІР°РІР°М„СҒД« РҙР¶РҫРҪ-С…С–СӮРө СҖР°СӮР°\"]},{\"number\":\"14\",\"text\":[\"РәРҫСҖС–СӮРөСҮРҫ СғРҝР°РәР°М„СҖР°    РҙР¶Р°М„СӮРө РҝР°СҖР° СғРҝР°РәР°М„СҖР°\",\"    Р»РҫРұРіРө РҙР¶Д«РІР° СҲСҖД« РәСҖРёСҲРҪР°-СҒРөРІР°М„СҸ\",\"РҙУҜСҖРө РҙР¶Р°М„СҸ РұРіР°РІР°-СҖРҫТ‘Р°    РәС…Р°РҪРҙРө РҙР¶Р°М„С…Рө РәР°СҖРјР° РұРіРҫТ‘Р°\",\"    С…Р°СҖС– РҝР°М„РҙР° РҝР°РҙРјР° РҙР¶Р°М„вҖҷСӮРө РҝР°М„СҸ\"]},{\"number\":\"15\",\"text\":[\"РҙР¶Д«РІР° РјРҫС…Р°-РҪС–РҙСҖР°М„ Т‘Р°СӮР°    РҙР¶Р°М„Т‘Р°М„вҖҷСӮРө РІР°Р№РәСғРҪСӮС…Р° РҙУҜСӮР°\",\"    вҖҳТ‘Р°СғРҙД«СҸвҖҷ РҝР°М„СӮС…Р°М„Рҫ РіРҫСҖРө РіРҫСҖРө\",\"СғСӮС…РҫСҖРө СғСӮС…РҫСҖРө РұРіР°М„С–    Р°М„СҖРҫ СӮРҫ СҒР°РјРҫСҸ РҪР°М„С–\",\"    вҖҳРәСҖРёСҲРҪР° РұРіР°РҙР¶Р°вҖҷ РұРҫР»Рө СғСҮР°Р№С…СҒРІР°СҖРө\"]},{\"number\":\"16\",\"text\":[\"СӮРҫРјР°М„СҖР° РјСғРәС…Р°М„СҖР°РІС–РҪРҙР°-    РІС–Т‘Р°Р»С–СӮР° РјР°РәР°СҖР°РҪРҙР°\",\"    СҒС–РҪСҢСҮС–СӮР° Р°СҮКјСҺСӮР°-Т‘СғРҪР°-Т‘Р°М„СӮС…Р°М„\",\"СҲСҺРҪС–Р»Рө РҙР¶СғРҙР°М„СҸ РҝСҖР°М„РҪР°    СӮР°РјРҫ РјРҫС…Р° Р°РҪСӮР°СҖРҙРіР°М„РҪР°\",\"    РҙУҜСҖРө РҙР¶Р°М„СҸ С…СҖРёРҙРҫС”СҖР° РІКјСҸСӮС…Р°М„\"]},{\"number\":\"17\",\"text\":[\"РҙР¶Р°М„РҪС– Р°М„РјС– РјР°С…Р°М„СҲРҫР№    РҙР¶Р°СҲРҫРІР°М„РҪСҢСҮР°М„ РҪР°М„С…С– С…РҫР№\",\"    РұС–РҪРҙСғ РјР°М„СӮСҖР° СӮРҫРјР°М„СҖР° Р°РҪСӮР°СҖРө\",\"СӮР°РІР° Т‘СғРҪР° РІД«РҪР°М„РҙРіР°М„СҖД«,    РјРҫСҖР° РәР°РҪСӮС…Р°-РІД«РҪР°М„ РҙРіРҫСҖС–вҖҷ\",\"    Р°РІР°СҲС”СӮРө РұРҫР»Р°М„СҸ Р°М„РјР°М„СҖРө\"]},{\"number\":\"18\",\"text\":[\"РІР°Р№СҲРҪР°РІРөСҖР° Т‘СғРҪР°-Т‘Р°М„РҪР°    РәРҫСҖС–Р»Рө РҙР¶Д«РІРөСҖР° СӮСҖР°М„РҪР°\",\"    СҲСҺРҪС–СҸСҮС– СҒР°М„РҙРіСғ Т‘СғСҖСғ РјСғРәС…Рө\",\"РәСҖРёСҲРҪР° РұРіР°РәСӮС–-СҒР°РјСғРҙРҫР№    РҙР¶Р°РҪР°РјР° СҒР°РҝС…Р°Р»Р° С…РҫР№\",\"    Рө РұРіР°РІР°-СҒР°М„Т‘Р°СҖР° СӮРҫСҖРө СҒСғРәС…Рө\"]},{\"number\":\"19\",\"text\":[\"СӮРө-РәР°М„СҖР°РҪРө РҝСҖР°СҸСҒР°    СҸСӮС…Р°М„ РІР°М„РјР°РҪРөСҖР° Р°М„СҲСҸ\",\"    Т‘Р°Т‘Р°РҪРөСҖР° СҮР°М„РҪРҙР° РҙРіРҫСҖС– РұР°М„СҖРө\",\"Р°РҙРҫСҲР°-РҙР°СҖР°СҲС– СӮСғРјС–    Р°РҙРіР°РјР° РҝР°СӮС–СӮР° Р°М„РјС–\",\"    РҪС–РҙР¶Р° Т‘СғРҪРө РәСҲРҫРјС–РІР°М„ Р°М„РјР°М„СҖРө\"]},{\"number\":\"20\",\"text\":[\"СҲСҖД« Т‘Р°СғСҖР°М„РҪТ‘Р°-РҝР°М„СҖС–СҲР°РҙР°    СӮС…Р°М„РәСғСҖР° РұРіР°РәСӮС–РІС–РҪРҫРҙР°\",\"    РҙД«РҪР°С…Д«РҪР° РҝР°СӮС–СӮРөСҖР° РұР°РҪРҙРіСғ\",\"РәР°Р»С–-СӮР°РјР°С… РІС–РҪР°М„СҲС–СӮРө    Р°М„РҪС–Р»РөРҪР° Р°РІР°РҪД«СӮРө\",\"    СӮРҫРјР°вҖҷ Р°РәР°Р»Р°РҪРәР° РҝУҜСҖРҪР° С–РҪРҙСғ\"]},{\"number\":\"21\",\"text\":[\"РәР°СҖР° РәСҖРёРҝР°М„ РІС–СӮР°СҖР°РҪР°    РҝСҖРөРјР°СҒСғРҙРіР°М„ Р°РҪСғРәСҲР°РҪР°\",\"    РјР°М„СӮС–СҸ СғСӮС…СғРәР° РҙР¶Д«РІР° Т‘РҫРҪ\",\"С…Р°СҖС–РҪР°М„РјР°-СҒР°РҪРәД«СҖСӮР°РҪРө    РҪР°М„СҮСғРәР° РҙР¶Р°Т‘Р°СӮР°-РҙР¶Р°РҪРө\",\"    РІР°Р№СҲРҪР°РІР°-РҙР°М„СҒРөСҖР° РҪС–РІРөРҙР°РҪ\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"РЁСҖРёР»Р° Р‘.РЎ. Р“РҫРІРёРҪРҙР° Р”РөРІ-Р“РҫСҒРІР°РјРё РңР°С…Р°СҖР°РҙР¶\",\"ua\":\"РЁСҖС–Р»Р° Р‘.РЎ. ТҗРҫРІС–РҪРҙР° Р”РөРІ-ТҗРҫСҒРІР°РјС– РңР°С…Р°СҖР°РҙР¶\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-acharya\"},{\"title\":{\"en\":\"Srila B.R. Sridhar Dev-Goswami Maharaj\",\"ru\":\"РЁСҖРёР»Р° Р‘.Р . РЁСҖРёРҙС…Р°СҖ Р”РөРІ-Р“РҫСҒРІР°РјРё РңР°С…Р°СҖР°РҙР¶\",\"ua\":\"РЁСҖС–Р»Р° Р‘.Р . РЁСҖС–РҙРіР°СҖ Р”РөРІ-ТҗРҫСҒРІР°РјС– РңР°С…Р°СҖР°РҙР¶\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/sridhar-maharaj-and-govinda-8\"}]}}}]\n"])</script><script>self.__next_f.push([1,"37:[\"$\",\"$L3d\",null,{\"audio\":\"$36:props:song:resources:audio\",\"language\":\"ua\"}]\n38:[\"$\",\"$L3e\",null,{\"navMap\":{\"221\":{\"prev\":{\"path\":\"/ua/bhayabhanjana-jayashiamsana?p=219\",\"title\":\"РЁСҖД« Р”Р°С—СӮР° Р”Р°М„СҒ РҹСҖР°РҪР°СӮС– РҹР°РҪСҢСҮР°РәР°Рј\"},\"next\":{\"path\":\"/ua/pralaya-payodhi-jale-dhritavan-asi-vedam?p=225\",\"title\":\"РЁСҖД«
