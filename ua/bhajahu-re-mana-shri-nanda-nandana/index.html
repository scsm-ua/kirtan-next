 паратīті ре\",\"камала-дала-джала,    джīвана таламала\",\"    бгаджаху харі-пада ніті ре\"],\"translation\":[\"Як радіти хорошому здоровʼю, молодості, дітям та рідним, коли життя наче крапля роси, яка тремтить на пелюстці лотоса, готова щомиті зірватися донизу? О ум! Прошу тебе, служи Господнім стопам.\"]},{\"number\":\"4\",\"text\":[\"шравана, кīртана,    смарана, вандана,\",\"    па̄да-севана, да̄сья ре\",\"пӯджана, сакхī-джана,    а̄тма-ніведана\",\"    ґовінда-да̄са-абгіла̄ша ре\"],\"translation\":[\"Тому єдине, до чого прагне Ґовінда Дас, — це долучитися до дев'яти практик служіння Господу: слухати про Нього, оспівувати Його славу, памʼятати про Нього, молитися Йому, поклонятися Його стопам, бути слугою, пропонувати Йому квіти, пахощі та інші підношення, бути Його другом і цілковито присвятити себе Йому.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-bhajahu-re\"},{\"title\":{\"en\":\"Srila B.S. Govinda Dev-Goswami Maharaj\",\"ru\":\"Шрила Б.С. Говинда Дев-Госвами Махарадж\",\"ua\":\"Шріла Б.С. Ґовінда Дев-Ґосвамі Махарадж\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/govinda-maharaj-bhajahu-re-1\"},{\"title\":{\"en\":\"Srila B.K. Ashram Maharaj\",\"ru\":\"Шрила Б.К. Ашрам Махарадж\",\"ua\":\"Шріла Б.К. Ашрам Махарадж\"},\"embed_url\":\"https://soundcloud.com/scsmathcolombia/13-bhajahu-re-mana\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-bxadzhaxu-re\"},{\"title\":{\"en\":\"Bhakti Lalita Devi\",\"ru\":\"Бхакти Лалита Деви\",\"ua\":\"Бгакті Лаліта Деві\"},\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-bhajahu-re-mana\"}]}}}]\n"])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L1f\",nu
