anslation\":[\"O my mind, how foolish you are. Just worship the lotus feet of RДҒdhДҒ and Krishna in the forest of Vraja. Without such worship there is no means of spiritual advancement. Give up all speculative knowledge and materialistic activities and just worship RДҒdhДҒ and Krishna in the forests of Vraja.\"]},{\"number\":\"2\",\"text\":[\"(bhaja) gaura-gadДҒdharДҒdvaita-guru-nityДҒnanda\",\"    (gaura-kб№ӣб№Јб№Үe abhede jene)\",\"    (guru kб№ӣб№Јб№Үa-priya jene gaura-kб№ӣб№Јne abheda jene re)\",\"ЕӣrД«nivДҒsa, haridДҒsa, murДҒri, mukunda\",\"    (gaura-preme smara smara re)\",\"    (ЕӣrД«nivДҒsa, haridДҒse, gaura-preme smara re)\"],\"translation\":[\"You  should  worship  and  serve  Lord  Gaura, GadДҒdhara, Advaita, and the original Spiritual Master, Lord NityДҒnanda. Knowing Lord Gaura and Lord Krishna to be the same, and knowing the Spiritual Master to be very dear to Krishna, you should remember the dear associates of Lord Chaitanya, such as ЕҡrД«vДҒs б№¬hДҒkur, HaridДҒs б№¬hДҒkur, MurДҒri Gupta, and Mukunda Datta. In deep love for Lord Gaura, you should remember the two great personalities ЕҡrД«vДҒs б№¬hДҒkur and HaridДҒs б№¬hДҒkur.\"]},{\"number\":\"3\",\"text\":[\"rЕ«pa-sanДҒtana-jД«va-raghunДҒtha-dvandva\",\"    (jadi bhajan korbe re)\",\"    (rЕ«pa-sanДҒtane smaran jadi bhajan korbe re)\",\"rДҒghava-gopДҒla-bhaб№ӯб№ӯa-svarЕ«pa-rДҒmДҒnanda\",\"    (kб№ӣб№Јб№Үa prema jadi chДҒo re)\",\"    (svarЕ«pa-rДҒmДҒnande smara\",\"    kб№ӣб№Јб№Үa-prema jadi chДҒo re)\"],\"translation\":[\"You should remember the GoswДҒmД«s of Vб№ӣndДҒvan: ЕҡrД« RЕ«pa GoswДҒmД«, SanДҒtan GoswДҒmД«, JД«va GoswДҒmД«, RaghunДҒth  Bhaб№ӯб№ӯa  GoswДҒmД«,  and  RaghunДҒth  DДҒs GoswДҒmД«. If you worship Lord Krishna, then you should remember the two great souls ЕҡrД« RЕ«pa GoswДҒmД« and SanДҒtan GoswДҒmД«. You should also remember RДҒghava Paб№ҮбёҚit, GopДҒl Bhaб№ӯб№ӯa GoswДҒmД«, SwarЕ«p DДҒmodar GoswДҒmД«, and RДҒmДҒnanda RДҒya. If you really seek love of Krishna, then you must remember SwarЕ«p DДҒmodar GoswДҒmД« and RДҒmДҒnanda RДҒya.\"]},{\"number\":\"4\",\"text\":[\"goб№Јб№ӯhД«-saha karб№Үapura-sen-ЕӣivДҒnanda\",\"    (ajasra smara smara re)\",\"    (goб№Јб№ӯhД«-saha-sen ЕӣivДҒnande ajasra smara re)\",\"rЕ«pДҒnuga sДҒdhu-jana bhajana-ДҒnanda\",\"    (vraje bДҒs jadi chДҒo re)\",\"    (rЕ«pДҒnuga sДҒdhu-jane smara vraje bДҒs jadi chДҒo re)\",\"rЕ«pДҒnuga sДҒdhu-jana bhajana-ДҒnanda\",\"bhaja re bhaja re ДҒmДҒr mana ati manda\"],\"translation\":[\"You should remember ЕҡrД«la Kavi Karб№Үapura and all his family members, who are all sincere servants of Lord ЕҡrД« Chaitanya MahДҒprabhu. You should also remember the father of Kavi Karб№Үapura, ЕҡivДҒnanda Sena. Always remember, always remember ЕҡrД« Karб№Үapura and his family. You should remember all those Vaiб№Јб№Үavas who strictly follow the path of ЕҡrД« RЕ«pa GoswДҒmД« and who are absorbed in the ecstasy of *bhajan*. If you actually want residence in the land of Vraja, then you must remember all of the Vaiб№Јб№Үavas, who are followers of ЕҡrД«la RЕ«pa GoswДҒmД«.\"]}],\"embeds\":[{\"title\":\"Bhakti Lalita Devi\",\"embed_url\":\"https://soundcloud.com/bhakti-lalita-devi/bhakti-lalita-devi-bhajan-giti-bhaja-re-bhaja-re-amar\",\"iframe_url\":\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbhakti-lalita-devi%2Fbhakti-lalita-devi-bhajan-giti-bhaja-re-bhaja-re-amar\",\"embed_code\":\"\u003ciframe width=\\\"100%\\\" height=\\\"20\\\" scrolling=\\\"no\\\" frameborder=\\\"no\\\" allow=\\\"autoplay\\\" src=\\\"https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fbhakti-lalita-devi%2Fbhakti-lalita-devi-bhajan-giti-bhaja-re-bhaja-re-amar\\\"\u003e\u003c/iframe\u003e\"}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Nabadwip temple\",\"ru\":\"РқР°РІР°РҙРІРёРҝСҒРәРёР№ С…СҖР°Рј\",\"ua\":\"РқР°РІР°РҙРІС–РҝСҒСҢРәРёР№ С…СҖР°Рј\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/navadwip-scsm-bhajare\"},{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"РҘСҖР°Рј Рі.РҡР°СҖР°Рә
