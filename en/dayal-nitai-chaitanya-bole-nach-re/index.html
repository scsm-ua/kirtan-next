, mār kheye prema dey)\",\"(tabe) aparādha dūre jābe, pābe prema-dhan\",\"(aparādhera-vichāra to nāi he)\",\"takhon kṛṣṇa-nāme ruchi habe, ghuchibe bandhan\"],\"translation\":[\"Such a merciful personality as Nityānanda Prabhu is not to be found anywhere. He suffers a beating from Jagāi and Mādhāi and still gives them love of God.\",\"When you become offenceless, you will obtain love of God; but in these Names of Chaitanya and Nitāi there is no consideration of offences. Once you have a taste for the Holy Name of Krishna, bondage to this world will come to an end.\"]},{\"number\":\"3\",\"text\":[\"(anurāg to habe he)\",\"tokhon anāyāse saphal habe jīvera jīvan\",\"(kṛṣṇa-rati vinā jīvan to miche he)\",\"śeṣe vṛndāvane rādhā-śyāmer pābe daraśan\",\"(gaura-kṛpā hole he)\"],\"translation\":[\"When there is attachment to the Holy Name of Krishna, then, very easily, the life of a living being becomes successful. Without attachment to Krishna, life is simply false. If the mercy of Lord Gaura is there, then at the end of life you will obtain the beautiful vision of Rādhā and Śyāma in Vṛndāvan.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"Храм г.Каракас\",\"ua\":\"Храм м.Каракас\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-doi-al-nitai\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3e:[\"$\",\"$L46\",null,{\"audio\":\"$3d:props:song:resources:audio\",\"language\":\"en\"}]\n3f:[\"$\",\"$L47\",null,{\"navMap\":{\"133\":{\"prev\":{\"path\":\"/en/parama-karuna-pahu-dui-jana/\",\"title\":\"Śrī Śrī Gaura-Nityānander Dayā\"},\"next\":{\"path\":\"/en/gaurangera-duti-pada-jar-dhana-sampada/\",\"title\":\"Sāvaraṇa-Śrī-Gaura-mahimā\"}}}}]\n48:T5a9,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"CollectionPage\",\"@id\":\"https://kirtan.site/en/dayal-nitai-chaitanya-bole-nach-re\",\"url\":\"https://kirtan.site/en/dayal-nitai-chaitanya-bole-nach-re\",\"name\":\"Dayāl
