"by Śrīla Bhakti Vinod Ṭhākur\"],\"verses\":[{\"number\":\"1\",\"text\":[\"    kali-kukkura-kadana jadi chāo he\",\"kali-yuga-pāvana    kali-bhaya-nāśana,\",\"    śrī-śachī-nandana gāo he\"],\"word_by_word\":[\"**kali** — Kali Yuga; **kukkura** — dog; **kadana** — tame; **jadi** — if; **chāo** — you want; **he** — hey!; **kali** — Kali; **yuga** — Yuga; **pāvana** — purifier; **kali** — Kali Yuga; **bhaya** — fear; **nāśana** — destroyer; **śrī** — Śrī; **śachī** — Śachī's; **nandana** — son; **gāo** — chant; **he** — hey!\"],\"translation\":[\"Oh mind, you are like a miserable dog of *Kali-yuga*! If you want deliverance, then sing the Holy Name of the son of Śachī, for He is the saviour and destroyer of fear in this dark age of Kali.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"kali\",\"trans\":\"Kali Yuga\",\"sep\":\"-\"},{\"text\":\"kukkura\",\"trans\":\"dog\",\"sep\":\"-\"},{\"text\":\"kadana\",\"trans\":\"tame\",\"sep\":\" \"},{\"text\":\"jadi\",\"trans\":\"if\",\"sep\":\" \"},{\"text\":\"chāo\",\"trans\":\"you want\",\"sep\":\" \"},{\"text\":\"he\",\"trans\":\"hey!\",\"sep\":\"\"}],[{\"text\":\"kali\",\"trans\":\"Kali\",\"sep\":\"-\"},{\"text\":\"yuga\",\"trans\":\"Yuga\",\"sep\":\"-\"},{\"text\":\"pāvana\",\"trans\":\"purifier\",\"sep\":\"    \"},{\"text\":\"kali\",\"trans\":\"Kali Yuga\",\"sep\":\"-\"},{\"text\":\"bhaya\",\"trans\":\"fear\",\"sep\":\"-\"},{\"text\":\"nāśana\",\"trans\":\"destroyer\",\"sep\":\",\"}],[{\"text\":\"śrī\",\"trans\":\"Śrī\",\"sep\":\"-\"},{\"text\":\"śachī\",\"trans\":\"Śachī's\",\"sep\":\"-\"},{\"text\":\"nandana\",\"trans\":\"son\",\"sep\":\" \"},{\"text\":\"gāo\",\"trans\":\"chant\",\"sep\":\" \"},{\"text\":\"he\",\"trans\":\"hey!\",\"sep\":\"\"}]]},{\"number\":\"2\",\"text\":[\"gadādhara-mādana    nitāi-era prāṇa-dhana,\",\"    advaitera prapūjita gorā\",\"nimāi viśvambhara    śrīnivāsa-īśvara,\",\"    bhakata-samūha-chita-chorā\"],\"word_by_word\":[\"**gadādhara** — Gadādhar; **mādana** — delight; **nitāi** — Nitãi; **era** — of; **prāṇa** — life; **dhana** — wealth; **advaitera** — Advaita; **prapūjita** — greatly worshipped; **gorā** — Gaurāṅga; **nimāi** — Nimāi; **viśvambhara** — maintainer of the universe; **śrīnivāsa** — Śrīvās; **īśvara** — Lord; **bhakata** — devotees; **samūha** — assembly; **chita** — heart; **chorā** — stealer.\"],\"translation\":[\"He is the transcendental cupid of Gadādhara, the life and soul of Nityānanda Prabhu, and the worshipable Lord of Śrī Advaita Āchārya. He is known as Nimai as He was born under a Neem tree; Viśvambhara as He is the sustainer of the universe; He is the master of Śrīvās Ṭhākur, and He steals the hearts of all of the devotees.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"gadādhara\",\"trans\":\"Gadādhar\",\"sep\":\"-\"},{\"text\":\"mādana\",\"trans\":\"delight\",\"sep\":\"    \"},{\"text\":\"nitāi\",\"trans\":\"Nitãi\",\"sep\":\"-\"},{\"text\":\"era\",\"trans\":\"of\",\"sep\":\" \"},{\"text\":\"prāṇa\",\"trans\":\"life\",\"sep\":\"-\"},{\"text\":\"dhana\",\"trans\":\"wealth\",\"sep\":\",\"}],[{\"text\":\"advaitera\",\"trans\":\"Advaita\",\"sep\":\" \"},{\"text\":\"prapūjita\",\"trans\":\"greatly worshipped\",\"sep\":\" \"},{\"text\":\"gorā\",\"trans\":\"Gaurāṅga\",\"sep\":\"\"}],[{\"text\":\"nimāi\",\"trans\":\"Nimāi\",\"sep\":\" \"},{\"text\":\"viśvambhara\",\"trans\":\"maintainer of the universe\",\"sep\":\"    \"},{\"text\":\"śrīnivāsa\",\"trans\":\"Śrīvās\",\"sep\":\"-\"},{\"text\":\"īśvara\",\"trans\":\"Lord\",\"sep\":\",\"}],[{\"text\":\"bhakata\",\"trans\":\"devotees\",\"sep\":\"-\"},{\"text\":\"samūha\",\"trans\":\"assembly\",\"sep\":\"-\"},{\"text\":\"chita\",\"trans\":\"heart\",\"sep\":\"-\"},{\"text\":\"chorā\",\"trans\":\"stealer\",\"sep\":\"\"}]]},{\"number\":\"3\",\"text\":[\"nadīyā-śaśadhara    māyāpura-īśvara,\",\"    nāma-prabartana-śūra\",\"gṛhī-jana-śikṣaka    nyāsi-kula-nāyaka,\",\"    mādhava rādhā-bhāva-pūra\"],\"word_by_word\":[\"**nadīyā** — Nadia; **śaśadhara** — moon; **māyāpura** — Māyāpur; **īśvara** — Lord; **nāma** — Holy Name; **prabartana** — inaugurator; **śūra** — hero; **gṛhī** — householder; **jana** — people; **śikṣaka** — teacher; **nyāsi** — sannyāsī; **kula** — group; **nāyaka** — leader; **mādhava** — Mādhava; **rādhā** — Rādhā; **bhāva** — mood; **pūra** — filled.\"],\"translation\":[\"He is the moon of Nadia, the Lord of Māyāpur, and heroic saviour who inaugurated the chanting of the Holy Name of Krishna. He is the teacher of all householders and the commander-in-chief of all *sannyāsīs*. Śrī Chaitanya Mahāprabhu is Krishna, filled with the ecstatic heart’s sentiment of Śrīmatī Rādhārāṇī.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"nadīyā\",\"trans\":\"Nadia\",\"sep\":\"-\"},{\"text\":\"śaśadhara\",\"trans\":\"moon\",\"sep\":\"    \"},{\"text\":\"māyāpura\",\"trans\":\"Māyāpur\",\"sep\":\"-\"},{\"text\":\"īśvara\",\"trans\":\"Lord\",\"sep\":\",\"}],[{\"text\":\"nāma\",\"trans\":\"Holy Name\",\"sep\":\"-\"},{\"text\":\"prabartana\",\"trans\":\"inaugurator\",\"sep\":\"-\"},{\"text\":\"śūra\",\"trans\":\"hero\",\"sep\":\"\"}],[{\"text\":\"gṛhī\",\"trans\":\"householder\",\"sep\":\"-\"},{\"text\":\"jana\",\"trans\":\"people\",\"sep\":\"-\"},{\"text\":\"śikṣaka\",\"trans\":\"teacher\",\"sep\":\"    \"},{\"text\":\"nyāsi\",\"trans\":\"sannyāsī\",\"sep\":\"-\"},{\"text\":\"kula\",\"trans\":\"group\",\"sep\":\"-\"},{\"text\":\"nāyaka\",\"trans\":\"leader\",\"sep\":\",\"}],[{\"text\":\"mādhava\",\"trans\":\"Mādhava\",\"sep\":\" \"},{\"text\":\"rādhā\",\"trans\":\"Rādhā\",\"sep\":\"-\"},{\"text\":\"bhāva\",\"trans\":\"mood\",\"sep\":\"-\"},{\"text\":\"pūra\",\"trans\":\"filled\",\"sep\":\"\"}]]},{\"number\":\"4\",\"text\":[\"sārvabhauma-śodhana    gajapati-tāraṇa,\",\"    rāmānanda-poṣaṇa-vīra\",\"rūpānanda-vardhana    sanātana pālana,\",\"    haridāsa-modana-dhīra\"],\"word_by_word\":[\"**sārvabhauma** — Sārvabhauma; **śodhana** — purifier; **gajapati** — King (of Orissa); **tāraṇa** — deliverer; **rāmānanda** — Rāmānanda; **poṣaṇa** — nourisher; **vīra** — hero!; **rūpānanda** — Rūpa's joy; **vardhana** — increaser; **sanātana** — Sanātan; **pālana** — sustainer; **haridāsa** — Haridās; **modana** — delighter; **dhīra** — sober.\"],\"translation\":[\"He purified Sārvabhauma Bhaṭṭāchārya and rescued Pratāparudra Maharaj, the great king of Orissa. He is the hero and protector of Rāmānanda Rāy. He increases the ecstasy of Śrīla Rūpa Goswāmī and He is the guardian of Śrīla Sanātan Goswāmī. He delights the sober Haridās Ṭhākur.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"sārvabhauma\",\"trans\":\"Sārvabhauma\",\"sep\":\"-\"},{\"text\":\"śodhana\",\"trans\":\"purifier\",\"sep\":\"    \"},{\"text\":\"gajapati\",\"trans\":\"King (of Orissa)\",\"sep\":\"-\"},{\"text\":\"tāraṇa\",\"trans\":\"deliverer\",\"sep\":\",\"}],[{\"text\":\"rāmānanda\",\"trans\":\"Rāmānanda\",\"sep\":\"-\"},{\"text\":\"poṣaṇa\",\"trans\":\"nourisher\",\"sep\":\"-\"},{\"text\":\"vīra\",\"trans\":\"hero!\",\"sep\":\"\"}],[{\"text\":\"rūpānanda\",\"trans\":\"Rūpa's joy\",\"sep\":\"-\"},{\"text\":\"vardhana\",\"trans\":\"increaser\",\"sep\":\"    \"},{\"text\":\"sanātana\",\"trans\":\"Sanātan\",\"sep\":\" \"},{\"text\":\"pālana\",\"trans\":\"sustainer\",\"sep\":\",\"}],[{\"text\":\"haridāsa\",\"trans\":\"Haridās\",\"sep\":\"-\"},{\"text\":\"modana\",\"trans\":\"delighter\",\"sep\":\"-\"},{\"text\":\"dhīra\",\"trans\":\"sober\",\"sep\":\"\"}]]},{\"number\":\"5\",\"text\":[\"vraja-rasa-bhāvana duṣṭa-mata-śātana,\",\"    kapaṭī-vighātana-kāma\",\"śuddha-bhakta-pālana śuṣka-jñāna-tāḍana,\",\"    chhala bhakti-dūṣaṇa-rāma\"],\"word_by_word\":[\"**vraja** — Vraja; **rasa** — rasa; **bhāvana** — cultivation; **duṣṭa** — wicked; **mata** — doctrine; **śātana** — cutter; **kapaṭī** — deceit; **vighātana** — destroyer; **kāma** — desire; **śuddha** — pure; **bhakta** — devotees; **pālana** — maintainer; **śuṣka** — dry; **jñāna** — knowledge; **tāḍana** — dispeller; **chhala** — pseudo; **bhakti** — devotion; **dūṣaṇa** — destroyer; **rāma** — Pleasure personified!\"],\"translation\":[\"Śrī Krishna Chaitanya is absorbed in the mellows of Vṛndāvan. He removes the filthy thoughts of the mind, destroying lust and deceit. He drives away dry empiric knowledge which obscures the beauty of pure devotion. He is the protector, maintainer and constant guardian of His pure devotees.\"],\"isWbwInlineModeAvailable\":true,\"inline_word_by_word\":[[{\"text\":\"vraja\",\"trans\":\"Vraja\",\"sep\":\"-\"},{\"text\":\"rasa\",\"trans\":\"rasa\",\"sep\":\"-\"},{\"text\":\"bhāvana\",\"trans\":\"cultivation\",\"sep\":\" \"},{\"text\":\"duṣṭa\",\"trans\":\"wicked\",\"sep\":\"-\"},{\"text\":\"mata\",\"trans\":\"doctrine\",\"sep\":\"-\"},{\"text\":\"śātana\",\"trans\":\"cutter\",\"sep\":\",\"}],[{\"text\":\"kapaṭī\",\"trans\":\"deceit\",\"sep\":\"-\"},{\"text\":\"vighātana\",\"trans\":\"destroyer\",\"sep\":\"-\"},{\"text\":\"kāma\",\"trans\":\"desire\",\"sep\":\"\"}],[{\"text\":\"śuddha\",\"trans\":\"pure\",\"sep\":\"-\"},{\"text\":\"bhakta\",\"trans\":\"devotees\",\"sep\":\"-\"},{\"text\":\"pālana\",\"trans\":\"maintainer\",\"sep\":\" \"},{\"text\":\"śuṣka\",\"trans\":\"dry\",\"sep\":\"-\"},{\"text\":\"jñāna\",\"trans\":\"knowledge\",\"sep\":\"-\"},{\"text\":\"tāḍana\",\"trans\":\"dispeller\",\"sep\":\",\"}],[{\"text\":\"chhala\",\"trans\":\"pseudo\",\"sep\":\" \"},{\"text\":\"bhakti\",\"trans\":\"devotion\",\"sep\":\"-\"},{\"text\":\"dūṣaṇa\",\"trans\":\"destroyer\",\"sep\":\"-\"},{\"text\":\"rāma\",\"trans\":\"Pleasure personified!\",\"sep\":\"\"}]]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Srila B.K. Ashram Maharaj\",\"ru\":\"Шрила Б.К. Ашрам Махарадж\",\"ua\":\"Шріла Б.К. Ашрам Махарадж\"},\"embed_url\":\"https://soundcloud.com/scsmathcolombia/5-prabhati-giti\"},{\"title\":{\"en\":\"Srila B.B. Avadhut Maharaj\",\"ru\":\"Шрила Б.Б. Авадхут Махарадж\",\"ua\":\"Шріла Б.Б. Авадгут Махарадж\"},\"embed_url\":\"https://soundcloud.co
