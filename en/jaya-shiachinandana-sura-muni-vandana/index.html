d all glories to ДҖchДҒrya ChandraЕӣekhara. All glories to ЕҡrД«la NityДҒnanda Prabhu, ЕҡrД«la GadДҒdhara Paб№ҮбёҚit and ЕҡrД«la HaridДҒs б№¬hДҒkur, the NДҒmДҒchДҒrya.\"]},{\"number\":\"4\",\"text\":[\"murДҒri mukunda jay premanidhi mahДҒЕӣaya,\",\"    jaya jata prabhu pДҒriб№Јad\",\"vandi savДҒkДҒra pДҒya adhamere kб№ӣpДҒ hoy,\",\"    bhakti sapДҒrб№Јada-prabhupДҒd\"],\"translation\":[\"All glories to MurДҒri Gupta, and all glories to Mukunda Datta. All glories to all the other eternal associates of ЕҡrД« Chaitanya MahДҒprabhu. By singing the glories of ЕҡrД«la PrabhupДҒd and all those great souls who are eternal associates of ЕҡrД« Chaitanya MahДҒprabhu, even the lowest of men can obtain the highest treasure of love.\"]}],\"resources\":{\"audio\":[{\"title\":{\"en\":\"Caracas temple\",\"ru\":\"РҘСҖР°Рј Рі.РҡР°СҖР°РәР°СҒ\",\"ua\":\"РҘСҖР°Рј Рј.РҡР°СҖР°РәР°СҒ\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/shchsm-karakas-dzhaya\"},{\"title\":{\"en\":\"Srila B.R. Madhusudan Maharaj\",\"ru\":\"РЁСҖРёР»Р° Р‘.Р . РңР°РҙС…СғСҒСғРҙР°РҪ РңР°С…Р°СҖР°РҙР¶\",\"ua\":\"РЁСҖС–Р»Р° Р‘.Р . РңР°РҙРіСғСҒСғРҙР°РҪ РңР°С…Р°СҖР°РҙР¶\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/madhusudan-maharaj-day-programm-kisel\"},{\"title\":{\"en\":\"Srila B.B. Avadhut Maharaj\",\"ru\":\"РЁСҖРёР»Р° Р‘.Р‘. РҗРІР°РҙС…СғСӮ РңР°С…Р°СҖР°РҙР¶\",\"ua\":\"РЁСҖС–Р»Р° Р‘.Р‘. РҗРІР°РҙРіСғСӮ РңР°С…Р°СҖР°РҙР¶\"},\"embed_url\":\"https://soundcloud.com/bharatimaharaj/avadxut-maxaradzh-utrennee-4\"}]}}}]\n"])</script><script>self.__next_f.push([1,"3d:[\"$\",\"$L45\",null,{\"audio\":\"$3c:props:song:resources:audio\",\"language\":\"en\"}]\n3e:[\"$\",\"$L46\",null,{\"navMap\":{\"50\":{\"prev\":{\"path\":\"/en/jashomati-nandana-vraja-vara-nagara/\",\"title\":\"ЕҡrД« NДҒm-kД«rtan\"},\"next\":{\"path\":\"/en/gurudeva-kripa-bindu-diya-kara-ei-dase/\",\"title\":\"Gurudeva\"}}}}]\n47:Ta80,"])</script><script>self.__next_f.push([1,"{\"@context\":\"https://schema.org\",\"@graph\":[{\"@type\":\"Collection
